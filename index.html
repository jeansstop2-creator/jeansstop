  <!-- JSONBin للحفظ السحابي -->
  <script>
    const JSONBIN_KEY = '$2a$10$pitWMNBMWMwyDsMjKpehPu6yWGFKtYZqPlPaBlCfgcTej/B0ozic6';
    // سيتم تحديث هذا الـ ID تلقائياً أول مرة
    let JSONBIN_ID = '6a1772e521f9ee59d29325df';
    let JSONBIN_PRODUCTS_ID = '6a17840cddf5aa59f76def7c';

    window.firebaseSaveProducts = async function(productsArr) {
      try {
        const json = JSON.stringify({ products: productsArr });
        if (json.length > 90000) { console.warn('المنتجات كبيرة جداً'); return; }
        await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_PRODUCTS_ID, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
          body: json
        });
      } catch(e) { console.error('Products save error:', e); }
    };

    window.firebaseLoadProducts = async function() {
      try {
        const res = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_PRODUCTS_ID + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const d = await res.json();
        if (!d.record || d.record.data === 'init') return null;
        return d.record.products || null;
      } catch(e) { return null; }
    };

    window.firebaseSave = async function(dataObj) {
      try {
        // تحقق من حجم البيانات - JSONBin حد أقصى 100KB
        const json = JSON.stringify(dataObj);
        if (json.length > 90000) {
          console.warn('البيانات كبيرة جداً للحفظ السحابي، تم الحفظ محلياً فقط');
          return;
        }
        const res = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_ID, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
          body: json
        });
        if (!res.ok) console.error('Save failed:', res.status);
      } catch(e) { console.error('Save error:', e); }
    };

    window.firebaseLoad = async function() {
      try {
        const res = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_ID + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const d = await res.json();
        if (!d.record || d.record.data === 'init') return null;
        return d.record;
      } catch(e) { return null; }
    };

    window._firebaseReady = true;
    document.addEventListener('DOMContentLoaded', () => document.dispatchEvent(new Event('firebaseReady')));
  </script>

<script>
  // ========== تحميل وحفظ البيانات ==========
  function getAllDataObj() {
    return { products, customers, invoices, warehouses, nextInvoiceId, treasuries, vouchers, nextVoucherId, suppliers, nextSupplierId, productionOrders, nextProductionId, rawMaterialWarehouses, accessoryWarehouses, finishedGoodsWarehouses, laundries, factories, nextLaundryId, nextFactoryId, kpiTargets, debtEntries, nextDebtId, warehouseTransfers, systemUsers, nextUserId };
  }

  function applyDataObj(data) {
    if(!data) return;
    products = data.products || products;
    customers = data.customers || customers;
    invoices = data.invoices || invoices;
    warehouses = data.warehouses || warehouses;
    nextInvoiceId = data.nextInvoiceId || nextInvoiceId;
    treasuries = data.treasuries || treasuries;
    vouchers = data.vouchers || vouchers;
    nextVoucherId = data.nextVoucherId || nextVoucherId;
    suppliers = data.suppliers || suppliers;
    nextSupplierId = data.nextSupplierId || nextSupplierId;
    productionOrders = data.productionOrders || productionOrders;
    nextProductionId = data.nextProductionId || nextProductionId;
    rawMaterialWarehouses = data.rawMaterialWarehouses || rawMaterialWarehouses;
    accessoryWarehouses = data.accessoryWarehouses || accessoryWarehouses;
    finishedGoodsWarehouses = data.finishedGoodsWarehouses || finishedGoodsWarehouses;
    laundries = data.laundries || laundries;
    factories = data.factories || factories;
    nextLaundryId = data.nextLaundryId || nextLaundryId;
    nextFactoryId = data.nextFactoryId || nextFactoryId;
    kpiTargets = data.kpiTargets || kpiTargets;
    debtEntries = data.debtEntries || debtEntries;
    warehouseTransfers = data.warehouseTransfers || warehouseTransfers;
    nextDebtId = data.nextDebtId || nextDebtId;
    if(data.systemUsers && data.systemUsers.length > 0) systemUsers = data.systemUsers;
    nextUserId = data.nextUserId || nextUserId;
  }

  function saveAllData() {
    const dataObj = getAllDataObj();
    dataObj._savedAt = Date.now(); // timestamp للمقارنة
    // حفظ محلي كامل
    localStorage.setItem('crizmaData', JSON.stringify(dataObj));
    // حفظ سحابي بدون المنتجات (عشان متكبرش)
    if(window.firebaseSave) {
      const cloudObj = { ...dataObj };
      delete cloudObj.products;
      delete cloudObj.rawMaterialWarehouses;
      delete cloudObj.accessoryWarehouses;
      delete cloudObj.finishedGoodsWarehouses;
      delete cloudObj.warehouseTransfers;
      delete cloudObj.productionOrders;
      // تأكد إن systemUsers موجودين
      cloudObj.systemUsers = systemUsers;
      cloudObj.nextUserId = nextUserId;
      window.firebaseSave(cloudObj);
    }
    // حفظ المنتجات في bin منفصل
    if(window.firebaseSaveProducts) window.firebaseSaveProducts(products);
  }
  
  function loadAllData() {
    // تحميل من localStorage مؤقتاً
    const saved = localStorage.getItem('crizmaData');
    if(saved) { try { applyDataObj(JSON.parse(saved)); } catch(e) {} }
  }

  async function loadFromFirebase() {
    if(!window.firebaseLoad) return;
    try {
      const data = await window.firebaseLoad();
      if(data) {
        // احتفظ بـ systemUsers المحلية لأنها الأحدث
        const local = JSON.parse(localStorage.getItem('crizmaData') || '{}');
        const localTime = local._savedAt || 0;
        const cloudTime = data._savedAt || 0;
        // الـ local يكون له الأولوية في systemUsers و nextUserId لو أحدث أو نفس الوقت
        const preferLocal = localTime >= cloudTime;
        const localUsers = local.systemUsers && local.systemUsers.length > 0 ? local.systemUsers : null;
        const localNextUserId = local.nextUserId || null;
        applyDataObj(data);
        // استعادة المستخدمين المحليين لو محليًا أحدث
        if(preferLocal && localUsers) { systemUsers = localUsers; }
        if(preferLocal && localNextUserId && localNextUserId > nextUserId) { nextUserId = localNextUserId; }
        // الـ merge: local يكسب في systemUsers
        const merged = { ...local, ...data, systemUsers: systemUsers, nextUserId: nextUserId };
        localStorage.setItem('crizmaData', JSON.stringify(merged));
      }
      // تحميل المنتجات من bin منفصل
      if(window.firebaseLoadProducts) {
        const cloudProducts = await window.firebaseLoadProducts();
        if(cloudProducts && cloudProducts.length > 0) {
          products = cloudProducts;
        }
      }
      // تحديث الشاشة
      if(currentScreen && currentScreen !== 'login') {
        navigateTo(currentScreen);
      }
    } catch(e) { console.error('Firebase load error:', e); }
  }

    { id: 7, code: 'PRD-007', name: 'سكر أبيض 1 كيلو', wh: 'مخزن الفرع 1', qty: 200, min: 30, cost: 12.0, price: 22.0 },
    { id: 8, code: 'PRD-008', name: 'قهوة نسكافيه', wh: 'مخزن الفرع 2', qty: 145, min: 10, cost: 24.0, price: 48.0 },
    { id: 9, code: 'PRD-009', name: 'صابون سائل', wh: 'المخزن الرئيسي', qty: 0, min: 15, cost: 7.0, price: 18.0 },
    { id: 10, code: 'PRD-010', name: 'مناديل ورقية', wh: 'مخزن الفرع 1', qty: 5, min: 20, cost: 6.0, price: 14.0 },
  ];
  
  let customers = [
    { id: 1, name: 'محمد أحمد', phone: '01001234567', address: 'القاهرة', balance: 0 },
    { id: 2, name: 'سارة علي', phone: '01007654321', address: 'الإسكندرية', balance: 250 },

    { id: 4, name: 'نورا حسن', phone: '01234567890', address: 'القليوبية', balance: 500 },

  ];
  
  let invoices = [];
  let nextInvoiceId = 100;
  let currentCart = [];
  let selectedCustomer = null;
  let selectedPaymentMethod = 'cash';
  
  // ========== بيانات الخزان والسندات ==========
  let treasuries = [
    { id: 1, name: 'الخزينة الرئيسية', balance: 0, description: 'الصندوق الرئيسي للشركة' },
  ];
  let vouchers = [];
  let nextVoucherId = 1;

  // ========== بيانات الموردين ==========
  let suppliers = [];
  let nextSupplierId = 1;

  // ========== بيانات أوامر التشغيل ==========
  let productionOrders = [];

// تحديث دالة حفظ أمر التشغيل لتسجيل الدين تلقائياً
function updateProductionOrderDebt(order, isNew = true) {
    // تسجيل دين المصنع إذا كان آجل
    if(order.factoryId && order.factoryPayment === 'credit' && order.factoryPrice > 0) {
        const factory = factories.find(f => f.id == order.factoryId);
        if(factory) {
            const amount = (order.factoryPrice * order.qty) - (order.factoryPaid || 0);
            if(amount > 0) {
                factory.balance = (factory.balance || 0) + amount;
                factory.totalPurchases = (factory.totalPurchases || 0) + amount;
                if(!factory.transactions) factory.transactions = [];
                factory.transactions.push({
                    id: Date.now(),
                    type: 'debt',
                    amount: amount,
                    note: `أمر تشغيل #${order.id} - ${order.name} (${order.qty} قطعة × ${order.factoryPrice} ج)`,
                    date: new Date().toISOString(),
                    orderId: order.id,
                    orderName: order.name
                });
            }
        }
    }
    
    // تسجيل دين المغسلة إذا كان آجل
    if(order.laundryId && order.laundryPayment === 'credit' && order.laundryPrice > 0) {
        const laundry = laundries.find(l => l.id == order.laundryId);
        if(laundry) {
            const amount = (order.laundryPrice * order.qty) - (order.laundryPaid || 0);
            if(amount > 0) {
                laundry.balance = (laundry.balance || 0) + amount;
                laundry.totalPurchases = (laundry.totalPurchases || 0) + amount;
                if(!laundry.transactions) laundry.transactions = [];
                laundry.transactions.push({
                    id: Date.now(),
                    type: 'debt',
                    amount: amount,
                    note: `أمر تشغيل #${order.id} - ${order.name} (${order.qty} قطعة × ${order.laundryPrice} ج)`,
                    date: new Date().toISOString(),
                    orderId: order.id,
                    orderName: order.name
                });
            }
        }
    }
}

// تحديث دالة تعديل أمر التشغيل (عند تغيير الحالة أو الكمية)
function updateProductionOrderDebtOnEdit(oldOrder, newOrder) {
    // معالجة دين المصنع
    if(oldOrder.factoryId && oldOrder.factoryPayment === 'credit') {
        const factory = factories.find(f => f.id == oldOrder.factoryId);
        if(factory) {
            const oldAmount = (oldOrder.factoryPrice * oldOrder.qty) - (oldOrder.factoryPaid || 0);
            if(oldAmount > 0) {
                factory.balance = (factory.balance || 0) - oldAmount;
                factory.transactions = factory.transactions.filter(t => t.orderId !== oldOrder.id);
            }
        }
    }
    
    // معالجة دين المغسلة
    if(oldOrder.laundryId && oldOrder.laundryPayment === 'credit') {
        const laundry = laundries.find(l => l.id == oldOrder.laundryId);
        if(laundry) {
            const oldAmount = (oldOrder.laundryPrice * oldOrder.qty) - (oldOrder.laundryPaid || 0);
            if(oldAmount > 0) {
                laundry.balance = (laundry.balance || 0) - oldAmount;
                laundry.transactions = laundry.transactions.filter(t => t.orderId !== oldOrder.id);
            }
        }
    }
    
    // تسجيل الديون الجديدة
    updateProductionOrderDebt(newOrder, false);
}

// دالة تسجيل دفعة للمصنع
function recordFactoryPayment(factoryId, amount, note, treasuryId = null) {
    const factory = factories.find(f => f.id == factoryId);
    if(!factory) return false;
    
    if(amount <= 0 || amount > factory.balance) {
        alert(`المبلغ غير صحيح. المتبقي: ${factory.balance.toFixed(2)} ج`);
        return false;
    }
    
    factory.balance -= amount;
    factory.totalPaid = (factory.totalPaid || 0) + amount;
    if(!factory.transactions) factory.transactions = [];
    factory.transactions.push({
        id: Date.now(),
        type: 'payment',
        amount: amount,
        note: note || `سداد دفعة للمصنع ${factory.name}`,
        date: new Date().toISOString()
    });
    
    // تسجيل سند صرف من الخزينة إذا تم تحديدها
    if(treasuryId) {
        const treasury = treasuries.find(t => t.id == treasuryId);
        if(treasury && treasury.balance >= amount) {
            const voucher = {
                id: nextVoucherId++,
                type: 'payment',
                amount: amount,
                treasuryId: treasuryId,
                party: factory.name,
                note: `دفع للمصنع - ${note || ''}`,
                date: new Date().toISOString()
            };
            vouchers.push(voucher);
            treasury.balance -= amount;
        }
    }
    
    saveAllData();
    return true;
}

function recalcAllBalances() {
    // إعادة تعيين أرصدة المصانع
    factories.forEach(factory => {
        factory.balance = 0;
        factory.totalPurchases = 0;
        factory.totalPaid = 0;
        factory.transactions = [];
    });
    
    // إعادة تعيين أرصدة المغاسل
    laundries.forEach(laundry => {
        laundry.balance = 0;
        laundry.totalPurchases = 0;
        laundry.totalPaid = 0;
        laundry.transactions = [];
    });
    
    // حساب الأرصدة من أوامر التشغيل
    productionOrders.forEach(order => {
        // حساب إجمالي المصنع
        if (order.factoryId && order.factoryPayment === 'credit') {
            const factory = factories.find(f => f.id == order.factoryId);
            if (factory && order.factoryTotal > 0) {
                const paid = order.factoryPaid || 0;
                const remaining = order.factoryTotal - paid;
                if (remaining > 0) {
                    factory.balance += remaining;
                    factory.totalPurchases += order.factoryTotal;
                    factory.totalPaid += paid;
                }
            }
        }
        
        // حساب إجمالي المغسلة
        if (order.laundryId && order.laundryPayment === 'credit') {
            const laundry = laundries.find(l => l.id == order.laundryId);
            if (laundry && order.laundryTotal > 0) {
                const paid = order.laundryPaid || 0;
                const remaining = order.laundryTotal - paid;
                if (remaining > 0) {
                    laundry.balance += remaining;
                    laundry.totalPurchases += order.laundryTotal;
                    laundry.totalPaid += paid;
                }
            }
        }
    });
    
    saveAllData();
}

  function getStatus(p) { if (p.qty === 0) return 'zero'; if (p.qty < p.min) return 'low'; return 'ok'; }

  let selectedProductId = null;
  
  function attachSalesEvents() {
    document.getElementById('logoutSales')?.addEventListener('click', () => { currentUser=null; localStorage.removeItem('crizmaUser'); navigateTo('login'); });
    document.querySelectorAll('[data-nav]').forEach(el => { el.addEventListener('click', () => navigateTo(el.getAttribute('data-nav'))); });
    
    // البحث عن العملاء
    const customerInput = document.getElementById('customerSearchInput');
    const customerResults = document.getElementById('customerSearchResults');
    customerInput?.addEventListener('input', (e) => {
      const searchText = e.target.value.toLowerCase();
      if(searchText.length < 1) { customerResults.style.display = 'none'; return; }
      const filtered = customers.filter(c => c.name.toLowerCase().includes(searchText) || c.phone.includes(searchText));
      if(filtered.length > 0) {
        customerResults.innerHTML = filtered.map(c => `<div class="search-result-item" onclick="selectCustomer(${c.id}, '${c.name.replace(/'/g, "\\'")}', ${c.balance})"><strong>${c.name}</strong> - ${c.phone} ${c.balance > 0 ? `<span style="color:#f87171">(عليه ${c.balance}ج)</span>` : c.balance < 0 ? `<span style="color:#4ade80">(له ${Math.abs(c.balance)}ج)</span>` : ''}</div>`).join('');
        customerResults.style.display = 'block';
      } else customerResults.style.display = 'none';
    });
    
    // البحث عن المنتجات
    const productInput = document.getElementById('productSearchInput');
    const productResults = document.getElementById('productSearchResults');
    productInput?.addEventListener('input', (e) => {
      const searchText = e.target.value.toLowerCase();
      if(searchText.length < 1) { productResults.style.display = 'none'; return; }
      const filtered = products.filter(p => p.qty > 0 && (p.name.toLowerCase().includes(searchText) || p.code.toLowerCase().includes(searchText)));
      if(filtered.length > 0) {
        productResults.innerHTML = filtered.map(p => `<div class="search-result-item" onclick="selectProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price})"><strong>${p.name}</strong> - ${p.price} ج <span style="color:#4ade80">(متوفر: ${p.qty})</span></div>`).join('');
        productResults.style.display = 'block';
      } else productResults.style.display = 'none';
    });
    
    document.addEventListener('click', (e) => {
      if(!customerInput?.contains(e.target) && !customerResults?.contains(e.target)) customerResults.style.display = 'none';
      if(!productInput?.contains(e.target) && !productResults?.contains(e.target)) productResults.style.display = 'none';
    });
    
    document.getElementById('addToCartBtn')?.addEventListener('click', () => {
      if(!selectedProductId) { alert('اختر منتج أولاً'); return; }
      const qty = parseInt(document.getElementById('itemQty').value);
      if(qty < 1) { alert('الكمية غير صحيحة'); return; }
      const product = products.find(p => p.id === selectedProductId);
      if(!product || product.qty < qty) { alert('الكمية غير متوفرة'); return; }
      const existing = currentCart.find(item => item.productId === selectedProductId);
      if(existing) existing.qty += qty;
      else currentCart.push({ productId: product.id, name: product.name, price: product.price, cost: product.cost, qty: qty });
      refreshSalesUI();
      document.getElementById('itemQty').value = 1;
      document.getElementById('productSearchInput').value = '';
      selectedProductId = null;
    });
    
    document.getElementById('clearCartBtn')?.addEventListener('click', () => { currentCart = []; refreshSalesUI(); });
    document.getElementById('completeSaleBtn')?.addEventListener('click', completeSale);
    document.getElementById('printPDFBtn')?.addEventListener('click', showPrintPreview);
    document.getElementById('newCustomerSalesBtn')?.addEventListener('click', () => document.getElementById('customerSalesModal').classList.add('open'));
    document.getElementById('saveCustomerSalesBtn')?.addEventListener('click', () => {
      let name = document.getElementById('newCustomerNameSales').value.trim();
      let phone = document.getElementById('newCustomerPhoneSales').value.trim();
      if(name) { customers.push({ id: Date.now(), name, phone, address: '', balance: 0 }); saveAllData(); }
      document.getElementById('customerSalesModal').classList.remove('open');
    });
    document.getElementById('closeCustomerSalesModal')?.addEventListener('click', () => document.getElementById('customerSalesModal').classList.remove('open'));
    document.getElementById('closePrintModal')?.addEventListener('click', () => document.getElementById('printModal').classList.remove('open'));
    document.getElementById('generatePDFBtn')?.addEventListener('click', generatePDF);

        document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedPaymentMethod = btn.getAttribute('data-payment');
        refreshPaymentDetails();
        updateBalanceSummary();
      });
    });
    
    refreshSalesUI();
  }
  
  window.selectCustomer = (id, name, balance) => {
    selectedCustomer = customers.find(c => c.id === id);
    document.getElementById('customerSearchInput').value = name;
    document.getElementById('customerSearchResults').style.display = 'none';
    updateBalanceSummary();
  };
  
  window.selectProduct = (id, name, price) => {

    document.getElementById('productSearchInput').value = name;
    document.getElementById('productSearchResults').style.display = 'none';
  };
  
  function updateBalanceSummary() {
    if(!selectedCustomer) { document.getElementById('customerBalanceSummary').style.display = 'none'; return; }
    const invoiceTotal = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);
    const prevBal = selectedCustomer.balance;
    let totalAfter = selectedPaymentMethod === 'credit' ? prevBal + invoiceTotal : prevBal;
    document.getElementById('customerBalanceSummary').style.display = 'block';
    document.getElementById('prevBalance').innerHTML = prevBal > 0 ? `عليه ${prevBal} ج` : prevBal < 0 ? `له ${Math.abs(prevBal)} ج` : 'صفر';
    document.getElementById('invoiceBalance').innerHTML = `${invoiceTotal.toFixed(2)} ج`;
    document.getElementById('totalBalance').innerHTML = totalAfter > 0 ? `عليه ${totalAfter.toFixed(2)} ج` : totalAfter < 0 ? `له ${Math.abs(totalAfter).toFixed(2)} ج` : 'صفر';
  }
  
  function refreshPaymentDetails() {
    const paymentDiv = document.getElementById('paymentDetails');
    const total = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);
    if(selectedPaymentMethod === 'cash') {
      paymentDiv.innerHTML = `<div class="field"><label>المدفوع</label><input type="number" id="paidAmount" value="${total}" style="width:100%"></div><div id="changeAmount" style="font-size:13px;margin-top:5px"></div>`;
      const paidInput = document.getElementById('paidAmount');
      if(paidInput) paidInput.addEventListener('input', () => { const paid = parseFloat(paidInput.value)||0; const change = paid - total; document.getElementById('changeAmount').innerHTML = change >= 0 ? `<span style="color:#4ade80">💰 الباقي: ${change.toFixed(2)} ج</span>` : `<span style="color:#f87171">⚠️ المتبقي: ${Math.abs(change).toFixed(2)} ج</span>`; });
      paidInput?.dispatchEvent(new Event('input'));
    } else {
      paymentDiv.innerHTML = `<div style="background:rgba(245,158,11,0.15);padding:10px;border-radius:10px;color:#fbbf24"><i class="ti ti-credit-card"></i> سيتم تسجيل ${total.toFixed(2)} ج كرصيد على العميل</div>`;
    }
  }
  
  function updateCartItem(productId, field, value) {
    const item = currentCart.find(i => i.productId === productId);
    if(item) {
      if(field === 'qty') { const newQty = parseInt(value); if(newQty > 0) item.qty = newQty; else if(newQty <= 0) removeFromCart(productId); }
      else if(field === 'price') item.price = parseFloat(value);
      refreshSalesUI();
    }
  }
  
  function removeFromCart(productId) { currentCart = currentCart.filter(i => i.productId !== productId); refreshSalesUI(); }
  
  function refreshSalesUI() {
    const cartDiv = document.getElementById('cartItemsList');
    if(cartDiv) {
      if(currentCart.length === 0) cartDiv.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem">السلة فارغة</div>';
      else {
        cartDiv.innerHTML = currentCart.map(item => `<div class="cart-item"><div class="cart-item-info"><strong>${item.name}</strong></div><div class="cart-item-controls"><div class="qty-control"><button class="qty-btn" onclick="updateCartItem(${item.productId}, 'qty', ${item.qty-1})">-</button><input type="number" value="${item.qty}" min="1" style="width:60px;text-align:center;background:#0f172a;border:1px solid rgba(56,189,248,0.4);border-radius:6px;color:#ffffff;padding:4px" onchange="updateCartItem(${item.productId}, 'qty', this.value)"><button class="qty-btn" onclick="updateCartItem(${item.productId}, 'qty', ${item.qty+1})">+</button></div><input type="number" value="${item.price}" step="0.5" class="edit-price-input" onchange="updateCartItem(${item.productId}, 'price', this.value)"><span style="min-width:70px;color:#4ade80">${(item.price * item.qty).toFixed(2)} ج</span><i class="ti ti-trash remove-item" onclick="removeFromCart(${item.productId})"></i></div></div>`).join('');
      }
    }
    const total = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);
    if(document.getElementById('cartTotal')) document.getElementById('cartTotal').innerHTML = `المجموع: ${total.toFixed(2)} ج`;
    refreshPaymentDetails();
    updateBalanceSummary();
    
    const invTbody = document.getElementById('recentInvoices');
    if(invTbody) invTbody.innerHTML = invoices.slice(-5).reverse().map(inv => `<tr><td style="color:#ffffff">${inv.id}</td><td style="color:#ffffff">${inv.customerName}</td><td style="color:#4ade80">${inv.total} ج</td><td style="color:#94a3b8">${new Date(inv.date).toLocaleDateString('ar-EG')}</td></tr>`).join('');
  }
  
  function completeSale() {
    if(!selectedCustomer) { alert('برجاء اختيار العميل'); return; }
    if(currentCart.length === 0) { alert('السلة فارغة'); return; }
    const total = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);
    if(selectedPaymentMethod === 'cash') { const paid = parseFloat(document.getElementById('paidAmount')?.value)||0; if(paid < total) { alert(`المبلغ المدفوع أقل من الإجمالي`); return; } }
    else selectedCustomer.balance += total;
    
    let totalProfit = 0;
    for(let item of currentCart) {
      const product = products.find(p => p.id === item.productId);
      if(product && product.qty >= item.qty) { totalProfit += (item.price - product.cost) * item.qty; product.qty -= item.qty; }
      else { alert(`المنتج ${item.name} غير متوفر`); return; }
    }
    
    const newInvoice = { id: nextInvoiceId++, customerId: selectedCustomer.id, customerName: selectedCustomer.name, items: [...currentCart], total, totalProfit, paymentMethod: selectedPaymentMethod, paidAmount: selectedPaymentMethod === 'cash' ? parseFloat(document.getElementById('paidAmount')?.value) : total, date: new Date().toISOString() };
    invoices.push(newInvoice);
    // تسجيل سند قبض تلقائي عند البيع النقدي
    if(selectedPaymentMethod === 'cash' && treasuries.length > 0) {
      const paidAmt = parseFloat(document.getElementById('paidAmount')?.value)||total;
      const v = { id: nextVoucherId++, type: 'receipt', amount: total, treasuryId: treasuries[0].id, party: selectedCustomer.name, note: 'مبيعات - فاتورة رقم ' + newInvoice.id, date: new Date().toISOString() };
      vouchers.push(v);
      treasuries[0].balance += total;
    }
    saveAllData();
    currentCart = [];
    refreshSalesUI();
    alert(`✅ تم البيع بنجاح\nرقم الفاتورة: ${newInvoice.id}\nالمجموع: ${total} ج`);
  }
  
  // دالة طباعة الفاتورة الحالية (للمبيعات)
  function showPrintPreview() {
    if(currentCart.length === 0) { alert('لا توجد فاتورة للطباعة'); return; }
    const total = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);
    const paid = selectedPaymentMethod === 'cash' ? (parseFloat(document.getElementById('paidAmount')?.value) || total) : total;
    const change = selectedPaymentMethod === 'cash' ? paid - total : 0;
    const prevBalance = selectedCustomer ? selectedCustomer.balance - (selectedPaymentMethod === 'credit' ? total : 0) : 0;
    const newBalance = selectedCustomer ? selectedCustomer.balance : 0;
    const html = generateInvoiceHTML(currentCart, selectedCustomer, total, paid, change, prevBalance, newBalance, selectedPaymentMethod);
    document.getElementById('invoicePrintContent').innerHTML = html;
    document.getElementById('printModal').classList.add('open');
  }

  function attachInventoryEvents() {
    document.getElementById('logoutInv')?.addEventListener('click', () => { currentUser=null; localStorage.removeItem('crizmaUser'); navigateTo('login'); });
    document.querySelectorAll('[data-nav]').forEach(el => { el.addEventListener('click', () => navigateTo(el.getAttribute('data-nav'))); });
    document.getElementById('newProductBtn')?.addEventListener('click', () => { editProductId = null; document.getElementById('productModalTitle').innerHTML = '<i class="ti ti-package"></i> إضافة منتج جديد'; document.getElementById('productName').value = ''; document.getElementById('productCode').value = 'PRD-' + String(products.length+1).padStart(3,'0'); document.getElementById('productQty').value = 0; document.getElementById('productMin').value = 10; document.getElementById('productCost').value = 0; document.getElementById('productPrice').value = 0; document.getElementById('productModal').classList.add('open'); });
    document.getElementById('saveProductBtn')?.addEventListener('click', () => {
      const name = document.getElementById('productName').value.trim();
      if(!name) { alert('برجاء إدخال اسم المنتج'); return; }
      const newProduct = { id: editProductId || Date.now(), code: document.getElementById('productCode').value, name: name, wh: document.getElementById('productWh').value, qty: parseInt(document.getElementById('productQty').value)||0, min: parseInt(document.getElementById('productMin').value)||10, cost: parseFloat(document.getElementById('productCost').value)||0, price: parseFloat(document.getElementById('productPrice').value)||0 };
      if(editProductId) { const idx = products.findIndex(p=>p.id===editProductId); if(idx!==-1) products[idx] = newProduct; }
      else products.push(newProduct);
      saveAllData();
      document.getElementById('productModal').classList.remove('open');
      refreshProductsTable();
    });
    document.getElementById('closeProductModal')?.addEventListener('click', () => document.getElementById('productModal').classList.remove('open'));
    document.getElementById('productSearch')?.addEventListener('input', () => { productsPage=1; refreshProductsTable(); });
    document.getElementById('whFilter')?.addEventListener('change', () => { productsPage=1; refreshProductsTable(); });

    // إدارة المخازن
    document.getElementById('manageWhBtn')?.addEventListener('click', () => {
      renderWarehousesList();
      document.getElementById('warehouseModal').classList.add('open');
    });
    document.getElementById('closeWhModal')?.addEventListener('click', () => document.getElementById('warehouseModal').classList.remove('open'));
    document.getElementById('addWhBtn')?.addEventListener('click', () => {
      const name = document.getElementById('newWhName').value.trim();
      if(!name) { alert('برجاء إدخال اسم المخزن'); return; }
      if(warehouses.includes(name)) { alert('هذا المخزن موجود بالفعل'); return; }
      warehouses.push(name);
      saveAllData();
      document.getElementById('newWhName').value = '';
      renderWarehousesList();
      // تحديث قوائم الاختيار
      const whSel = document.getElementById('productWh');
      if(whSel) { whSel.innerHTML = warehouses.map(w=>`<option>${w}</option>`).join(''); }
      const whFilter = document.getElementById('whFilter');
      if(whFilter) { const cur = whFilter.value; whFilter.innerHTML = `<option value="">📦 كل المخازن</option>${warehouses.map(w=>`<option value="${w}" ${w===cur?'selected':''}>${w}</option>`).join('')}`; }
    });
    document.getElementById('exportProductsBtn')?.addEventListener('click', () => { const ws = XLSX.utils.json_to_sheet(products.map(p => ({ الكود: p.code, 'اسم المنتج': p.name, المخزن: p.wh, الكمية: p.qty, 'الحد الأدنى': p.min, 'سعر الشراء': p.cost, 'سعر البيع': p.price }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'المنتجات'); XLSX.writeFile(wb, `products_${Date.now()}.xlsx`); });
    document.getElementById('importProductsBtn')?.addEventListener('click', () => document.getElementById('importProductsFile').click());
    document.getElementById('importProductsFile')?.addEventListener('change', (e) => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws);
          let added = 0;
          rows.forEach(row => {
            const name = row['اسم المنتج'] || row['name'] || '';
            if(!name) return;
            const exists = products.find(p => p.name === name);
            if(!exists) {
              products.push({ id: Date.now() + Math.random(), code: row['الكود'] || row['code'] || 'PRD-'+products.length, name, wh: row['المخزن'] || row['warehouse'] || 'المخزن الرئيسي', qty: parseInt(row['الكمية'] || row['qty']) || 0, min: parseInt(row['الحد الأدنى'] || row['min']) || 10, cost: parseFloat(row['سعر الشراء'] || row['cost']) || 0, price: parseFloat(row['سعر البيع'] || row['price']) || 0 });
              added++;
            }
          });
          saveAllData(); refreshProductsTable(); alert(`تم استيراد ${added} منتج جديد`);
        } catch(err) { alert('خطأ في قراءة الملف'); }
      };
      reader.readAsBinaryString(file);
      e.target.value = '';
    });
    refreshProductsTable();

    // ========== منطق التحويل بين المخازن ==========
    function openTransferModal() {
      // ملء قائمة المنتجات
      const sel = document.getElementById('transferProduct');
      if(sel) {
        sel.innerHTML = '<option value="">-- اختر المنتج --</option>' +
          products.map(p=>`<option value="${p.id}">${p.name} (${p.wh} — ${p.qty} قطعة)</option>`).join('');
      }
      // ملء قوائم المخازن
      const fromSel = document.getElementById('transferFrom');
      const toSel   = document.getElementById('transferTo');
      if(fromSel) fromSel.innerHTML = warehouses.map(w=>`<option>${w}</option>`).join('');
      if(toSel)   toSel.innerHTML   = warehouses.map(w=>`<option>${w}</option>`).join('');
      // إخفاء رسالة الخطأ
      const msg = document.getElementById('transferMsg');
      if(msg) { msg.style.display='none'; msg.textContent=''; }
      document.getElementById('transferModal').classList.add('open');
    }

    // ربط زر فتح المودال
    document.getElementById('openTransferBtn')?.addEventListener('click', openTransferModal);

    // لما يختار منتج → اضبط "من مخزن" تلقائياً
    document.getElementById('transferProduct')?.addEventListener('change', function() {
      const pid = parseInt(this.value);
      const p = products.find(x=>x.id===pid);
      if(p) {
        const fromSel = document.getElementById('transferFrom');
        if(fromSel) fromSel.value = p.wh;
      }
    });

    // تنفيذ التحويل
    document.getElementById('confirmTransferBtn')?.addEventListener('click', () => {
      const pid  = parseInt(document.getElementById('transferProduct').value);
      const from = document.getElementById('transferFrom').value;
      const to   = document.getElementById('transferTo').value;
      const qty  = parseInt(document.getElementById('transferQty').value)||0;
      const note = document.getElementById('transferNote').value.trim();
      const msg  = document.getElementById('transferMsg');

      const showMsg = (text, ok) => {
        msg.style.display='block';
        msg.style.background = ok ? 'rgba(74,222,128,0.15)' : 'rgba(248,113,113,0.15)';
        msg.style.color = ok ? '#4ade80' : '#f87171';
        msg.style.border = `1px solid ${ok?'rgba(74,222,128,0.4)':'rgba(248,113,113,0.4)'}`;
        msg.textContent = text;
      };

      if(!pid)     { showMsg('⚠️ اختر المنتج أولاً', false); return; }
      if(from===to){ showMsg('⚠️ المخزن المصدر والهدف متشابهان!', false); return; }
      if(qty<=0)   { showMsg('⚠️ الكمية يجب أن تكون أكبر من صفر', false); return; }

      // إيجاد المنتج في المخزن المصدر
      const srcProd = products.find(p=>p.id===pid && p.wh===from);
      if(!srcProd) { showMsg(`⚠️ المنتج غير موجود في "${from}"`, false); return; }
      if(srcProd.qty < qty) { showMsg(`⚠️ الكمية المتاحة في "${from}" هي ${srcProd.qty} فقط`, false); return; }

      // هل المنتج موجود في المخزن الهدف؟
      let destProd = products.find(p=>p.id!==pid && p.name===srcProd.name && p.wh===to);
      // نبحث عن نفس المنتج (بنفس الـ code) في المخزن الهدف
      let destProdSameCode = products.find(p=>p.code===srcProd.code && p.wh===to && p.id!==pid);

      // خصم من المصدر
      srcProd.qty -= qty;

      if(destProdSameCode) {
        // أضف على المنتج الموجود
        destProdSameCode.qty += qty;
      } else {
        // أنشئ نسخة جديدة في المخزن الهدف
        products.push({
          id: Date.now() + Math.random(),
          code: srcProd.code,
          name: srcProd.name,
          wh: to,
          qty: qty,
          min: srcProd.min,
          cost: srcProd.cost,
          price: srcProd.price
        });
      }

      // سجّل العملية
      warehouseTransfers.push({
        id: Date.now(),
        date: new Date().toISOString(),
        productName: srcProd.name,
        productCode: srcProd.code,
        from, to, qty, note,
        user: currentUser?.username || '---'
      });

      saveAllData();
      refreshProductsTable();
      showMsg(`✅ تم تحويل ${qty} قطعة من "${from}" إلى "${to}" بنجاح`, true);
      // تحديث قائمة المنتجات في المودال
      const sel = document.getElementById('transferProduct');
      if(sel) sel.innerHTML = '<option value="">-- اختر المنتج --</option>' +
        products.map(p=>`<option value="${p.id}">${p.name} (${p.wh} — ${p.qty} قطعة)</option>`).join('');
    });

    document.getElementById('closeTransferModal')?.addEventListener('click', () => {
      document.getElementById('transferModal').classList.remove('open');
    });

    // سجل التحويلات
    document.getElementById('closeTransferLogModal')?.addEventListener('click', () => {
      document.getElementById('transferLogModal').classList.remove('open');
    });
    document.getElementById('clearTransferLogBtn')?.addEventListener('click', () => {
      if(confirm('هل تريد مسح كل سجل التحويلات؟')) {
        warehouseTransfers = [];
        saveAllData();
        renderTransferLog();
      }
    });

    function renderTransferLog() {
      const body = document.getElementById('transferLogBody');
      if(!body) return;
      if(!warehouseTransfers.length) {
        body.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:2rem"><i class="ti ti-history" style="font-size:32px;display:block;margin-bottom:8px"></i>لا توجد عمليات تحويل بعد</div>';
        return;
      }
      const rows = [...warehouseTransfers].reverse().map(t=>`
        <tr>
          <td style="color:#94a3b8;font-size:11px">${new Date(t.date).toLocaleString('ar-EG')}</td>
          <td style="color:#38bdf8;font-weight:700">${t.productName}</td>
          <td style="color:#a78bfa">${t.from}</td>
          <td style="color:#4ade80">${t.to}</td>
          <td style="color:#fbbf24;font-weight:700">${t.qty}</td>
          <td style="color:#94a3b8">${t.note||'---'}</td>
          <td style="color:#64748b">${t.user}</td>
        </tr>`).join('');
      body.innerHTML = `<table class="inv-table" style="font-size:12px">
        <thead><tr><th>التاريخ</th><th>المنتج</th><th>من</th><th>إلى</th><th>الكمية</th><th>ملاحظة</th><th>المستخدم</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    // زر سجل التحويلات في صفحة المخازن
    window.openTransferLog = () => {
      renderTransferLog();
      document.getElementById('transferLogModal').classList.add('open');
    };
  }

              <button onclick="window.deleteWarehouse('${escapedW}')" style="width:30px;height:30px;border-radius:8px;border:none;background:rgba(220,38,38,0.15);color:#f87171;cursor:pointer" title="حذف"><i class="ti ti-trash"></i></button>

    }).join('') || '<div style="color:#94a3b8;text-align:center;padding:1rem">لا توجد مخازن</div>';

  window.renameWarehouse = (oldName) => {
    const newName = prompt('الاسم الجديد للمخزن:', oldName);
    if(!newName || newName.trim() === oldName) return;
    if(warehouses.includes(newName.trim())) { alert('هذا الاسم مستخدم'); return; }
    const idx = warehouses.indexOf(oldName);
    if(idx > -1) warehouses[idx] = newName.trim();
    products.forEach(p => { if(p.wh === oldName) p.wh = newName.trim(); });
    saveAllData();
    renderWarehousesList();
    const whFilter = document.getElementById('whFilter');
    if(whFilter) { whFilter.innerHTML = `<option value="">📦 كل المخازن</option>${warehouses.map(w=>`<option value="${w}">${w}</option>`).join('')}`; }
    const whSel = document.getElementById('productWh');
    if(whSel) whSel.innerHTML = warehouses.map(w=>`<option>${w}</option>`).join('');
  };

  window.deleteWarehouse = (name) => {
    const prodsInWh = products.filter(p => p.wh === name);
    const otherWarehouses = [...new Set([...warehouses, ...products.map(p=>p.wh).filter(Boolean)])].filter(w => w !== name);

    if (prodsInWh.length > 0) {
      // بناء مودال الاختيار
      const existing = document.getElementById('deleteWhModal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'deleteWhModal';
      modal.className = 'modal-bg open';
      modal.innerHTML = '<div class="modal" style="max-width:480px">'
        + '<div class="modal-title" style="color:#f87171"><i class="ti ti-alert-triangle" style="color:#f87171"></i> حذف المخزن "' + name + '"</div>'
        + '<div style="color:#94a3b8;margin-bottom:1rem;font-size:13px">يحتوي هذا المخزن على <strong style="color:#fbbf24">' + prodsInWh.length + ' صنف</strong>. اختر ماذا تريد أن تفعل بالمنتجات:</div>'
        + (otherWarehouses.length > 0
          ? '<div style="margin-bottom:10px"><label style="color:#fff;display:block;margin-bottom:6px">نقل المنتجات إلى مخزن آخر:</label>'
            + '<select id="moveToWh" style="width:100%;padding:10px;background:#0f172a;border:1px solid rgba(56,189,248,0.3);border-radius:10px;color:#fff">'
            + otherWarehouses.map(w => '<option>' + w + '</option>').join('')
            + '</select></div>'
            + '<div class="modal-foot" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem">'
            + '<button id="moveAndDeleteWhBtn" class="btn btn-primary"><i class="ti ti-arrows-exchange"></i> نقل وحذف المخزن</button>'
            + '<button id="deleteWhAndProdsBtn" class="btn btn-danger"><i class="ti ti-trash"></i> حذف المخزن والمنتجات</button>'
            + '<button id="cancelDeleteWhBtn" class="btn btn-outline">إلغاء</button>'
            + '</div>'
          : '<div style="color:#f87171;margin-bottom:1rem;font-size:12px">⚠️ لا يوجد مخازن أخرى للنقل إليها.</div>'
            + '<div class="modal-foot" style="display:flex;gap:8px;margin-top:1rem">'
            + '<button id="deleteWhAndProdsBtn" class="btn btn-danger"><i class="ti ti-trash"></i> حذف المخزن والمنتجات</button>'
            + '<button id="cancelDeleteWhBtn" class="btn btn-outline">إلغاء</button>'
            + '</div>')
        + '</div>';

      document.body.appendChild(modal);

      document.getElementById('cancelDeleteWhBtn')?.addEventListener('click', () => modal.remove());

      document.getElementById('moveAndDeleteWhBtn')?.addEventListener('click', () => {
        const dest = document.getElementById('moveToWh').value;
        prodsInWh.forEach(p => {
          // هل يوجد نفس المنتج (بنفس الكود) في المخزن الهدف؟
          const existing = products.find(x => x.code === p.code && x.wh === dest && x.id !== p.id);
          if (existing) {
            existing.qty += p.qty;
            products.splice(products.findIndex(x => x.id === p.id), 1);
          } else {
            p.wh = dest;
          }
        });
        const wi1 = warehouses.indexOf(name); if(wi1 > -1) warehouses.splice(wi1, 1);
        saveAllData();
        renderWarehousesList();
        modal.remove();
        const whFilter = document.getElementById('whFilter');
        if(whFilter) whFilter.innerHTML = '<option value="">📦 كل المخازن</option>' + warehouses.map(w=>'<option value="'+w+'">'+w+'</option>').join('');
        const whSel = document.getElementById('productWh');
        if(whSel) whSel.innerHTML = warehouses.map(w=>'<option>'+w+'</option>').join('');
        if(typeof refreshProductsTable === 'function') refreshProductsTable();
        alert('تم نقل المنتجات إلى "' + dest + '" وحذف المخزن بنجاح');
      });

      document.getElementById('deleteWhAndProdsBtn')?.addEventListener('click', () => {
        if (!confirm('سيتم حذف المخزن و' + prodsInWh.length + ' منتج نهائياً. هل أنت متأكد؟')) return;
        prodsInWh.forEach(p => { const i = products.findIndex(x => x.id === p.id); if(i > -1) products.splice(i, 1); });
        const wi2 = warehouses.indexOf(name); if(wi2 > -1) warehouses.splice(wi2, 1);
        saveAllData();
        renderWarehousesList();
        modal.remove();
        const whFilter = document.getElementById('whFilter');
        if(whFilter) whFilter.innerHTML = '<option value="">📦 كل المخازن</option>' + warehouses.map(w=>'<option value="'+w+'">'+w+'</option>').join('');
        const whSel = document.getElementById('productWh');
        if(whSel) whSel.innerHTML = warehouses.map(w=>'<option>'+w+'</option>').join('');
        if(typeof refreshProductsTable === 'function') refreshProductsTable();
      });

    } else {
      if(confirm('هل تريد حذف المخزن "' + name + '"؟')) {
        const wi3 = warehouses.indexOf(name); if(wi3 > -1) warehouses.splice(wi3, 1);
        saveAllData();
        renderWarehousesList();
        const whFilter = document.getElementById('whFilter');
        if(whFilter) whFilter.innerHTML = '<option value="">📦 كل المخازن</option>' + warehouses.map(w=>'<option value="'+w+'">'+w+'</option>').join('');
        const whSel = document.getElementById('productWh');
        if(whSel) whSel.innerHTML = warehouses.map(w=>'<option>'+w+'</option>').join('');
      }
    }
  };

  function refreshProductsTable() {
    const search = document.getElementById('productSearch')?.value.toLowerCase() || '';
    const whFilter = document.getElementById('whFilter')?.value || '';
    let filtered = products.filter(p => (p.name.toLowerCase().includes(search) || p.code.toLowerCase().includes(search)) && (!whFilter || p.wh === whFilter));
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if(productsPage > totalPages) productsPage = totalPages||1;
    const start = (productsPage-1)*PAGE_SIZE;
    const pageItems = filtered.slice(start, start+PAGE_SIZE);
    const tbody = document.getElementById('productsTableBody');
    if(tbody) tbody.innerHTML = pageItems.map((p, idx) => {
      const globalIdx = products.findIndex(pr=>pr.id===p.id);
      return `<tr><td style="color:#94a3b8">${start+idx+1}</td><td style="color:#38bdf8">${p.code}</td><td style="color:#ffffff">${p.name}</td><td><span style="background:rgba(167,139,250,0.15);color:#a78bfa;padding:3px 8px;border-radius:6px;font-size:11px"><i class="ti ti-building-warehouse"></i> ${p.wh}</span></td><td style="color:#ffffff">${p.qty}</td><td style="color:#ffffff">${p.cost.toFixed(2)} ج</td><td style="color:#4ade80">${p.price.toFixed(2)} ج</td><td>${getStatus(p)==='ok'?'<span class="badge badge-ok">متوفر</span>':getStatus(p)==='low'?'<span class="badge badge-low">منخفض</span>':'<span class="badge badge-zero">نفاد</span>'}</td><td><div class="action-btns"><button class="act-btn act-add" onclick="window.addProductQty(${globalIdx})" title="إضافة كمية"><i class="ti ti-plus"></i></button><button class="act-btn act-edit" onclick="window.editProduct(${globalIdx})" title="تعديل"><i class="ti ti-edit"></i></button><button class="act-btn act-del" onclick="window.deleteProduct(${globalIdx})" title="حذف"><i class="ti ti-trash"></i></button></div></td></tr>`;
    }).join('');
    if(document.getElementById('productsPagInfo')) document.getElementById('productsPagInfo').innerHTML = `عرض ${Math.min(start+1,filtered.length)}-${Math.min(start+PAGE_SIZE,filtered.length)} من ${filtered.length}`;
    const pagDiv = document.getElementById('productsPagBtns');
    if(pagDiv) { pagDiv.innerHTML = ''; for(let i=1;i<=totalPages;i++){ const btn = document.createElement('button'); btn.className = `pag-btn ${i===productsPage?'cur':''}`; btn.innerText = i; btn.onclick = () => { productsPage=i; refreshProductsTable(); }; pagDiv.appendChild(btn); } }
  }
  
  window.addProductQty = (idx) => { let inc = parseInt(prompt('الكمية المضافة:')); if(inc>0) { products[idx].qty += inc; saveAllData(); refreshProductsTable(); } };
  window.editProduct = (idx) => { const p = products[idx]; editProductId = p.id; document.getElementById('productModalTitle').innerHTML = '<i class="ti ti-edit"></i> تعديل المنتج'; document.getElementById('productName').value = p.name; document.getElementById('productCode').value = p.code; document.getElementById('productWh').value = p.wh; document.getElementById('productQty').value = p.qty; document.getElementById('productMin').value = p.min; document.getElementById('productCost').value = p.cost; document.getElementById('productPrice').value = p.price; document.getElementById('productModal').classList.add('open'); };
  window.deleteProduct = (idx) => { if(confirm('هل تريد حذف هذا المنتج نهائياً؟')) { products.splice(idx,1); saveAllData(); refreshProductsTable(); } };
  
  // ========== شاشة العملاء ==========

        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws);
          let added = 0;
          rows.forEach(row => {
            const name = row['الاسم'] || row['name'] || '';
            if(!name) return;
            const exists = customers.find(c => c.name === name);
            if(!exists) {
              customers.push({ id: Date.now() + Math.random(), name, phone: row['الهاتف'] || row['phone'] || '', address: row['العنوان'] || row['address'] || '', balance: parseFloat(row['الرصيد'] || row['balance']) || 0 });

            }
          });

        } catch(err) { alert('خطأ في قراءة الملف'); }
      };
      reader.readAsBinaryString(file);
      e.target.value = '';
    });

    if(from) filtered = filtered.filter(i => new Date(i.date) >= new Date(from));
    if(to) { const td = new Date(to); td.setDate(td.getDate()+1); filtered = filtered.filter(i => new Date(i.date) < td); }
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if(invoicesPage > totalPages) invoicesPage = totalPages||1;
    const start = (invoicesPage-1)*PAGE_SIZE;
    const pageItems = filtered.slice(start, start+PAGE_SIZE);

    `).join('');
    if(document.getElementById('invoicesPagInfo')) document.getElementById('invoicesPagInfo').innerHTML = `عرض ${Math.min(start+1,filtered.length)}-${Math.min(start+PAGE_SIZE,filtered.length)} من ${filtered.length}`;
    const pagDiv = document.getElementById('invoicesPagBtns');
    if(pagDiv) { pagDiv.innerHTML = ''; for(let i=1;i<=totalPages;i++){ const btn = document.createElement('button'); btn.className = `pag-btn ${i===invoicesPage?'cur':''}`; btn.innerText = i; btn.onclick = () => { invoicesPage=i; refreshInvoicesTable(); }; pagDiv.appendChild(btn); } }

  function saveInvoiceEdit(inv) {
    let newTotal = 0;
    for(let i=0; i<inv.items.length; i++) {
      const newQty = parseInt(document.getElementById(`qty_${i}`).value);
      const newPrice = parseFloat(document.getElementById(`price_${i}`).value);
      if(newQty > 0 && newPrice > 0) {
        const oldQty = inv.items[i].qty;
        const product = products.find(p => p.id === inv.items[i].productId);
        if(product) { const qtyDiff = oldQty - newQty; product.qty += qtyDiff; }
        inv.items[i].qty = newQty;
        inv.items[i].price = newPrice;
        newTotal += newPrice * newQty;
      }
    }
    inv.total = newTotal;
    inv.paymentMethod = document.getElementById('editPaymentMethod').value;
    inv.totalProfit = inv.items.reduce((sum, item) => { const prod = products.find(p => p.id === item.productId); return sum + ((item.price - (prod?.cost || 0)) * item.qty); }, 0);
    saveAllData();
    document.getElementById('editInvoiceModal').classList.remove('open');
    refreshInvoicesTable();
    alert('تم تعديل الفاتورة بنجاح');
  }
  
  function deleteInvoiceConfirm(id) {
    if(confirm('هل تريد حذف هذه الفاتورة نهائياً؟ سيتم إرجاع الكميات للمخزون.')) {
      const inv = invoices.find(i => i.id === id);
      if(inv) {
        for(let item of inv.items) { const product = products.find(p => p.id === item.productId); if(product) product.qty += item.qty; }
        invoices = invoices.filter(i => i.id !== id);
        if(inv.paymentMethod === 'credit') { const customer = customers.find(c => c.id === inv.customerId); if(customer) customer.balance -= inv.total; }
        saveAllData();
        document.getElementById('editInvoiceModal').classList.remove('open');
        refreshInvoicesTable();
        alert('تم حذف الفاتورة وإرجاع الكميات للمخزون');
      }
    }
  }

    const inv = invoices.find(i => i.id === id);

    const customer = customers.find(c => c.id === inv.customerId);
    const invTotal = inv.total;
    const paidAmt = inv.paidAmount !== undefined ? inv.paidAmount : invTotal;
    const changeAmt = inv.paymentMethod === 'cash' ? paidAmt - invTotal : 0;
    const prevBalance = customer ? (customer.balance - (inv.paymentMethod === 'credit' ? invTotal : 0)) : 0;
    const newBalance = customer ? customer.balance : 0;
    const html = generateInvoiceHTML(inv.items, customer || { name: inv.customerName, phone: '---' }, invTotal, paidAmt, changeAmt, prevBalance, newBalance, inv.paymentMethod, inv.id);

  function attachReportsEvents() {
    document.getElementById('logoutRep')?.addEventListener('click', () => { currentUser=null; localStorage.removeItem('crizmaUser'); navigateTo('login'); });

    // تقرير المخازن
    function renderWhReport() {
      const el = document.getElementById('whReportTable');
      if (!el) return;
      const allWh = [...new Set([...warehouses, ...products.map(p => p.wh).filter(Boolean)])];
      let tItems = 0, tQty = 0, tCost = 0, tSale = 0;
      let rows = '';
      allWh.forEach(w => {
        const wp = products.filter(p => p.wh === w);
        const qty = wp.reduce((s, p) => s + p.qty, 0);
        const cost = wp.reduce((s, p) => s + (p.cost * p.qty), 0);
        const sale = wp.reduce((s, p) => s + (p.price * p.qty), 0);
        tItems += wp.length; tQty += qty; tCost += cost; tSale += sale;
        rows += '<tr>'
          + '<td style="color:#a78bfa;font-weight:700">' + w + '</td>'
          + '<td style="color:#fff">' + wp.length + '</td>'
          + '<td style="color:#38bdf8">' + qty.toLocaleString() + '</td>'
          + '<td style="color:#fbbf24">' + cost.toFixed(2) + ' ج</td>'
          + '<td style="color:#4ade80">' + sale.toFixed(2) + ' ج</td>'
          + '<td style="color:#a78bfa">' + (sale - cost).toFixed(2) + ' ج</td>'
          + '</tr>';
      });
      rows += '<tr style="border-top:2px solid rgba(56,189,248,0.4)">'
        + '<td style="color:#fff;font-weight:800">الإجمالي</td>'
        + '<td style="color:#fff;font-weight:800">' + tItems + '</td>'
        + '<td style="color:#38bdf8;font-weight:800">' + tQty.toLocaleString() + '</td>'
        + '<td style="color:#fbbf24;font-weight:800">' + tCost.toFixed(2) + ' ج</td>'
        + '<td style="color:#4ade80;font-weight:800">' + tSale.toFixed(2) + ' ج</td>'
        + '<td style="color:#a78bfa;font-weight:800">' + (tSale - tCost).toFixed(2) + ' ج</td>'
        + '</tr>';
      el.innerHTML = '<table class="inv-table" style="font-size:12px"><thead><tr>'
        + '<th>المخزن</th><th>عدد الأصناف</th><th>إجمالي الوحدات</th>'
        + '<th>قيمة التكلفة</th><th>قيمة البيع</th><th>هامش الربح</th>'
        + '</tr></thead><tbody>' + rows + '</tbody></table>';
    }
    renderWhReport();
    document.querySelectorAll('[data-nav]').forEach(el => { el.addEventListener('click', () => navigateTo(el.getAttribute('data-nav'))); });
    const renderRepTable = (list) => {
      const tbody = document.getElementById('repInvBody');
      if(!tbody) return;
      tbody.innerHTML = list.map(inv=>`<td><td style="color:#38bdf8">#${inv.id}</td><td style="color:#ffffff">${inv.customerName}</td><td style="color:#4ade80">${inv.total.toFixed(2)} ج</td><td style="color:#a78bfa">${(inv.totalProfit||0).toFixed(2)} ج</td><td><span class="badge ${inv.paymentMethod==='cash'?'badge-ok':'badge-low'}">${inv.paymentMethod==='cash'?'كاش':'آجل'}</span></td><td style="color:#94a3b8">${new Date(inv.date).toLocaleDateString('ar-EG')}</td></tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#94a3b8">لا توجد فواتير</td></tr>';
      const tot = list.reduce((s,i)=>s+i.total,0);
      const prof = list.reduce((s,i)=>s+(i.totalProfit||0),0);
      const el = document.getElementById('repTotalLabel');
      if(el) el.innerHTML = `مبيعات: ${tot.toFixed(2)} ج &nbsp;|&nbsp; أرباح: <span style="color:#a78bfa">${prof.toFixed(2)} ج</span>`;
    };
    const filterInv = () => {
      const period = document.getElementById('reportPeriod')?.value;
      const from = document.getElementById('repDateFrom')?.value;
      const to = document.getElementById('repDateTo')?.value;
      let list = [...invoices];
      const now = new Date(); const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
      if(period==='today') list = list.filter(i=>new Date(i.date)>=today);
      else if(period==='week') { const wk = new Date(today); wk.setDate(wk.getDate()-7); list=list.filter(i=>new Date(i.date)>=wk); }
      else if(period==='month') { const mo = new Date(today); mo.setDate(1); list=list.filter(i=>new Date(i.date)>=mo); }
      if(from) list=list.filter(i=>new Date(i.date)>=new Date(from));
      if(to) { const td = new Date(to); td.setDate(td.getDate()+1); list=list.filter(i=>new Date(i.date)<td); }
      renderRepTable(list);
    };
    document.getElementById('reportPeriod')?.addEventListener('change', filterInv);
    document.getElementById('filterRepBtn')?.addEventListener('click', filterInv);
    document.getElementById('exportReportBtn')?.addEventListener('click', () => {
      const rows = invoices.map(inv=>({ 'رقم الفاتورة': inv.id, العميل: inv.customerName, المبيعات: inv.total, الأرباح: inv.totalProfit||0, 'نوع الدفع': inv.paymentMethod==='cash'?'كاش':'آجل', التاريخ: new Date(inv.date).toLocaleDateString('ar-EG') }));
      const ws = XLSX.utils.json_to_sheet(rows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'التقارير'); XLSX.writeFile(wb,`report_${Date.now()}.xlsx`);
    });
    filterInv();
  }

  function attachTreasuryEvents() {
    attachNavLogout();

      editTreasuryIdx = null;
      document.getElementById('treasuryModalTitle').textContent = 'إضافة خزينة جديدة';
      document.getElementById('treasuryName').value = '';
      document.getElementById('treasuryBalance').value = '0';
      document.getElementById('treasuryDesc').value = '';

    });
    document.getElementById('closeTreasuryModal')?.addEventListener('click', () => document.getElementById('treasuryModal').classList.remove('open'));
    document.getElementById('saveTreasuryBtn')?.addEventListener('click', () => {
      const name = document.getElementById('treasuryName').value.trim();
      if(!name) { alert('برجاء إدخال اسم الخزينة'); return; }
      const balance = parseFloat(document.getElementById('treasuryBalance').value)||0;
      const description = document.getElementById('treasuryDesc').value.trim();
      if(editTreasuryIdx !== null) {
        treasuries[editTreasuryIdx] = { ...treasuries[editTreasuryIdx], name, description };
      } else {
        treasuries.push({ id: Date.now(), name, balance, description });
      }
      saveAllData();
      document.getElementById('treasuryModal').classList.remove('open');
      document.getElementById('treasuriesList').innerHTML = renderTreasuriesCards();
    });
    window.editTreasury = (idx) => {
      editTreasuryIdx = idx;
      const t = treasuries[idx];
      document.getElementById('treasuryModalTitle').textContent = 'تعديل الخزينة';
      document.getElementById('treasuryName').value = t.name;
      document.getElementById('treasuryBalance').value = t.balance;
      document.getElementById('treasuryDesc').value = t.description||'';
      document.getElementById('treasuryModal').classList.add('open');
    };
    window.deleteTreasury = (idx) => {
      const t = treasuries[idx];
      const hasVouchers = vouchers.some(v=>v.treasuryId===t.id);
      if(hasVouchers) { alert('لا يمكن حذف خزينة لها سندات مرتبطة بها'); return; }
      if(confirm(`هل تريد حذف الخزينة "${t.name}"؟`)) {
        treasuries.splice(idx,1);
        saveAllData();
        document.getElementById('treasuriesList').innerHTML = renderTreasuriesCards();
      }
    };
  }

  function refreshVouchersTable(filter = {}) {
    let list = [...vouchers];
    if(filter.type) list = list.filter(v=>v.type===filter.type);
    if(filter.from) list = list.filter(v=>new Date(v.date)>=new Date(filter.from));
    if(filter.to) { const td=new Date(filter.to); td.setDate(td.getDate()+1); list=list.filter(v=>new Date(v.date)<td); }
    list = list.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const tbody = document.getElementById('vouchersTableBody');
    if(!tbody) return;
    tbody.innerHTML = list.map(v=>{
      const treas = treasuries.find(t=>t.id===v.treasuryId);
      return `<tr>
        <td style="color:#38bdf8">SND-${String(v.id).padStart(4,'0')}</td>

      const type = document.getElementById('voucherPartyType')?.value;
      if(type === 'manual') return document.getElementById('voucherParty')?.value.trim() || '';
      return document.getElementById('voucherPartySelect')?.value || '';

    document.getElementById('closeVoucherModal')?.addEventListener('click', () => document.getElementById('voucherModal').classList.remove('open'));
    document.getElementById('saveVoucherBtn')?.addEventListener('click', () => {
      const amount = parseFloat(document.getElementById('voucherAmount').value)||0;
      if(amount <= 0) { alert('برجاء إدخال مبلغ صحيح'); return; }
      const treasuryId = parseInt(document.getElementById('voucherTreasury').value);
      const type = document.getElementById('voucherType').value;
      const party = getPartyValue();
      const note = document.getElementById('voucherNote').value.trim();
      const todayLocal = new Date(); const date = document.getElementById('voucherDate').value || `${todayLocal.getFullYear()}-${String(todayLocal.getMonth()+1).padStart(2,'0')}-${String(todayLocal.getDate()).padStart(2,'0')}`;
      const treasury = treasuries.find(t=>t.id===treasuryId);
      if(!treasury) { alert('برجاء اختيار خزينة'); return; }
      if(type==='payment' && treasury.balance < amount) {
        if(!confirm(`رصيد الخزينة (${treasury.balance.toFixed(2)} ج) أقل من المبلغ. هل تريد المتابعة؟`)) return;
      }
      // إصلاح التاريخ: نحتفظ بالتاريخ المحلي مباشرة بدون تحويل UTC
      const dateISO = date ? (date + 'T12:00:00.000Z') : new Date().toISOString();
      const voucher = { id: nextVoucherId++, type, amount, treasuryId, party, note, date: dateISO };
      vouchers.push(voucher);
      if(type==='receipt') {
        treasury.balance += amount;
        // إذا كانت الجهة عميل: خصم المبلغ من رصيده (تسديد دين)
        const partyType = document.getElementById('voucherPartyType')?.value;
        if(partyType === 'customer') {
          const customer = customers.find(c => c.name === party);
          if(customer) customer.balance -= amount;
        }
      }
      else treasury.balance -= amount;
      saveAllData();
      document.getElementById('voucherModal').classList.remove('open');
      refreshVouchersTable();
      window.printVoucher(voucher.id);

          if(customer) customer.balance += v.amount;

  // ========== شاشة المركز المالي ==========
  function renderFinanceHTML() {
    const totalReceipts = vouchers.filter(v=>v.type==='receipt').reduce((s,v)=>s+v.amount,0);
    const totalPayments = vouchers.filter(v=>v.type==='payment').reduce((s,v)=>s+v.amount,0);
    const totalSales = invoices.reduce((s,i)=>s+i.total,0);
    const totalProfit = invoices.reduce((s,i)=>s+(i.totalProfit||0),0);
    const totalDebt = customers.filter(c=>c.balance>0).reduce((s,c)=>s+c.balance,0);
    const totalCredit = customers.filter(c=>c.balance<0).reduce((s,c)=>s+Math.abs(c.balance),0);
    const totalTreasury = treasuries.reduce((s,t)=>s+t.balance,0);
    const netCash = totalReceipts - totalPayments;
    // قيمة المخزون
    const totalInventoryCost = products.reduce((s,p)=>s+(p.cost*p.qty),0);
    const totalInventorySale = products.reduce((s,p)=>s+(p.price*p.qty),0);
    const totalInventoryProfit = totalInventorySale - totalInventoryCost;
    // ديون الموردين
    const totalSupplierDebt = suppliers.filter(s=>s.balance>0).reduce((s,sup)=>s+sup.balance,0);
    const totalSupplierCredit = suppliers.filter(s=>s.balance<0).reduce((s,sup)=>s+Math.abs(sup.balance),0);
    // ديون المصانع والمغاسل من الرصيد الفعلي (يشمل الرصيد الافتتاحي + أوامر التشغيل)
    const totalFactoryDebt = factories.filter(f=>f.balance>0).reduce((s,f)=>s+f.balance,0);
    const totalLaundryDebt = laundries.filter(l=>l.balance>0).reduce((s,l)=>s+l.balance,0);
    // ديون يدوية
    const totalManualDebt = debtEntries.filter(d=>d.totalAmount-d.paid>0).reduce((s,d)=>s+(d.totalAmount-d.paid),0);
    // إجمالي كل الديون
    const totalAllDebts = totalSupplierDebt + totalFactoryDebt + totalLaundryDebt + totalManualDebt;
    // صافي المركز المالي
    // صافي المركز المالي - المعادلة المحاسبية الصحيحة (الأصول - الخصوم)

      rows.push({ 'البيان': 'ديون المصانع (آجل)', 'القيمة': productionOrders.filter(po=>po.factoryId&&po.factoryPayment==='credit').reduce((s,po)=>s+(po.factoryTotal||0)-(po.factoryPaid||0),0).toFixed(2) });

      const sRows = suppliers.map(s=>({ 'المورد':s.name, 'الهاتف':s.phone||'', 'العنوان':s.address||'', 'إجمالي المشتريات':(s.totalPurchases||0).toFixed(2), 'المدفوع':(s.totalPaid||0).toFixed(2), 'الرصيد':s.balance.toFixed(2) }));

  function refreshSuppliersTable() {
    const search = document.getElementById('supplierSearch')?.value.toLowerCase() || '';
    let filtered = suppliers.filter(s => s.name.toLowerCase().includes(search) || (s.phone||'').includes(search));
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
    if(suppliersPage > totalPages) suppliersPage = 1;
    const start = (suppliersPage-1)*PAGE_SIZE;
    const pageItems = filtered.slice(start, start+PAGE_SIZE);
    const tbody = document.getElementById('suppliersTableBody');
    if(tbody) tbody.innerHTML = pageItems.map((s,idx) => {
      const globalIdx = suppliers.findIndex(x=>x.id===s.id);
      const balColor = s.balance > 0 ? '#f87171' : s.balance < 0 ? '#4ade80' : '#94a3b8';
      const balText = s.balance > 0 ? `عليه ${s.balance.toFixed(2)} ج` : s.balance < 0 ? `له ${Math.abs(s.balance).toFixed(2)} ج` : 'متوازن';
      return `<tr>
        <td style="color:#94a3b8">${start+idx+1}</td>
        <td style="color:#ffffff;font-weight:700">${s.name}</td>
        <td style="color:#38bdf8">${s.phone||'---'}</td>
        <td style="color:#94a3b8">${s.address||'---'}</td>
        <td style="color:#fbbf24">${(s.totalPurchases||0).toFixed(2)} ج</td>
        <td style="color:#4ade80">${(s.totalPaid||0).toFixed(2)} ج</td>
        <td style="color:${balColor};font-weight:700">${balText}</td>
        <td><div class="action-btns">
          <button class="act-btn act-view" onclick="window.viewSupplierTx(${globalIdx})" title="المعاملات"><i class="ti ti-history"></i></button>
          <button class="act-btn act-edit" onclick="window.editSupplier(${globalIdx})" title="تعديل"><i class="ti ti-edit"></i></button>
          <button class="act-btn act-del" onclick="window.deleteSupplier(${globalIdx})" title="حذف"><i class="ti ti-trash"></i></button>
        </div></td>
      </tr>`;
    }).join('') || '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:2rem">لا يوجد موردون</td></tr>';
    if(document.getElementById('suppliersPagInfo')) document.getElementById('suppliersPagInfo').innerHTML = `عرض ${Math.min(start+1,filtered.length)}-${Math.min(start+PAGE_SIZE,filtered.length)} من ${filtered.length}`;
    const pagDiv = document.getElementById('suppliersPagBtns');
    if(pagDiv) { pagDiv.innerHTML=''; for(let i=1;i<=totalPages;i++){ const btn=document.createElement('button'); btn.className=`pag-btn ${i===suppliersPage?'cur':''}`; btn.innerText=i; btn.onclick=()=>{suppliersPage=i;refreshSuppliersTable();}; pagDiv.appendChild(btn); } }
  }

  let currentSupplierIdx = null;

  function attachSuppliersEvents() {
    attachNavLogout();
    document.getElementById('newSupplierBtn')?.addEventListener('click', () => {
      editSupplierId = null;
      document.getElementById('supplierModalTitle').textContent = 'إضافة مورد جديد';
      document.getElementById('supplierName').value = '';
      document.getElementById('supplierPhone').value = '';
      document.getElementById('supplierAddress').value = '';
      document.getElementById('supplierEmail').value = '';
      document.getElementById('supplierProducts').value = '';
      document.getElementById('supplierNotes').value = '';
      document.getElementById('supplierBalanceField').style.display = 'block';
      document.getElementById('supplierBalance').value = '0';
      document.getElementById('supplierModal').classList.add('open');
    });
    document.getElementById('closeSupplierModal')?.addEventListener('click', () => document.getElementById('supplierModal').classList.remove('open'));
    document.getElementById('saveSupplierBtn')?.addEventListener('click', () => {
      const name = document.getElementById('supplierName').value.trim();
      if(!name) { alert('برجاء إدخال اسم المورد'); return; }
      const phone = document.getElementById('supplierPhone').value.trim();
      const address = document.getElementById('supplierAddress').value.trim();
      const email = document.getElementById('supplierEmail').value.trim();
      const products_spec = document.getElementById('supplierProducts').value.trim();
      const notes = document.getElementById('supplierNotes').value.trim();
      if(editSupplierId !== null) {
        const idx = suppliers.findIndex(s=>s.id===editSupplierId);
        if(idx !== -1) suppliers[idx] = { ...suppliers[idx], name, phone, address, email, products: products_spec, notes };
      } else {
        const balance = parseFloat(document.getElementById('supplierBalance').value)||0;
        suppliers.push({ id: nextSupplierId++, name, phone, address, email, products: products_spec, notes, balance, totalPurchases: balance > 0 ? balance : 0, totalPaid: balance < 0 ? Math.abs(balance) : 0, transactions: balance !== 0 ? [{ type: balance>0?'purchase':'payment', amount: Math.abs(balance), note: 'رصيد افتتاحي', date: new Date().toISOString() }] : [] });
      }
      saveAllData();
      document.getElementById('supplierModal').classList.remove('open');
      refreshSuppliersTable();
    });
    document.getElementById('supplierSearch')?.addEventListener('input', () => { suppliersPage=1; refreshSuppliersTable(); });
    document.getElementById('exportSuppliersBtn')?.addEventListener('click', () => {
      const rows = suppliers.map(s=>({ 'المورد':s.name, 'الهاتف':s.phone||'', 'العنوان':s.address||'', 'البريد':s.email||'', 'المنتجات':s.products||'', 'إجمالي المشتريات':(s.totalPurchases||0).toFixed(2), 'المدفوع':(s.totalPaid||0).toFixed(2), 'الرصيد':s.balance.toFixed(2), 'ملاحظات':s.notes||'' }));
      const ws = XLSX.utils.json_to_sheet(rows.length?rows:[{'المورد':'لا يوجد'}]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'الموردين');
      XLSX.writeFile(wb, `suppliers_${Date.now()}.xlsx`);
    });
    window.editSupplier = (idx) => {
      const s = suppliers[idx];
      editSupplierId = s.id;
      document.getElementById('supplierModalTitle').textContent = 'تعديل بيانات المورد';
      document.getElementById('supplierName').value = s.name;
      document.getElementById('supplierPhone').value = s.phone||'';
      document.getElementById('supplierAddress').value = s.address||'';
      document.getElementById('supplierEmail').value = s.email||'';
      document.getElementById('supplierProducts').value = s.products||'';
      document.getElementById('supplierNotes').value = s.notes||'';
      document.getElementById('supplierBalanceField').style.display = 'none';
      document.getElementById('supplierModal').classList.add('open');
    };
    window.deleteSupplier = (idx) => {
      if(confirm(`هل تريد حذف المورد "${suppliers[idx].name}" نهائياً؟`)) {
        suppliers.splice(idx,1);
        saveAllData();
        refreshSuppliersTable();
      }
    };
    window.viewSupplierTx = (idx) => {
      currentSupplierIdx = idx;
      renderSupplierTx();
      document.getElementById('supplierTxModal').classList.add('open');
    };
    document.getElementById('addTxBtn')?.addEventListener('click', () => {
      if(currentSupplierIdx === null) return;
      const s = suppliers[currentSupplierIdx];
      const type = document.getElementById('txType').value;
      const amount = parseFloat(document.getElementById('txAmount').value)||0;
      const note = document.getElementById('txNote').value.trim();
      if(amount <= 0) { alert('برجاء إدخال مبلغ صحيح'); return; }
      if(!s.transactions) s.transactions = [];
      s.transactions.push({ type, amount, note, date: new Date().toISOString() });
      if(type === 'purchase') { s.balance += amount; s.totalPurchases = (s.totalPurchases||0) + amount; }
      else if(type === 'payment') { s.balance -= amount; s.totalPaid = (s.totalPaid||0) + amount; }
      else if(type === 'return') { s.balance -= amount; s.totalPurchases = Math.max(0,(s.totalPurchases||0) - amount); }
      saveAllData();
      document.getElementById('txAmount').value = '';
      document.getElementById('txNote').value = '';
      renderSupplierTx();
      refreshSuppliersTable();
    });
    refreshSuppliersTable();
  }

  function renderSupplierTx() {
    if(currentSupplierIdx === null) return;
    const s = suppliers[currentSupplierIdx];
    document.getElementById('supplierTxTitle').textContent = `سجل معاملات: ${s.name}`;
    const txs = s.transactions || [];
    const tbody = document.getElementById('supplierTxBody');
    if(tbody) {
      tbody.innerHTML = [...txs].reverse().map(tx => {
        const typeMap = { purchase: ['مشتريات','#f87171'], payment: ['دفع','#4ade80'], return: ['مرتجع','#fbbf24'] };
        const [lbl, clr] = typeMap[tx.type] || ['---','#94a3b8'];
        return `<tr>
          <td><span class="badge" style="background:${clr}22;color:${clr}">${lbl}</span></td>
          <td style="color:${clr};font-weight:700">${tx.amount.toFixed(2)} ج</td>
          <td style="color:#94a3b8">${tx.note||'---'}</td>
          <td style="color:#94a3b8">${new Date(tx.date).toLocaleDateString('ar-EG')}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="4" style="text-align:center;color:#94a3b8">لا توجد معاملات</td></tr>';
    }
    const balEl = document.getElementById('supplierTxBalance');
    if(balEl) {
      const b = s.balance;
      balEl.style.color = b > 0 ? '#f87171' : b < 0 ? '#4ade80' : '#94a3b8';
      balEl.textContent = b > 0 ? `علينا ${b.toFixed(2)} ج` : b < 0 ? `لنا ${Math.abs(b).toFixed(2)} ج` : 'متوازن';
    }
  }

  // عناصر الخام والاكسسوار المختارة في الأمر الحالي
  let prodRawItems = []; // [{id, name, cost, qty}]
  let prodAccItems = [];

  window.loadWhProducts = function(type) {
    const whSel = document.getElementById(type==='raw'?'prodRawWh':'prodAccWh');
    const itemSel = document.getElementById(type==='raw'?'prodRawItem':'prodAccItem');
    const wh = whSel?.value;
    if(!wh || !itemSel) return;
    const whProducts = products.filter(p=>p.wh===wh && p.qty>0);
    itemSel.innerHTML = `<option value="">-- اختر منتج --</option>` + whProducts.map(p=>`<option value="${p.id}" data-cost="${p.cost}" data-name="${p.name}" data-qty="${p.qty}">${p.name} (${p.qty} متاح - تكلفة: ${p.cost} ج)</option>`).join('');
    if(whProducts.length===0) itemSel.innerHTML = `<option value="">-- لا توجد منتجات في هذا المخزن --</option>`;
  };

  window.addProdItem = function(type) {
    const itemSel = document.getElementById(type==='raw'?'prodRawItem':'prodAccItem');
    const opt = itemSel?.options[itemSel.selectedIndex];
    if(!opt||!opt.value) return;
    const id = parseInt(opt.value);
    const list = type==='raw' ? prodRawItems : prodAccItems;
    if(list.find(x=>x.id===id)) { itemSel.value=''; return; } // مضاف بالفعل
    list.push({ id, name: opt.dataset.name, cost: parseFloat(opt.dataset.cost)||0, qty: 1, available: parseInt(opt.dataset.qty)||0 });
    itemSel.value='';
    renderProdItemsList(type);
    calcProdCost();
  };

  function renderProdItemsList(type) {
    const list = type==='raw' ? prodRawItems : prodAccItems;

    if(list.length===0){ container.innerHTML='<div style="color:#64748b;font-size:11px;padding:6px">لم تختر أي منتج بعد</div>'; return; }
    container.innerHTML = list.map((item,i)=>`
