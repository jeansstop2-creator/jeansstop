  <script>
    const JSONBIN_KEY = '$2a$10$pitWMNBMWMwyDsMjKpehPu6yWGFKtYZqPlPaBlCfgcTej/B0ozic6';
    // سيتم تحديث هذا الـ ID تلقائياً أول مرة
    let JSONBIN_ID = '6a1772e521f9ee59d29325df';
    let JSONBIN_PRODUCTS_ID = '6a17840cddf5aa59f76def7c';

    window.firebaseSaveProducts = async function(productsArr) {
      try {
        const json = JSON.stringify({ products: productsArr });
        if (json.length > 90000) { console.warn('المنتجات كبيرة جداً'); return; }
        await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_PRODUCTS_ID, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
          body: json
        });
      } catch(e) { console.error('Products save error:', e); }
    };

    window.firebaseLoadProducts = async function() {
      try {
        const res = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_PRODUCTS_ID + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const d = await res.json();
        if (!d.record || d.record.data === 'init') return null;
        return d.record.products || null;
      } catch(e) { return null; }
    };

    window.firebaseSave = async function(dataObj) {
      try {
        // تحقق من حجم البيانات - JSONBin حد أقصى 100KB
        const json = JSON.stringify(dataObj);
        if (json.length > 90000) {
          console.warn('البيانات كبيرة جداً للحفظ السحابي، تم الحفظ محلياً فقط');
          return;
        }
        const res = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_ID, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
          body: json
        });
        if (!res.ok) console.error('Save failed:', res.status);
      } catch(e) { console.error('Save error:', e); }
    };

    window.firebaseLoad = async function() {
      try {
        const res = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_ID + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_KEY }
        });
        const d = await res.json();
        if (!d.record || d.record.data === 'init') return null;
        return d.record;
      } catch(e) { return null; }
    };

    window._firebaseReady = true;
    document.addEventListener('DOMContentLoaded', () => document.dispatchEvent(new Event('firebaseReady')));
  </script>

<div class="app-container" id="appRoot"></div>

<script>
  // ========== تحميل وحفظ البيانات ==========
  function getAllDataObj() {
    return { products, customers, invoices, warehouses, nextInvoiceId, treasuries, vouchers, nextVoucherId, suppliers, nextSupplierId, productionOrders, nextProductionId, rawMaterialWarehouses, accessoryWarehouses, finishedGoodsWarehouses, laundries, factories, nextLaundryId, nextFactoryId, kpiTargets, debtEntries, nextDebtId, warehouseTransfers, systemUsers, nextUserId, customerGroups, salesReturns, purchases, nextPurchaseId };
  }

  function applyDataObj(data) {
    if(!data) return;
    products = data.products || products;
    customers = data.customers || customers;
    invoices = data.invoices || invoices;
    warehouses = data.warehouses || warehouses;
    nextInvoiceId = data.nextInvoiceId || nextInvoiceId;
    treasuries = data.treasuries || treasuries;
    vouchers = data.vouchers || vouchers;
    nextVoucherId = data.nextVoucherId || nextVoucherId;
    suppliers = data.suppliers || suppliers;
    nextSupplierId = data.nextSupplierId || nextSupplierId;
    productionOrders = data.productionOrders || productionOrders;
    nextProductionId = data.nextProductionId || nextProductionId;
    rawMaterialWarehouses = data.rawMaterialWarehouses || rawMaterialWarehouses;
    accessoryWarehouses = data.accessoryWarehouses || accessoryWarehouses;
    finishedGoodsWarehouses = data.finishedGoodsWarehouses || finishedGoodsWarehouses;
    laundries = data.laundries || laundries;
    factories = data.factories || factories;
    nextLaundryId = data.nextLaundryId || nextLaundryId;
    nextFactoryId = data.nextFactoryId || nextFactoryId;
    kpiTargets = data.kpiTargets || kpiTargets;
    debtEntries = data.debtEntries || debtEntries;
    warehouseTransfers = data.warehouseTransfers || warehouseTransfers;
    nextDebtId = data.nextDebtId || nextDebtId;
    if(data.systemUsers && data.systemUsers.length > 0) systemUsers = data.systemUsers;
    nextUserId = data.nextUserId || nextUserId;
    if(data.customerGroups && data.customerGroups.length > 0) customerGroups = data.customerGroups;
    if(data.salesReturns) salesReturns = data.salesReturns;
    if(data.purchases) purchases = data.purchases;
    if(data.nextPurchaseId) nextPurchaseId = data.nextPurchaseId;
  }

  function saveAllData() {
    const dataObj = getAllDataObj();
    dataObj._savedAt = Date.now();
    // حفظ محلي كامل
    localStorage.setItem('crizmaData', JSON.stringify(dataObj));
    // حفظ سحابي: كل البيانات عدا المنتجات الكبيرة (في bin منفصل)
    if(window.firebaseSave) {
      const cloudObj = { ...dataObj };
      delete cloudObj.products;
      delete cloudObj.rawMaterialWarehouses;
      delete cloudObj.accessoryWarehouses;
      delete cloudObj.finishedGoodsWarehouses;
      // suppliers + purchases + systemUsers + كل حاجة تانية تتحفظ في السحابة
      window.firebaseSave(cloudObj);
    }
    if(window.firebaseSaveProducts) window.firebaseSaveProducts(products);
  }
  
  function loadAllData() {
    // تحميل من localStorage مؤقتاً
    const saved = localStorage.getItem('crizmaData');
    if(saved) { try { applyDataObj(JSON.parse(saved)); } catch(e) {} }
  }

  // ========== وظائف النسخ الاحتياطي ==========
  function createBackup() {
    try {
      const dataObj = getAllDataObj();
      dataObj._backupDate = new Date().toISOString();
      dataObj._backupVersion = '1.0';
      const json = JSON.stringify(dataObj, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const dateStr = new Date().toLocaleDateString('ar-EG', {timeZone:'Africa/Cairo'}).replace(/\//g,'-');
      const timeStr = new Date().toLocaleTimeString('ar-EG', {timeZone:'Africa/Cairo', hour:'2-digit', minute:'2-digit'}).replace(/:/g,'-');
      a.href = url;
      a.download = `JeansStop_Backup_${dateStr}_${timeStr}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      return true;
    } catch(e) {
      console.error('Backup error:', e);
      return false;
    }
  }

  // اختصار النسخة الاحتياطية من السايدبار - متاح لجميع المستخدمين
  window._quickBackup = function() {
    const ok = createBackup();
    if(ok) {
      let toast = document.getElementById('_backupToast');
      if(!toast) {
        toast = document.createElement('div');
        toast.id = '_backupToast';
        toast.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#16a34a,#4ade80);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);direction:rtl;transition:opacity 0.4s';
        document.body.appendChild(toast);
      }
      toast.innerHTML = '<i class="ti ti-check" style="font-size:18px"></i> تم تحميل النسخة الاحتياطية بنجاح!';
      toast.style.opacity = '1';
      toast.style.display = 'flex';
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => { toast.style.display = 'none'; }, 400); }, 2500);
    }
  };

  function restoreBackup(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if(!data.systemUsers && !data.products && !data.customers) {
            reject('الملف غير صحيح - ليس نسخة احتياطية صحيحة');
            return;
          }
          applyDataObj(data);
          saveAllData();
          resolve(data._backupDate || 'غير معروف');
        } catch(err) {
          reject('خطأ في قراءة الملف: ' + err.message);
        }
      };
      reader.onerror = () => reject('فشل في قراءة الملف');
      reader.readAsText(file);
    });
  }

  // سؤال عند إغلاق أو مغادرة الصفحة - نعرض مودال مخصص
  window._pendingNavigation = null;
  
  // اعتراض روابط الخروج من التطبيق (logout)
  window._showBackupOnCloseModal = function(callback) {
    const modal = document.getElementById('backupOnCloseModal');
    if(!modal || !currentUser) { callback && callback(false); return; }
    modal.classList.add('open');
    
    const yesBtn = document.getElementById('backupYesBtn');
    const noBtn = document.getElementById('backupNoBtn');
    
    const cleanup = () => { modal.classList.remove('open'); };
    
    yesBtn.onclick = () => { cleanup(); createBackup(); callback && callback(true); };
    noBtn.onclick = () => { cleanup(); callback && callback(false); };
  };

  window.addEventListener('beforeunload', function(e) {
    if(!currentUser) return;
    e.preventDefault();
    e.returnValue = 'هل تريد إنشاء نسخة احتياطية قبل المغادرة؟';
    return e.returnValue;
  });

  // حفظ تلقائي عند إخفاء الصفحة
  document.addEventListener('visibilitychange', function() {
    if(document.visibilityState === 'hidden' && currentUser) {
      saveAllData();
    }
  });

  async function loadFromFirebase() {
    if(!window.firebaseLoad) return;
    try {
      const data = await window.firebaseLoad();
      if(data) {

// دالة للتحقق من صلاحية المخزن للمستخدم الحالي
function hasWarehouseAccess(warehouseName) {
  if(!currentUser) return false;
  const u = systemUsers.find(u => u.username === currentUser.username);
  if(!u) return false;
  if(u.role === 'admin') return true;
  // إذا لم تكن هناك مخازن محددة، يعني كل المخازن مسموحة
  if(!u.allowedWarehouses || u.allowedWarehouses.length === 0) return true;
  return u.allowedWarehouses.includes(warehouseName);
}

// دالة للحصول على قائمة المخازن المسموحة للمستخدم الحالي
function getAllowedWarehouses() {
  if(!currentUser) return [];
  const u = systemUsers.find(u => u.username === currentUser.username);
  if(!u) return [];
  if(u.role === 'admin') return warehouses;
  if(!u.allowedWarehouses || u.allowedWarehouses.length === 0) return warehouses;

}

function hasPermission(screen) {
  // إذا لم يكن هناك مستخدم مسجل دخول، لا تمنح أي صلاحية
  if(!currentUser) return false;
  // ابحث عن المستخدم في قائمة المستخدمين النظام
  const u = systemUsers.find(u => u.username === currentUser.username);
  if(!u) return false;

  if(u.role === 'admin') return true;
  // وإلا، تحقق من الصلاحية المحددة في كائن الصلاحيات الخاص به
  return u.permissions?.[screen] === true;
}

// تحديث دالة حفظ أمر التشغيل لتسجيل الدين تلقائياً
function updateProductionOrderDebt(order, isNew = true) {
    // تسجيل دين المصنع إذا كان آجل
    if(order.factoryId && order.factoryPayment === 'credit' && order.factoryPrice > 0) {
        const factory = factories.find(f => f.id == order.factoryId);
        if(factory) {
            const amount = (order.factoryPrice * order.qty) - (order.factoryPaid || 0);
            if(amount > 0) {
                factory.balance = (factory.balance || 0) + amount;
                factory.totalPurchases = (factory.totalPurchases || 0) + amount;
                if(!factory.transactions) factory.transactions = [];
                factory.transactions.push({
                    id: Date.now(),
                    type: 'debt',
                    amount: amount,
                    note: `أمر تشغيل #${order.id} - ${order.name} (${order.qty} قطعة × ${order.factoryPrice} ج)`,
                    date: new Date().toISOString(),
                    orderId: order.id,
                    orderName: order.name
                });
            }
        }
    }
    
    // تسجيل دين المغسلة إذا كان آجل
    if(order.laundryId && order.laundryPayment === 'credit' && order.laundryPrice > 0) {
        const laundry = laundries.find(l => l.id == order.laundryId);
        if(laundry) {
            const amount = (order.laundryPrice * order.qty) - (order.laundryPaid || 0);
            if(amount > 0) {
                laundry.balance = (laundry.balance || 0) + amount;
                laundry.totalPurchases = (laundry.totalPurchases || 0) + amount;
                if(!laundry.transactions) laundry.transactions = [];
                laundry.transactions.push({
                    id: Date.now(),
                    type: 'debt',
                    amount: amount,
                    note: `أمر تشغيل #${order.id} - ${order.name} (${order.qty} قطعة × ${order.laundryPrice} ج)`,
                    date: new Date().toISOString(),
                    orderId: order.id,
                    orderName: order.name
                });
            }
        }
    }
}

// تحديث دالة تعديل أمر التشغيل (عند تغيير الحالة أو الكمية)
function updateProductionOrderDebtOnEdit(oldOrder, newOrder) {
    // معالجة دين المصنع
    if(oldOrder.factoryId && oldOrder.factoryPayment === 'credit') {
        const factory = factories.find(f => f.id == oldOrder.factoryId);
        if(factory) {
            const oldAmount = (oldOrder.factoryPrice * oldOrder.qty) - (oldOrder.factoryPaid || 0);
            if(oldAmount > 0) {
                factory.balance = (factory.balance || 0) - oldAmount;
                factory.transactions = factory.transactions.filter(t => t.orderId !== oldOrder.id);
            }
        }
    }
    
    // معالجة دين المغسلة
    if(oldOrder.laundryId && oldOrder.laundryPayment === 'credit') {
        const laundry = laundries.find(l => l.id == oldOrder.laundryId);
        if(laundry) {
            const oldAmount = (oldOrder.laundryPrice * oldOrder.qty) - (oldOrder.laundryPaid || 0);
            if(oldAmount > 0) {
                laundry.balance = (laundry.balance || 0) - oldAmount;
                laundry.transactions = laundry.transactions.filter(t => t.orderId !== oldOrder.id);
            }
        }
    }
    
    // تسجيل الديون الجديدة
    updateProductionOrderDebt(newOrder, false);
}

// دالة تسجيل دفعة للمصنع
function recordFactoryPayment(factoryId, amount, note, treasuryId = null) {
    const factory = factories.find(f => f.id == factoryId);
    if(!factory) return false;
    
    if(amount <= 0 || amount > factory.balance) {
        alert(`المبلغ غير صحيح. المتبقي: ${factory.balance.toFixed(2)} ج`);
        return false;
    }
    
    factory.balance -= amount;
    factory.totalPaid = (factory.totalPaid || 0) + amount;
    if(!factory.transactions) factory.transactions = [];
    factory.transactions.push({
        id: Date.now(),
        type: 'payment',
        amount: amount,
        note: note || `سداد دفعة للمصنع ${factory.name}`,
        date: new Date().toISOString()
    });
    
    // تسجيل سند صرف من الخزينة إذا تم تحديدها
    if(treasuryId) {
        const treasury = treasuries.find(t => t.id == treasuryId);
        if(treasury && treasury.balance >= amount) {
            const voucher = {
                id: nextVoucherId++,
                type: 'payment',
                amount: amount,
                treasuryId: treasuryId,
                party: factory.name,
                note: `دفع للمصنع - ${note || ''}`,
                date: new Date().toISOString()
            };
            vouchers.push(voucher);
            treasury.balance -= amount;
        }
    }
    
    saveAllData();
    return true;
}

function recalcAllBalances() {
    // إعادة تعيين أرصدة المصانع
    factories.forEach(factory => {
        factory.balance = 0;
        factory.totalPurchases = 0;
        factory.totalPaid = 0;
        factory.transactions = [];
    });
    
    // إعادة تعيين أرصدة المغاسل
    laundries.forEach(laundry => {
        laundry.balance = 0;
        laundry.totalPurchases = 0;
        laundry.totalPaid = 0;
        laundry.transactions = [];
    });
    
    // حساب الأرصدة من أوامر التشغيل
    productionOrders.forEach(order => {
        // حساب إجمالي المصنع
        if (order.factoryId && order.factoryPayment === 'credit') {
            const factory = factories.find(f => f.id == order.factoryId);
            if (factory && order.factoryTotal > 0) {
                const paid = order.factoryPaid || 0;
                const remaining = order.factoryTotal - paid;
                if (remaining > 0) {
                    factory.balance += remaining;
                    factory.totalPurchases += order.factoryTotal;
                    factory.totalPaid += paid;
                }
            }
        }
        
        // حساب إجمالي المغسلة
        if (order.laundryId && order.laundryPayment === 'credit') {
            const laundry = laundries.find(l => l.id == order.laundryId);
            if (laundry && order.laundryTotal > 0) {
                const paid = order.laundryPaid || 0;
                const remaining = order.laundryTotal - paid;
                if (remaining > 0) {
                    laundry.balance += remaining;
                    laundry.totalPurchases += order.laundryTotal;
                    laundry.totalPaid += paid;
                }
            }
        }
    });
    
    saveAllData();
}
// دالة تسجيل دفعة للمغسلة
function recordLaundryPayment(laundryId, amount, note, treasuryId = null) {
    const laundry = laundries.find(l => l.id == laundryId);
    if(!laundry) return false;
    
    if(amount <= 0 || amount > laundry.balance) {
        alert(`المبلغ غير صحيح. المتبقي: ${laundry.balance.toFixed(2)} ج`);
        return false;
    }
    
    laundry.balance -= amount;
    laundry.totalPaid = (laundry.totalPaid || 0) + amount;
    if(!laundry.transactions) laundry.transactions = [];
    laundry.transactions.push({
        id: Date.now(),
        type: 'payment',
        amount: amount,
        note: note || `سداد دفعة للمغسلة ${laundry.name}`,
        date: new Date().toISOString()
    });
    
    // تسجيل سند صرف من الخزينة
    if(treasuryId) {
        const treasury = treasuries.find(t => t.id == treasuryId);
        if(treasury && treasury.balance >= amount) {
            const voucher = {
                id: nextVoucherId++,
                type: 'payment',
                amount: amount,
                treasuryId: treasuryId,
                party: laundry.name,
                note: `دفع للمغسلة - ${note || ''}`,
                date: new Date().toISOString()
            };
            vouchers.push(voucher);
            treasury.balance -= amount;
        }
    }
    
    saveAllData();
    return true;
}

  // 1. التحقق من أن المستخدم مسجل الدخول
  if (!currentUser && screen !== 'login') {
    currentScreen = 'login';
    renderApp();
    return;
  }

  // 2. إذا كانت الشاشة المطلوبة ليست 'login' وليست 'dashboard' (لأن الداشبورد قد تكون الصفحة الرئيسية)
  //    أو إذا كنا ننتقل من شاشة لأخرى، تحقق من الصلاحية.
  if (screen !== 'login' && !hasPermission(screen) && screen !== 'dashboard' && screen !== 'factory_screen') {
    alert('⚠️ ليس لديك صلاحية للوصول إلى هذه الصفحة.');

  if(screen === 'dashboard' && currentUser && currentUser.role === 'factory_user') {

  currentScreen = screen;

    if (u.role === 'seller' || u.role === 'accountant') return false;

    return u.permissions?.kpi === true;
}

    const totalCost = myInvoicesAll.reduce((sum, inv) => sum + (inv.items||[]).reduce((s,it)=>{const p=products.find(x=>x.id===it.id); return s+(p?p.cost*it.qty:0);},0), 0);
    const grossProfit = totalSales - totalCost;
    const profitPct = totalSales > 0 ? ((grossProfit/totalSales)*100).toFixed(1) : 0;

    const invoiceCount = myInvoicesAll.length;
    const avgInvoice = invoiceCount > 0 ? (totalSales/invoiceCount).toFixed(0) : 0;

    // ========= أهداف KPI للمستخدم الحالي =========
    const now2 = new Date();
    const myKpis = kpiTargets.filter(k => {
      const start = k.startDate ? new Date(k.startDate) : null;
      const end = k.endDate ? new Date(k.endDate) : null;

    });
    // لا نرجع أهداف قديمة منتهية — فقط الأهداف النشطة
    const activeKpi = myKpis[0] || null;

    // حساب المبيعات الفعلية للمستخدم الحالي في فترة الهدف
    const kpiStart = activeKpi?.startDate ? new Date(activeKpi.startDate) : null;
    const kpiEnd   = activeKpi?.endDate   ? new Date(activeKpi.endDate)   : null;
    const kpiInvoices = myInvoicesAll.filter(inv => {

      return (!kpiStart || d >= kpiStart) && (!kpiEnd || d <= kpiEnd);
    });

    const myQty     = kpiInvoices.reduce((s,i)=>s+(i.items||[]).reduce((q,it)=>q+it.qty,0), 0);

    // ========= للمدير: جمع أهداف كل المستخدمين النشطة ==========
    const allActiveKpis = kpiTargets.filter(k => {
      const start = k.startDate ? new Date(k.startDate) : null;
      const end   = k.endDate   ? new Date(k.endDate)   : null;
      return (!start || now2 >= start) && (!end || now2 <= end);
    });
    // مجموع هدف الإيراد لكل المستخدمين
    const totalTargetRevenue = allActiveKpis.reduce((s, k) => s + (k.targetRevenue || 0), 0);
    const totalTargetQty     = allActiveKpis.reduce((s, k) => s + (k.targetQty || 0), 0);
    // المبيعات الفعلية الإجمالية في نطاق الأهداف النشطة (أقدم بداية وأحدث نهاية)
    const allKpiStarts = allActiveKpis.map(k=>k.startDate?new Date(k.startDate):null).filter(Boolean);
    const allKpiEnds   = allActiveKpis.map(k=>k.endDate  ?new Date(k.endDate  ):null).filter(Boolean);
    const allKpiStart  = allKpiStarts.length ? new Date(Math.min(...allKpiStarts)) : null;
    const allKpiEnd    = allKpiEnds.length   ? new Date(Math.max(...allKpiEnds))   : null;
    const allKpiInvoices = invoices.filter(inv => {
      const d = new Date(inv.date || 0);
      return (!allKpiStart || d >= allKpiStart) && (!allKpiEnd || d <= allKpiEnd);
    });
    const totalActualRevenue = allKpiInvoices.reduce((s,i)=>s+i.total, 0);

    // عدد المستخدمين اللي عندهم هدف نشط
    const activeKpiUsersCount = [...new Set(allActiveKpis.map(k=>k.user))].length;

    const daysLeft = kpiEnd ? Math.max(0, Math.ceil((kpiEnd - now2)/(1000*60*60*24))) : null;

    const qtyPct  = targetQty     > 0 ? Math.min((cardQty/targetQty)*100, 100).toFixed(0) : 0;

  // متغير لتشغيل الكاميرا
  let html5QrCode = null;
  let _currentFacingMode = 'environment'; // الكاميرا الخلفية افتراضياً

  // دالة إيقاف الكاميرا تم جعلها عامة (Global) لتعمل مع زر الإغلاق في الـ HTML
  window._scannerJustClosed = false;
  window.stopScanner = function() {
    const scannerModal = document.getElementById('scannerModal');
    if (scannerModal) scannerModal.classList.remove('open');
    window._scannerJustClosed = true;
    setTimeout(() => { window._scannerJustClosed = false; }, 600);
    if (html5QrCode) {
      html5QrCode.stop().then(() => {
        html5QrCode.clear();
      }).catch(err => {});
    }
  };

  function setScannerStatus(msg, color) {
    const el = document.getElementById('scannerStatus');
    if(el) { el.innerHTML = msg; el.style.color = color || '#38bdf8'; el.style.borderColor = (color||'#38bdf8')+'55'; el.style.background = (color||'#38bdf8')+'15'; }
  }

  function startCamera(facingMode) {
    _currentFacingMode = facingMode || 'environment';
    setScannerStatus('<i class="ti ti-loader"></i> جاري تشغيل الكاميرا...', '#38bdf8');

    if(html5QrCode) { try { html5QrCode.stop().then(() => { html5QrCode.clear(); doStart(); }).catch(() => { doStart(); }); } catch(e) { doStart(); } }
    else { doStart(); }

    function doStart() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 15, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 };
      html5QrCode.start({ facingMode: _currentFacingMode }, config, (decodedText) => {
        // صوت نجاح
        try { const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = 1000; gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2); osc.start(); osc.stop(ctx.currentTime + 0.2); } catch(e){}

        setScannerStatus('✅ تم مسح الكود بنجاح!', '#4ade80');

        // أولاً: أوقف الكاميرا وأغلق المودال
        window.stopScanner();

        // ثانياً: ابحث عن المنتج مباشرة بدون الاعتماد على الـ input events
        setTimeout(() => {
          const allowed = getAllowedWarehouses();
          const exactMatch = products.find(p =>
            p.code.toLowerCase() === decodedText.toLowerCase() &&
            p.qty > 0 &&
            (allowed.length === 0 || allowed.includes(p.wh))
          );

          if(exactMatch) {
            // وجد المنتج — اختره مباشرة
            selectProduct(exactMatch.id, exactMatch.name, exactMatch.price);
            // اعرض اسمه في الحقل كـ feedback للمستخدم
            const inp = document.getElementById('productSearchInput');
            if(inp) inp.value = exactMatch.name;
          } else {
            // مش موجود — ضع الكود في الحقل وافتح نتائج البحث
            const inp = document.getElementById('productSearchInput');
            if(inp) {
              inp.value = decodedText;
              inp.dispatchEvent(new Event('input', { bubbles: true }));
              inp.focus();
            }
          }
        }, 300);

      }).then(() => {
        setScannerStatus('<i class="ti ti-scan"></i> الكاميرا تعمل — وجّه نحو الباركود', '#4ade80');
      }).catch(err => {
        setScannerStatus('❌ تعذر فتح الكاميرا: ' + (err.message || err), '#f87171');
        console.error('Camera error:', err);
      });
    }
  }

  function setCustScannerStatus(msg, color) {
    const el = document.getElementById('custScannerStatus');
    if(el) { el.innerHTML = msg; el.style.color = color||'#a78bfa'; el.style.borderColor = (color||'#a78bfa')+'55'; el.style.background = (color||'#a78bfa')+'15'; }

  function startCustomerCamera(facingMode) {
    _custFacingMode = facingMode || 'environment';
    setCustScannerStatus('<i class="ti ti-loader"></i> جاري تشغيل الكاميرا...', '#a78bfa');

    if(html5QrCodeCust) { try { html5QrCodeCust.stop().then(() => { html5QrCodeCust.clear(); doCustStart(); }).catch(() => doCustStart()); } catch(e) { doCustStart(); } }
    else { doCustStart(); }

    function doCustStart() {
      html5QrCodeCust = new Html5Qrcode("customerReader");
      const config = { fps: 15, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 };
      html5QrCodeCust.start({ facingMode: _custFacingMode }, config, (decodedText) => {
        // صوت نجاح
        try { const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = 880; gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2); osc.start(); osc.stop(ctx.currentTime + 0.2); } catch(e){}

        setCustScannerStatus('✅ تم مسح QR العميل!', '#4ade80');

        window.stopCustomerScanner();

        setTimeout(() => {
          // ابحث عن العميل بالـ ID
          const custId = parseInt(decodedText);
          const found = customers.find(c => c.id === custId || String(c.id) === decodedText);
          if(found) {
            selectCustomer(found.id, found.name, found.balance);
            const inp = document.getElementById('customerSearchInput');
            if(inp) inp.value = found.name;
          } else {
            // حاول بحث بالاسم أو الهاتف
            const byPhone = customers.find(c => c.phone === decodedText);
            if(byPhone) {
              selectCustomer(byPhone.id, byPhone.name, byPhone.balance);
              const inp = document.getElementById('customerSearchInput');
              if(inp) inp.value = byPhone.name;
            } else {
              alert(`❌ لم يتم العثور على عميل بهذا الـ QR\n(${decodedText})`);
            }
          }
        }, 300);

      }).then(() => {
        setCustScannerStatus('<i class="ti ti-scan"></i> الكاميرا تعمل — وجّه نحو QR العميل', '#4ade80');
      }).catch(err => {
        setCustScannerStatus('❌ تعذر فتح الكاميرا: ' + (err.message || err), '#f87171');
      });
    }
  }

  // ========== نظام البحث الصوتي الذكي ==========
  let _voiceRecognition = null;
  let _voiceActive = false;

  function initVoiceSearch() {
    const btn = document.getElementById('voiceSearchBtn');
    if(!btn) return;

    // تحقق من دعم المتصفح
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition) {
      btn.title = 'المتصفح لا يدعم البحث الصوتي';
      btn.style.opacity = '0.3';
      btn.style.cursor = 'not-allowed';
      return;
    }

    btn.addEventListener('click', () => {
      if(_voiceActive) { stopVoiceSearch(); return; }
      startVoiceSearch();
    });
  }

  function startVoiceSearch() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition) return;

    _voiceRecognition = new SpeechRecognition();
    _voiceRecognition.lang = 'ar-EG';
    _voiceRecognition.continuous = false;
    _voiceRecognition.interimResults = true;
    _voiceRecognition.maxAlternatives = 5;

    _voiceActive = true;
    setVoiceUI('listening');

    _voiceRecognition.onresult = (event) => {
      let interimText = '';
      let finalText = '';
      for(let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if(event.results[i].isFinal) finalText += t;
        else interimText += t;
      }
      const displayText = finalText || interimText;
      if(displayText) {
        setVoiceUI('processing', `"${displayText}"`);
        document.getElementById('productSearchInput').value = displayText;
        // تشغيل البحث
        triggerProductSearch(displayText);
      }
    };

    _voiceRecognition.onend = () => {
      _voiceActive = false;
      const inp = document.getElementById('productSearchInput');
      const val = inp?.value?.trim();
      if(val) {
        setVoiceUI('found', `تم البحث عن: "${val}"`);
        setTimeout(() => setVoiceUI('idle'), 3000);
      } else {
        setVoiceUI('idle');
      }
    };

    _voiceRecognition.onerror = (event) => {
      _voiceActive = false;
      const msgs = {
        'no-speech': 'لم يُكتشف أي صوت، حاول مجدداً',
        'audio-capture': 'لا يوجد ميكروفون، تأكد من التصريح',
        'not-allowed': 'تم رفض إذن الميكروفون',
        'network': 'خطأ في الشبكة',
        'aborted': ''
      };
      const msg = msgs[event.error] || 'حدث خطأ في التعرف على الصوت';
      if(msg) setVoiceUI('error', msg);
      else setVoiceUI('idle');
      setTimeout(() => setVoiceUI('idle'), 3000);
    };

    _voiceRecognition.start();
  }

  window.stopVoiceSearch = function() {
    if(_voiceRecognition) { try { _voiceRecognition.stop(); } catch(e){} }
    _voiceActive = false;
    setVoiceUI('idle');
  };

  function triggerProductSearch(text) {
    if(!text || text.trim().length < 1) return;
    const searchText = text.trim().toLowerCase();
    const allowed = getAllowedWarehouses();
    // بحث ذكي: اسم أو كود، مع تحمل الأخطاء الإملائية البسيطة
    const filtered = products.filter(p => {
      if(p.qty <= 0) return false;
      if(allowed.length > 0 && !allowed.includes(p.wh)) return false;
      const name = p.name.toLowerCase();
      const code = p.code.toLowerCase();
      // بحث مباشر
      if(name.includes(searchText) || code.includes(searchText)) return true;
      // بحث بالكلمات المنفصلة
      const words = searchText.split(/\s+/);
      return words.every(w => name.includes(w) || code.includes(w));
    });

    const results = document.getElementById('productSearchResults');
    if(!results) return;
    if(filtered.length > 0) {
      results.innerHTML = filtered.slice(0,8).map(p =>
        `<div class="search-result-item" onclick="selectProduct(${p.id}, '${p.name.replace(/'/g,"\\'")}', ${p.price})">
          <strong>${p.name}</strong> — ${p.price} ج
          <span style="color:#4ade80;font-size:11px">(متوفر: ${p.qty})</span>
        </div>`
      ).join('');
      results.style.display = 'block';
      // لو نتيجة وحيدة → اختارها تلقائياً
      if(filtered.length === 1) {
        setTimeout(() => {
          window.selectProduct(filtered[0].id, filtered[0].name, filtered[0].price);
          setVoiceUI('found', `✅ تم اختيار: ${filtered[0].name}`);
          setTimeout(() => setVoiceUI('idle'), 2500);
        }, 400);
      }
    } else {
      results.innerHTML = `<div class="search-result-item" style="color:#f87171;cursor:default">لا توجد نتائج لـ "${text}"</div>`;
      results.style.display = 'block';
    }
  }

  function setVoiceUI(state, msg) {
    const btn = document.getElementById('voiceSearchBtn');
    const icon = document.getElementById('voiceSearchIcon');
    const bar = document.getElementById('voiceStatusBar');
    const statusText = document.getElementById('voiceStatusText');
    const pulse = document.getElementById('voicePulse');
    if(!btn || !icon) return;

    icon.classList.remove('voice-listening');

    if(state === 'listening') {
      icon.className = 'ti ti-microphone voice-listening';
      btn.style.color = '#f87171';
      if(bar) { bar.style.display = 'flex'; bar.style.background = 'rgba(248,113,113,0.1)'; bar.style.borderColor = 'rgba(248,113,113,0.3)'; }
      if(statusText) { statusText.textContent = '🎤 جاري الاستماع... تكلم الآن'; statusText.style.color = '#f87171'; }
      if(pulse) { pulse.style.background = '#f87171'; pulse.style.display = 'block'; }
    } else if(state === 'processing') {
      icon.className = 'ti ti-loader';
      btn.style.color = '#fbbf24';
      if(bar) { bar.style.display = 'flex'; bar.style.background = 'rgba(251,191,36,0.1)'; bar.style.borderColor = 'rgba(251,191,36,0.3)'; }
      if(statusText) { statusText.textContent = msg || 'جاري المعالجة...'; statusText.style.color = '#fbbf24'; }
      if(pulse) { pulse.style.background = '#fbbf24'; }
    } else if(state === 'found') {
      icon.className = 'ti ti-microphone';
      btn.style.color = '#4ade80';
      if(bar) { bar.style.display = 'flex'; bar.style.background = 'rgba(74,222,128,0.1)'; bar.style.borderColor = 'rgba(74,222,128,0.3)'; }
      if(statusText) { statusText.textContent = msg || '✅ تم العثور على المنتج'; statusText.style.color = '#4ade80'; }
      if(pulse) { pulse.style.background = '#4ade80'; }
    } else if(state === 'error') {
      icon.className = 'ti ti-microphone';
      btn.style.color = '#f87171';
      if(bar) { bar.style.display = 'flex'; bar.style.background = 'rgba(248,113,113,0.1)'; bar.style.borderColor = 'rgba(248,113,113,0.3)'; }
      if(statusText) { statusText.textContent = msg || 'حدث خطأ'; statusText.style.color = '#f87171'; }
      if(pulse) { pulse.style.background = '#f87171'; }
    } else { // idle
      icon.className = 'ti ti-microphone';
      btn.style.color = '#64748b';
      if(bar) bar.style.display = 'none';
    }
  }

      if(paidInput) paidInput.addEventListener('input', () => {
        const paid = parseFloat(paidInput.value)||0;
        const change = paid - total;
        document.getElementById('changeAmount').innerHTML = change >= 0
          ? `<span style="color:#4ade80">💰 الباقي: ${change.toFixed(2)} ج</span>`
          : `<span style="color:#f87171">⚠️ المتبقي: ${Math.abs(change).toFixed(2)} ج</span>`;
      });
      paidInput?.dispatchEvent(new Event('input'));
    } else {
      paymentDiv.innerHTML = `<div style="background:rgba(245,158,11,0.15);padding:10px;border-radius:10px;color:#fbbf24"><i class="ti ti-credit-card"></i> سيتم تسجيل ${total.toFixed(2)} ج كرصيد على العميل</div>`;
    }
  }

  function updateTreasuryDistTotal() {
    const inputs = document.querySelectorAll('.treas-dist-input');
    let dist = 0;
    inputs.forEach(inp => dist += parseFloat(inp.value)||0);
    const total = currentCart.reduce((s,i)=>s+(i.price*i.qty),0);
    const remaining = total - dist;
    const el = document.getElementById('distTotal');
    const rem = document.getElementById('distRemaining');
    if(el) el.textContent = dist.toFixed(2) + ' ج';
    if(rem) {
      if(Math.abs(remaining) < 0.01) rem.innerHTML = '<span style="color:#4ade80">✓ مكتمل</span>';
      else if(remaining > 0) rem.innerHTML = `<span style="color:#fbbf24">متبقي ${remaining.toFixed(2)} ج</span>`;
      else rem.innerHTML = `<span style="color:#f87171">زيادة ${Math.abs(remaining).toFixed(2)} ج</span>`;
    }
  }
  
  function updateCartItem(productId, field, value) {
    const item = currentCart.find(i => i.productId === productId);
    if(item) {
      if(field === 'qty') { const newQty = parseInt(value); if(newQty > 0) item.qty = newQty; else if(newQty <= 0) removeFromCart(productId); }
      else if(field === 'price') item.price = parseFloat(value);
      refreshSalesUI();
    }
  }
  
  function removeFromCart(productId) { currentCart = currentCart.filter(i => i.productId !== productId); refreshSalesUI(); }
  
  function refreshSalesUI() {
    const cartDiv = document.getElementById('cartItemsList');
    if(cartDiv) {
      if(currentCart.length === 0) cartDiv.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem">السلة فارغة</div>';
      else {
        cartDiv.innerHTML = currentCart.map(item => `<div class="cart-item"><div class="cart-item-info"><strong>${item.name}</strong></div><div class="cart-item-controls"><div class="qty-control"><button class="qty-btn" onclick="updateCartItem(${item.productId}, 'qty', ${item.qty-1})">-</button><input type="number" value="${item.qty}" min="1" style="width:60px;text-align:center;background:#0f172a;border:1px solid rgba(56,189,248,0.4);border-radius:6px;color:#ffffff;padding:4px" onchange="updateCartItem(${item.productId}, 'qty', this.value)"><button class="qty-btn" onclick="updateCartItem(${item.productId}, 'qty', ${item.qty+1})">+</button></div><input type="number" value="${item.price}" step="0.5" class="edit-price-input" onchange="updateCartItem(${item.productId}, 'price', this.value)"><span style="min-width:70px;color:#4ade80">${(item.price * item.qty).toFixed(2)} ج</span><i class="ti ti-trash remove-item" onclick="removeFromCart(${item.productId})"></i></div></div>`).join('');
      }
    }
    const total = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);
    if(document.getElementById('cartTotal')) document.getElementById('cartTotal').innerHTML = `المجموع: ${total.toFixed(2)} ج`;
    refreshPaymentDetails();
    updateBalanceSummary();
    
    const invTbody = document.getElementById('recentInvoices');
    if(invTbody) {
      const allowedCustIds = new Set(getAllowedCustomers().map(c => c.id));
      const visibleInvoices = invoices.filter(inv => allowedCustIds.has(inv.customerId));
      invTbody.innerHTML = visibleInvoices.slice(-5).reverse().map(inv => `<tr><td style="color:#ffffff">${inv.id}</td><td style="color:#ffffff">${inv.customerName}</td><td style="color:#4ade80">${inv.total} ج</td><td style="color:#94a3b8">${new Date(inv.date).toLocaleDateString('ar-EG')}</td></tr>`).join('');
    }
  }
  
  function completeSale() {
    if(!selectedCustomer) { alert('برجاء اختيار العميل'); return; }
    if(currentCart.length === 0) { alert('السلة فارغة'); return; }
    const total = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);

    // تحديد البائع
    const sellerSelectEl = document.getElementById('invoiceSellerSelect');
    const invoiceSeller = sellerSelectEl?.value || currentUser?.username || '';

    if(selectedPaymentMethod === 'cash') {
      const paid = parseFloat(document.getElementById('paidAmount')?.value)||0;
      if(paid < total) { alert('المبلغ المدفوع أقل من الإجمالي'); return; }
      // التحقق من التوزيع لو فعّال
      if(_multiTreasuryMode) {
        const inputs = document.querySelectorAll('.treas-dist-input');
        let dist = 0;
        inputs.forEach(inp => dist += parseFloat(inp.value)||0);
        if(Math.abs(dist - total) > 0.01) { alert(`إجمالي التوزيع (${dist.toFixed(2)} ج) لا يساوي قيمة الفاتورة (${total.toFixed(2)} ج)`); return; }
      } else {
        const tid = parseInt(document.getElementById('mainTreasurySelect')?.value);
        if(!tid) { alert('برجاء اختيار الخزينة'); return; }
      }
    } else {
      selectedCustomer.balance += total;
    }

    let totalProfit = 0;
    for(let item of currentCart) {
      const product = products.find(p => p.id === item.productId);
      if(product && product.qty >= item.qty) { totalProfit += (item.price - product.cost) * item.qty; product.qty -= item.qty; }
      else { alert(`المنتج ${item.name} غير متوفر بالكمية المطلوبة`); return; }
    }

    const newInvoice = {
      id: nextInvoiceId++,
      customerId: selectedCustomer.id,
      customerName: selectedCustomer.name,
      items: [...currentCart],
      total, totalProfit,
      paymentMethod: selectedPaymentMethod,
      paidAmount: selectedPaymentMethod === 'cash' ? parseFloat(document.getElementById('paidAmount')?.value) : total,
      date: new Date().toISOString(),
      seller: invoiceSeller
    };
    invoices.push(newInvoice);

    // تسجيل سندات القبض حسب طريقة الدفع
    if(selectedPaymentMethod === 'cash') {
      if(_multiTreasuryMode) {
        // توزيع على خزائن متعددة
        const inputs = document.querySelectorAll('.treas-dist-input');
        inputs.forEach(inp => {
          const amt = parseFloat(inp.value)||0;
          if(amt > 0) {
            const tid = parseInt(inp.dataset.id);
            const treas = treasuries.find(t=>t.id===tid);
            if(treas) {
              treas.balance += amt;
              vouchers.push({ id:nextVoucherId++, type:'receipt', amount:amt, treasuryId:tid, party:selectedCustomer.name, note:`مبيعات (توزيع) - فاتورة #${newInvoice.id}`, date:new Date().toISOString() });
            }
          }
        });
        _multiTreasuryMode = false;
      } else {
        // خزينة واحدة مختارة
        const tid = parseInt(document.getElementById('mainTreasurySelect')?.value);
        const treas = treasuries.find(t=>t.id===tid) || getAllowedTreasuries()[0] || treasuries[0];
        if(treas) {
          treas.balance += total;
          vouchers.push({ id:nextVoucherId++, type:'receipt', amount:total, treasuryId:treas.id, party:selectedCustomer.name, note:`مبيعات - فاتورة #${newInvoice.id}`, date:new Date().toISOString() });
        }
      }
    }

    saveAllData();
    currentCart = [];
    selectedCustomer = null;
    document.getElementById('customerSearchInput').value = '';
    document.getElementById('customerBalanceSummary').style.display = 'none';
    refreshSalesUI();
    alert(`✅ تم البيع بنجاح\nرقم الفاتورة: ${newInvoice.id}\nالإجمالي: ${total.toFixed(2)} ج\nالبائع: ${invoiceSeller}`);
  }
  
  // دالة طباعة الفاتورة الحالية (للمبيعات)
  function showPrintPreview() {
    if(currentCart.length === 0) { alert('لا توجد فاتورة للطباعة'); return; }
    const total = currentCart.reduce((sum,i)=>sum+(i.price*i.qty),0);
    const paid = selectedPaymentMethod === 'cash' ? (parseFloat(document.getElementById('paidAmount')?.value) || total) : total;
    const change = selectedPaymentMethod === 'cash' ? paid - total : 0;
    const prevBalance = selectedCustomer ? selectedCustomer.balance - (selectedPaymentMethod === 'credit' ? total : 0) : 0;
    const newBalance = selectedCustomer ? selectedCustomer.balance : 0;
    const html = generateInvoiceHTML(currentCart, selectedCustomer, total, paid, change, prevBalance, newBalance, selectedPaymentMethod);
    document.getElementById('invoicePrintContent').innerHTML = html;
    document.getElementById('printModal').classList.add('open');
  }

      tempDiv.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:794px;background:white;';
      document.body.appendChild(tempDiv);
      html2pdf().set({
        margin: [10, 10, 10, 10],
        filename: `فاتورة-INV-${d.invId || Date.now()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, backgroundColor: '#ffffff', useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(tempDiv).save().then(() => {
        document.body.removeChild(tempDiv);
      });

    } else if(type === 'receipt-pdf') {
      // تحميل PDF رسيت
      const receiptHTML = generateReceiptHTML(d.items, d.customer, d.total, d.paid, d.change, d.prevBalance, d.newBalance, d.paymentMethod, d.invId);

        margin: [3, 3, 3, 3],

        html2canvas: { scale: 2, backgroundColor: '#ffffff' },
        jsPDF: { unit: 'mm', format: [80, 200], orientation: 'portrait' }
      }).from(tempDiv).save().then(() => {
        document.body.removeChild(tempDiv);
      });
    }
  }

  function attachInventoryEvents() {
    document.getElementById('logoutInv')?.addEventListener('click', () => { currentUser=null; localStorage.removeItem('crizmaUser'); navigateTo('login'); });
    document.querySelectorAll('[data-nav]').forEach(el => { el.addEventListener('click', () => navigateTo(el.getAttribute('data-nav'))); });
    document.getElementById('newProductBtn')?.addEventListener('click', () => { editProductId = null; document.getElementById('productModalTitle').innerHTML = '<i class="ti ti-package"></i> إضافة منتج جديد'; document.getElementById('productName').value = ''; document.getElementById('productCode').value = 'PRD-' + String(products.length+1).padStart(3,'0'); document.getElementById('productQty').value = 0; document.getElementById('productMin').value = 10; if(document.getElementById('productCost')) document.getElementById('productCost').value = 0; document.getElementById('productPrice').value = 0; document.getElementById('productModal').classList.add('open'); });
    document.getElementById('saveProductBtn')?.addEventListener('click', () => {
      const name = document.getElementById('productName').value.trim();
      if(!name) { alert('برجاء إدخال اسم المنتج'); return; }
      // الاحتفاظ بسعر الشراء القديم لو المستخدم مش مخوّل يشوفه
      const existingCost = editProductId ? (products.find(p=>p.id===editProductId)?.cost || 0) : 0;
      const costField = document.getElementById('productCost');
      const cost = costField ? (parseFloat(costField.value)||0) : existingCost;
      const newProduct = { id: editProductId || Date.now(), code: document.getElementById('productCode').value, name: name, wh: document.getElementById('productWh').value, qty: parseInt(document.getElementById('productQty').value)||0, min: parseInt(document.getElementById('productMin').value)||10, cost: cost, price: parseFloat(document.getElementById('productPrice').value)||0 };
      if(editProductId) { const idx = products.findIndex(p=>p.id===editProductId); if(idx!==-1) products[idx] = newProduct; }
      else products.push(newProduct);
      saveAllData();
      document.getElementById('productModal').classList.remove('open');
      refreshProductsTable();
    });
    document.getElementById('closeProductModal')?.addEventListener('click', () => document.getElementById('productModal').classList.remove('open'));
    document.getElementById('productSearch')?.addEventListener('input', () => { productsPage=1; refreshProductsTable(); });
    document.getElementById('whFilter')?.addEventListener('change', () => { productsPage=1; refreshProductsTable(); });

    // إدارة المخازن
    document.getElementById('manageWhBtn')?.addEventListener('click', () => {
      renderWarehousesList();
      document.getElementById('warehouseModal').classList.add('open');
    });
    document.getElementById('closeWhModal')?.addEventListener('click', () => document.getElementById('warehouseModal').classList.remove('open'));
    document.getElementById('addWhBtn')?.addEventListener('click', () => {
      const name = document.getElementById('newWhName').value.trim();
      if(!name) { alert('برجاء إدخال اسم المخزن'); return; }
      if(warehouses.includes(name)) { alert('هذا المخزن موجود بالفعل'); return; }
      warehouses.push(name);
      saveAllData();
      document.getElementById('newWhName').value = '';
      renderWarehousesList();
      // تحديث قوائم الاختيار
      const whSel = document.getElementById('productWh');
      if(whSel) { whSel.innerHTML = getAllowedWarehouses().map(w=>`<option>${w}</option>`).join(''); }
      const whFilter = document.getElementById('whFilter');
      if(whFilter) { const cur = whFilter.value; whFilter.innerHTML = `<option value="">📦 كل المخازن</option>${getAllowedWarehouses().map(w=>`<option value="${w}" ${w===cur?'selected':''}>${w}</option>`).join('')}`; }
    });
    document.getElementById('exportProductsBtn')?.addEventListener('click', () => { const canSeeCost = hasPermission('show_cost'); const ws = XLSX.utils.json_to_sheet(products.map(p => { const row = { الكود: p.code, 'اسم المنتج': p.name, المخزن: p.wh, الكمية: p.qty, 'الحد الأدنى': p.min }; if(canSeeCost) row['سعر الشراء'] = p.cost; row['سعر البيع'] = p.price; return row; })); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'المنتجات'); XLSX.writeFile(wb, `products_${Date.now()}.xlsx`); });
    document.getElementById('importProductsBtn')?.addEventListener('click', () => document.getElementById('importProductsFile').click());
    document.getElementById('importProductsFile')?.addEventListener('change', (e) => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws);
          let added = 0;
          rows.forEach(row => {
            const name = row['اسم المنتج'] || row['name'] || '';
            if(!name) return;
            const exists = products.find(p => p.name === name);
            if(!exists) {
              products.push({ id: Date.now() + Math.random(), code: row['الكود'] || row['code'] || 'PRD-'+products.length, name, wh: row['المخزن'] || row['warehouse'] || 'المخزن الرئيسي', qty: parseInt(row['الكمية'] || row['qty']) || 0, min: parseInt(row['الحد الأدنى'] || row['min']) || 10, cost: parseFloat(row['سعر الشراء'] || row['cost']) || 0, price: parseFloat(row['سعر البيع'] || row['price']) || 0 });
              added++;
            }
          });

    function openTransferModal() {

      // ملء قوائم المخازن
      const fromSel = document.getElementById('transferFrom');
      const toSel   = document.getElementById('transferTo');
      if(fromSel) fromSel.innerHTML = getAllowedWarehouses().map(w=>`<option>${w}</option>`).join('');
      if(toSel)   toSel.innerHTML   = getAllowedWarehouses().map(w=>`<option>${w}</option>`).join('');
      // إخفاء رسالة الخطأ
      const msg = document.getElementById('transferMsg');
      if(msg) { msg.style.display='none'; msg.textContent=''; }
      document.getElementById('transferModal').classList.add('open');
    }

    // ربط زر فتح المودال
    document.getElementById('openTransferBtn')?.addEventListener('click', openTransferModal);

    // لما يختار منتج → اضبط "من مخزن" تلقائياً
    document.getElementById('transferProduct')?.addEventListener('change', function() {
      const pid = parseInt(this.value);
      const p = products.find(x=>x.id===pid);
      if(p) {
        const fromSel = document.getElementById('transferFrom');
        if(fromSel) fromSel.value = p.wh;
      }
    });

    // تنفيذ التحويل
    document.getElementById('confirmTransferBtn')?.addEventListener('click', () => {
      const pid  = parseInt(document.getElementById('transferProduct').value);
      const from = document.getElementById('transferFrom').value;
      const to   = document.getElementById('transferTo').value;
      const qty  = parseInt(document.getElementById('transferQty').value)||0;
      const note = document.getElementById('transferNote').value.trim();
      const msg  = document.getElementById('transferMsg');

      const showMsg = (text, ok) => {
        msg.style.display='block';
        msg.style.background = ok ? 'rgba(74,222,128,0.15)' : 'rgba(248,113,113,0.15)';
        msg.style.color = ok ? '#4ade80' : '#f87171';
        msg.style.border = `1px solid ${ok?'rgba(74,222,128,0.4)':'rgba(248,113,113,0.4)'}`;
        msg.textContent = text;
      };

      if(!pid)     { showMsg('⚠️ اختر المنتج أولاً', false); return; }
      if(from===to){ showMsg('⚠️ المخزن المصدر والهدف متشابهان!', false); return; }
      if(qty<=0)   { showMsg('⚠️ الكمية يجب أن تكون أكبر من صفر', false); return; }

      // إيجاد المنتج في المخزن المصدر
      const srcProd = products.find(p=>p.id===pid && p.wh===from);
      if(!srcProd) { showMsg(`⚠️ المنتج غير موجود في "${from}"`, false); return; }
      if(srcProd.qty < qty) { showMsg(`⚠️ الكمية المتاحة في "${from}" هي ${srcProd.qty} فقط`, false); return; }

      // هل المنتج موجود في المخزن الهدف؟
      let destProd = products.find(p=>p.id!==pid && p.name===srcProd.name && p.wh===to);
      // نبحث عن نفس المنتج (بنفس الـ code) في المخزن الهدف
      let destProdSameCode = products.find(p=>p.code===srcProd.code && p.wh===to && p.id!==pid);

      // خصم من المصدر
      srcProd.qty -= qty;

      if(destProdSameCode) {
        // أضف على المنتج الموجود
        destProdSameCode.qty += qty;
      } else {
        // أنشئ نسخة جديدة في المخزن الهدف
        products.push({
          id: Date.now() + Math.random(),
          code: srcProd.code,
          name: srcProd.name,
          wh: to,
          qty: qty,
          min: srcProd.min,
          cost: srcProd.cost,
          price: srcProd.price
        });
      }

      // سجّل العملية
      warehouseTransfers.push({
        id: Date.now(),
        date: new Date().toISOString(),
        productName: srcProd.name,
        productCode: srcProd.code,
        from, to, qty, note,
        user: currentUser?.username || '---'
      });

      saveAllData();
      refreshProductsTable();
      showMsg(`✅ تم تحويل ${qty} قطعة من "${from}" إلى "${to}" بنجاح`, true);
      // تحديث قائمة المنتجات في المودال
      const sel = document.getElementById('transferProduct');
      if(sel) sel.innerHTML = '<option value="">-- اختر المنتج --</option>' +
        products.map(p=>`<option value="${p.id}">${p.name} (${p.wh} — ${p.qty} قطعة)</option>`).join('');
    });

    document.getElementById('closeTransferModal')?.addEventListener('click', () => {
      document.getElementById('transferModal').classList.remove('open');

  allLabels.forEach((p,i) => {

          background: '#ffffff',
          lineColor: '#000000'
        });

      const svg = document.getElementById(`bcSvg_${i}`);
      if(svg) svg.outerHTML = `<div style="font-size:9px;color:#f87171;padding:4px">كود غير صالح: ${p.code}</div>`;
    }
  });
}

    if(warehouses.includes(newName.trim())) { alert('هذا الاسم مستخدم'); return; }

window.deleteWarehouse = (name) => {
    // === القفل الأمني ===
    if (currentUser.role !== 'admin') {
        alert('❌ عذراً، لا تملك صلاحية حذف المخازن!');
        return; // الخروج من الدالة فوراً ومنع أي حذف
    }
    // ===================

    const prodsInWh = products.filter(p => p.wh === name);
    // ... بقية الكود الخاص بك كما هو    const otherWarehouses = [...new Set([...warehouses, ...products.map(p=>p.wh).filter(Boolean)])].filter(w => w !== name);

    if (prodsInWh.length > 0) {
      // بناء مودال الاختيار
      const existing = document.getElementById('deleteWhModal');
      if (existing) existing.remove();

      const modal = document.createElement('div');

        + (otherWarehouses.length > 0
          ? '<div style="margin-bottom:10px"><label style="color:#fff;display:block;margin-bottom:6px">نقل المنتجات إلى مخزن آخر:</label>'
            + '<select id="moveToWh" style="width:100%;padding:10px;background:#0f172a;border:1px solid rgba(56,189,248,0.3);border-radius:10px;color:#fff">'

            + '</select></div>'

            + '<button id="moveAndDeleteWhBtn" class="btn btn-primary"><i class="ti ti-arrows-exchange"></i> نقل وحذف المخزن</button>'
            + '<button id="deleteWhAndProdsBtn" class="btn btn-danger"><i class="ti ti-trash"></i> حذف المخزن والمنتجات</button>'
            + '<button id="cancelDeleteWhBtn" class="btn btn-outline">إلغاء</button>'
            + '</div>'
          : '<div style="color:#f87171;margin-bottom:1rem;font-size:12px">⚠️ لا يوجد مخازن أخرى للنقل إليها.</div>'
            + '<div class="modal-foot" style="display:flex;gap:8px;margin-top:1rem">'
            + '<button id="deleteWhAndProdsBtn" class="btn btn-danger"><i class="ti ti-trash"></i> حذف المخزن والمنتجات</button>'
            + '<button id="cancelDeleteWhBtn" class="btn btn-outline">إلغاء</button>'
            + '</div>')
        + '</div>';

      document.body.appendChild(modal);

      document.getElementById('cancelDeleteWhBtn')?.addEventListener('click', () => modal.remove());

      document.getElementById('moveAndDeleteWhBtn')?.addEventListener('click', () => {
        const dest = document.getElementById('moveToWh').value;
        prodsInWh.forEach(p => {
          // هل يوجد نفس المنتج (بنفس الكود) في المخزن الهدف؟
          const existing = products.find(x => x.code === p.code && x.wh === dest && x.id !== p.id);
          if (existing) {
            existing.qty += p.qty;
            products.splice(products.findIndex(x => x.id === p.id), 1);
          } else {
            p.wh = dest;
          }
        });
        const wi1 = warehouses.indexOf(name); if(wi1 > -1) warehouses.splice(wi1, 1);
        saveAllData();
        renderWarehousesList();
        modal.remove();
        const whFilter = document.getElementById('whFilter');
        if(whFilter) whFilter.innerHTML = '<option value="">📦 كل المخازن</option>' + getAllowedWarehouses().map(w=>'<option value="'+w+'">'+w+'</option>').join('');
        const whSel = document.getElementById('productWh');

        if(typeof refreshProductsTable === 'function') refreshProductsTable();
        alert('تم نقل المنتجات إلى "' + dest + '" وحذف المخزن بنجاح');

      document.getElementById('deleteWhAndProdsBtn')?.addEventListener('click', () => {

        saveAllData();
        renderWarehousesList();
        modal.remove();

        if(whSel) whSel.innerHTML = getAllowedWarehouses().map(w=>'<option>'+w+'</option>').join('');

  function refreshProductsTable() {
    const search = document.getElementById('productSearch')?.value.toLowerCase() || '';
    const whFilter = document.getElementById('whFilter')?.value || '';
    const allowed = getAllowedWarehouses();
    let filtered = products.filter(p => {
      const inAllowed = allowed.length === 0 || allowed.includes(p.wh);
      const matchSearch = p.name.toLowerCase().includes(search) || p.code.toLowerCase().includes(search);
      const matchWh = !whFilter || p.wh === whFilter;
      return inAllowed && matchSearch && matchWh;
    });
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if(productsPage > totalPages) productsPage = totalPages||1;
    const start = (productsPage-1)*PAGE_SIZE;
    const pageItems = filtered.slice(start, start+PAGE_SIZE);
    const tbody = document.getElementById('productsTableBody');
    if(tbody) tbody.innerHTML = pageItems.map((p, idx) => {
      const globalIdx = products.findIndex(pr=>pr.id===p.id);
      const canDelete = hasPermission('delete_product');
      return `<tr><td style="color:#94a3b8">${start+idx+1}</td><td style="color:#38bdf8">${p.code}</td><td style="color:#ffffff">${p.name}</td><td><span style="background:rgba(167,139,250,0.15);color:#a78bfa;padding:3px 8px;border-radius:6px;font-size:11px"><i class="ti ti-building-warehouse"></i> ${p.wh}</span></td><td style="color:#ffffff">${p.qty}</td>${hasPermission('show_cost')?`<td style="color:#ffffff">${p.cost.toFixed(2)} ج</td>`:''}<td style="color:#4ade80">${p.price.toFixed(2)} ج</td><td>${getStatus(p)==='ok'?'<span class="badge badge-ok">متوفر</span>':getStatus(p)==='low'?'<span class="badge badge-low">منخفض</span>':'<span class="badge badge-zero">نفاد</span>'}</td><td><div class="action-btns"><button class="act-btn act-add" onclick="window.addProductQty(${globalIdx})" title="إضافة كمية"><i class="ti ti-plus"></i></button><button class="act-btn act-edit" onclick="window.editProduct(${globalIdx})" title="تعديل"><i class="ti ti-edit"></i></button><button class="act-btn act-print" onclick="window.printBarcode(${globalIdx})" title="طباعة باركود"><i class="ti ti-barcode"></i></button>${canDelete ? `<button class="act-btn act-del" onclick="window.deleteProduct(${globalIdx})" title="حذف"><i class="ti ti-trash"></i></button>` : `<button class="act-btn" style="background:rgba(100,116,139,0.15);color:#64748b;cursor:not-allowed" title="ليس لديك صلاحية الحذف"><i class="ti ti-lock"></i></button>`}</div></td></tr>`;
    }).join('');
    if(document.getElementById('productsPagInfo')) document.getElementById('productsPagInfo').innerHTML = `عرض ${Math.min(start+1,filtered.length)}-${Math.min(start+PAGE_SIZE,filtered.length)} من ${filtered.length}`;
    const pagDiv = document.getElementById('productsPagBtns');
    if(pagDiv) { pagDiv.innerHTML = ''; for(let i=1;i<=totalPages;i++){ const btn = document.createElement('button'); btn.className = `pag-btn ${i===productsPage?'cur':''}`; btn.innerText = i; btn.onclick = () => { productsPage=i; refreshProductsTable(); }; pagDiv.appendChild(btn); } }
  }
  
  window.addProductQty = (idx) => { let inc = parseInt(prompt('الكمية المضافة:')); if(inc>0) { products[idx].qty += inc; saveAllData(); refreshProductsTable(); } };
  window.editProduct = (idx) => { const p = products[idx]; editProductId = p.id; document.getElementById('productModalTitle').innerHTML = '<i class="ti ti-edit"></i> تعديل المنتج'; document.getElementById('productName').value = p.name; document.getElementById('productCode').value = p.code; document.getElementById('productWh').value = p.wh; document.getElementById('productQty').value = p.qty; document.getElementById('productMin').value = p.min; if(document.getElementById('productCost')) document.getElementById('productCost').value = p.cost; document.getElementById('productPrice').value = p.price; document.getElementById('productModal').classList.add('open'); };
  window.deleteProduct = (idx) => { if(!hasPermission('delete_product')) { alert('🔒 ليس لديك صلاحية حذف المنتجات\nتواصل مع مدير النظام للحصول على الإذن'); return; } if(confirm('هل تريد حذف هذا المنتج نهائياً؟')) { products.splice(idx,1); saveAllData(); refreshProductsTable(); } };

  function attachCustomersEvents() {
    document.getElementById('logoutCust')?.addEventListener('click', () => { currentUser=null; localStorage.removeItem('crizmaUser'); navigateTo('login'); });
    document.querySelectorAll('[data-nav]').forEach(el => { el.addEventListener('click', () => navigateTo(el.getAttribute('data-nav'))); });
    document.getElementById('newCustomerBtn')?.addEventListener('click', () => { editCustomerId = null; document.getElementById('customerModalTitle').innerHTML = '<i class="ti ti-user-plus"></i> إضافة عميل جديد'; document.getElementById('customerName').value = ''; document.getElementById('customerPhone').value = ''; document.getElementById('customerAddress').value = ''; document.getElementById('customerGroup').value = ''; document.getElementById('customerBalance').value = 0; document.getElementById('customerModal').classList.add('open'); });
    document.getElementById('saveCustomerBtn')?.addEventListener('click', () => {
      const name = document.getElementById('customerName').value.trim();
      if(!name) { alert('برجاء إدخال اسم العميل'); return; }
      const newCustomer = { id: editCustomerId || Date.now(), name: name, phone: document.getElementById('customerPhone').value, address: document.getElementById('customerAddress').value, group: document.getElementById('customerGroup').value, balance: parseFloat(document.getElementById('customerBalance').value)||0 };
      if(editCustomerId) { const idx = customers.findIndex(c=>c.id===editCustomerId); if(idx!==-1) customers[idx] = newCustomer; }
      else customers.push(newCustomer);
      saveAllData();
      document.getElementById('customerModal').classList.remove('open');
      refreshCustomersTable();
    });
    document.getElementById('closeCustomerModal')?.addEventListener('click', () => document.getElementById('customerModal').classList.remove('open'));
    document.getElementById('customerSearch')?.addEventListener('input', () => { customersPage=1; refreshCustomersTable(); });
    document.getElementById('customerGroupFilter')?.addEventListener('change', () => { customersPage=1; refreshCustomersTable(); });
    document.getElementById('exportCustomersBtn')?.addEventListener('click', () => { const ws = XLSX.utils.json_to_sheet(customers.map(c => ({ الاسم: c.name, الهاتف: c.phone, العنوان: c.address, الرصيد: c.balance }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'العملاء'); XLSX.writeFile(wb, `customers_${Date.now()}.xlsx`); });
    document.getElementById('importCustomersBtn')?.addEventListener('click', () => document.getElementById('importCustomersFile').click());
    document.getElementById('importCustomersFile')?.addEventListener('change', (e) => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws);
          let added = 0;
          rows.forEach(row => {
            const name = row['الاسم'] || row['name'] || '';
            if(!name) return;
            const exists = customers.find(c => c.name === name);
            if(!exists) {
              customers.push({ id: Date.now() + Math.random(), name, phone: row['الهاتف'] || row['phone'] || '', address: row['العنوان'] || row['address'] || '', balance: parseFloat(row['الرصيد'] || row['balance']) || 0 });
              added++;
            }
          });
          saveAllData(); refreshCustomersTable(); alert(`تم استيراد ${added} عميل جديد`);
        } catch(err) { alert('خطأ في قراءة الملف'); }
      };
      reader.readAsBinaryString(file);
      e.target.value = '';
    });
    document.getElementById('closeStatementModal')?.addEventListener('click', () => document.getElementById('statementModal').classList.remove('open'));
    document.getElementById('printStatementBtn')?.addEventListener('click', () => { window.print(); });
    refreshCustomersTable();
  }
  
  function refreshCustomersTable() {

      const matchSearch = c.name.toLowerCase().includes(search) || (c.phone||'').includes(search);
      const matchGroup = !groupFilter || c.group === groupFilter;
      return matchSearch && matchGroup;
    });
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if(customersPage > totalPages) customersPage = totalPages||1;
    const start = (customersPage-1)*PAGE_SIZE;
    const pageItems = filtered.slice(start, start+PAGE_SIZE);
    const tbody = document.getElementById('customersTableBody');
    if(tbody) tbody.innerHTML = pageItems.map((c, idx) => {
      const globalIdx = customers.findIndex(cu=>cu.id===c.id);
      const canDelete = hasPermission('delete_customer');
      const groupBadge = c.group ? `<span style="background:rgba(167,139,250,0.15);color:#a78bfa;padding:3px 8px;border-radius:6px;font-size:11px"><i class="ti ti-users-group"></i> ${c.group}</span>` : '<span style="color:#64748b;font-size:11px">—</span>';
      return `<tr><td style="color:#94a3b8">${start+idx+1}</td><td style="color:#ffffff">${c.name}</td><td style="color:#ffffff">${c.phone}</td><td style="color:#ffffff">${c.address || '---'}</td><td>${groupBadge}</td><td class="${c.balance>0?'balance-negative':c.balance<0?'balance-positive':''}">${c.balance>0?`عليه ${c.balance}`:c.balance<0?`له ${Math.abs(c.balance)}`:'صفر'}</td><td><div class="action-btns"><button class="act-btn act-view" onclick="window.showCustomerStatement(${c.id})" title="كشف حساب"><i class="ti ti-file-text"></i></button><button class="act-btn" style="background:rgba(20,184,166,0.15);color:#14b8a6" onclick="window.showCustomerQR(${c.id})" title="عرض QR العميل"><i class="ti ti-qrcode"></i></button><button class="act-btn act-edit" onclick="window.editCustomer(${globalIdx})" title="تعديل"><i class="ti ti-edit"></i></button>${canDelete ? `<button class="act-btn act-del" onclick="window.deleteCustomer(${globalIdx})" title="حذف"><i class="ti ti-trash"></i></button>` : `<button class="act-btn" style="background:rgba(100,116,139,0.15);color:#64748b;cursor:not-allowed" title="ليس لديك صلاحية الحذف"><i class="ti ti-lock"></i></button>`}</div></td></tr>`;
    }).join('');

              style="width:70px;padding:6px;background:#0f172a;border:1px solid rgba(56,189,248,0.3);border-radius:6px;color:#fff;text-align:center"
              oninput="window.calcReturnTotal()" ${maxRet<=0?'disabled':''}>${maxRet<=0?'<span style="color:#f87171;font-size:10px"> مرتجع</span>':''}</td>
            <td style="color:#4ade80">${item.price.toFixed(2)} ج</td>
            <td id="ret_sub_${i}" style="color:#fbbf24">0 ج</td>
          </tr>`;
        }).join('')}
        </tbody></table>`;
      window.calcReturnTotal();
      document.getElementById('returnModal').classList.add('open');
    };

    window.calcReturnTotal = () => {
      let total = 0;
      document.querySelectorAll('[id^="ret_qty_"]').forEach(input => {
        const qty = parseFloat(input.value)||0;
        const price = parseFloat(input.dataset.price)||0;
        const sub = qty * price;
        total += sub;
        const subEl = document.getElementById('ret_sub_'+input.dataset.idx);
        if(subEl) subEl.textContent = sub.toFixed(2) + ' ج';
      });
      document.getElementById('returnTotal').textContent = total.toFixed(2) + ' ج';
    };

    document.getElementById('returnType')?.addEventListener('change', (e) => {
      document.getElementById('returnTreasuryField').style.display = e.target.value === 'treasury' ? 'block' : 'none';
    });

    document.getElementById('closeReturnModal')?.addEventListener('click', () => document.getElementById('returnModal').classList.remove('open'));

    document.getElementById('confirmReturnBtn')?.addEventListener('click', () => {
      const inv = invoices.find(i => i.id === currentReturnInvId);
      if(!inv) return;
      const returnItems = [];
      document.querySelectorAll('[id^="ret_qty_"]').forEach(input => {
        const qty = parseInt(input.value)||0;
        if(qty <= 0) return;
        const price = parseFloat(input.dataset.price)||0;
        const productId = parseInt(input.dataset.productid);
        const invItem = inv.items.find(it => it.productId === productId);
        returnItems.push({ productId, name: invItem?.name||'', qty, price });
      });
      if(returnItems.length === 0) { alert('اختر على الأقل صنف واحد للإرجاع'); return; }
      const totalReturn = returnItems.reduce((s,ri) => s + ri.qty * ri.price, 0);
      const returnType = document.getElementById('returnType').value;
      const note = document.getElementById('returnNote').value || 'مرتجع بيع';
      // 1. إعادة الكميات للمخزون
      returnItems.forEach(ri => {
        const prod = products.find(p => p.id === ri.productId);
        if(prod) prod.qty += ri.qty;
      });
      // 2. تسوية مالية
      const customer = customers.find(c => c.id === inv.customerId);
      if(returnType === 'balance') {
        if(customer) customer.balance = Math.max(0, customer.balance - totalReturn);
      } else {
        const tId = parseInt(document.getElementById('returnTreasuryId').value);
        const treasury = treasuries.find(t => t.id === tId);
        if(!treasury) { alert('اختر خزينة صحيحة'); return; }
        if(treasury.balance < totalReturn) { alert(`رصيد الخزينة (${treasury.balance.toFixed(2)} ج) أقل من المبلغ المرتجع (${totalReturn.toFixed(2)} ج)`); return; }
        treasury.balance -= totalReturn;
        vouchers.push({ id: nextVoucherId++, type: 'payment', amount: totalReturn, treasuryId: tId, party: inv.customerName, note: 'مرتجع بيع - فاتورة #' + inv.id + ' - ' + note, date: new Date().toISOString() });
      }
      // 3. حفظ سجل المرتجع
      salesReturns.push({ id: Date.now(), invoiceId: inv.id, customerId: inv.customerId, customerName: inv.customerName, items: returnItems, totalReturn, returnType, note, date: new Date().toISOString(), createdBy: currentUser?.username||'' });
      saveAllData();
      document.getElementById('returnModal').classList.remove('open');
      refreshInvoicesTable();
      refreshReturnsTable();
      alert(`✅ تم تسجيل المرتجع بنجاح\nالمبلغ: ${totalReturn.toFixed(2)} ج\n${returnType==='balance'?'✔ تم خصمه من رصيد العميل':'✔ تم خصمه من الخزينة وإنشاء سند صرف'}`);
    });
  }

  function saveInvoiceEdit(inv) {
    let newTotal = 0;
    for(let i=0; i<inv.items.length; i++) {
      const newQty = parseInt(document.getElementById(`qty_${i}`).value);
      const newPrice = parseFloat(document.getElementById(`price_${i}`).value);
      if(newQty > 0 && newPrice > 0) {
        const oldQty = inv.items[i].qty;
        const product = products.find(p => p.id === inv.items[i].productId);
        if(product) { const qtyDiff = oldQty - newQty; product.qty += qtyDiff; }
        inv.items[i].qty = newQty;
        inv.items[i].price = newPrice;
        newTotal += newPrice * newQty;
      }
    }
    inv.total = newTotal;
    inv.paymentMethod = document.getElementById('editPaymentMethod').value;
    inv.totalProfit = inv.items.reduce((sum, item) => { const prod = products.find(p => p.id === item.productId); return sum + ((item.price - (prod?.cost || 0)) * item.qty); }, 0);
    saveAllData();
    document.getElementById('editInvoiceModal').classList.remove('open');
    refreshInvoicesTable();
    alert('تم تعديل الفاتورة بنجاح');
  }
  
function deleteInvoiceConfirm(id) {
    // ✅ التحقق من صلاحية الحذف
    if(!hasPermission('delete_invoice')) {
        alert('⚠️ ليس لديك صلاحية لحذف الفواتير');
        return;
    }
    
    if(confirm('هل تريد حذف هذه الفاتورة نهائياً؟ سيتم إرجاع الكميات للمخزون.')) {
        const inv = invoices.find(i => i.id === id);
        if(inv) {
            for(let item of inv.items) { 
                const product = products.find(p => p.id === item.productId); 
                if(product) product.qty += item.qty; 
            }
            invoices = invoices.filter(i => i.id !== id);
            if(inv.paymentMethod === 'credit') { 
                const customer = customers.find(c => c.id === inv.customerId); 
                if(customer) customer.balance -= inv.total; 
            }
            saveAllData();
            document.getElementById('editInvoiceModal')?.classList.remove('open');
            refreshInvoicesTable();
            alert('تم حذف الفاتورة وإرجاع الكميات للمخزون');
        }
    }
}

    // ---- فلترة الفواتير حسب الفترة والبائع والدفع ----
    function getFilteredInvoices() {
      const period = document.getElementById('reportPeriod')?.value || 'all';
      const from   = document.getElementById('repDateFrom')?.value;
      const to     = document.getElementById('repDateTo')?.value;
      const seller = document.getElementById('repSeller')?.value || '';
      const pay    = document.getElementById('repPayType')?.value || '';
      const now = new Date(); const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
      let list = [...invoices];
      if(period==='today')  list = list.filter(i=>new Date(i.date)>=today);
      else if(period==='week')  { const w=new Date(today); w.setDate(w.getDate()-6); list=list.filter(i=>new Date(i.date)>=w); }
      else if(period==='month') { const m=new Date(today.getFullYear(),today.getMonth(),1); list=list.filter(i=>new Date(i.date)>=m); }
      else if(period==='year')  { const yr=new Date(today.getFullYear(),0,1); list=list.filter(i=>new Date(i.date)>=yr); }
      else if(period==='custom'||from||to) {
        if(from) list=list.filter(i=>new Date(i.date)>=new Date(from));
        if(to)   { const td=new Date(to); td.setHours(23,59,59,999); list=list.filter(i=>new Date(i.date)<=td); }
      }
      if(seller) list=list.filter(i=>i.seller===seller);
      if(pay)    list=list.filter(i=>i.paymentMethod===pay);
      return list.sort((a,b)=>new Date(b.date)-new Date(a.date));
    }

    // ---- بطاقات الملخص ----
    function renderSummaryCards(list) {

      const cashSales    = list.filter(i=>i.paymentMethod==='cash').reduce((s,i)=>s+i.total,0);
      const creditSales  = list.filter(i=>i.paymentMethod==='credit').reduce((s,i)=>s+i.total,0);
      const invoiceCount = list.length;
      const avgInvoice   = invoiceCount ? totalSales/invoiceCount : 0;
      document.getElementById('repSummaryCards').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">

        topProd[item.name].revenue += (item.qty*(item.price||0));
