  let _purchasePayType = 'cash';

  function selectPurchasePayType(type) {
    _purchasePayType = type;
    const cashBtn = document.getElementById('pTypeCash');
    const creditBtn = document.getElementById('pTypeCredit');
    const cashSec = document.getElementById('purchaseCashSection');
    const creditSec = document.getElementById('purchaseCreditSection');
    if(!cashBtn) return;
    if(type === 'cash') {
      cashBtn.style.borderColor = '#38bdf8'; cashBtn.style.background = 'rgba(56,189,248,0.25)'; cashBtn.style.color = '#38bdf8';
      creditBtn.style.borderColor = 'transparent'; creditBtn.style.background = 'rgba(245,158,11,0.15)'; creditBtn.style.color = '#fbbf24';
      cashSec.style.display = 'block'; creditSec.style.display = 'none';
    } else {
      creditBtn.style.borderColor = '#fbbf24'; creditBtn.style.background = 'rgba(245,158,11,0.25)'; creditBtn.style.color = '#fbbf24';
      cashBtn.style.borderColor = 'transparent'; cashBtn.style.background = 'rgba(74,222,128,0.15)'; cashBtn.style.color = '#4ade80';
      cashSec.style.display = 'none'; creditSec.style.display = 'block';
    }
    updatePurchaseCreditCalc();
  }

  function updatePurchaseCreditCalc() {
    const total = purchaseCart.reduce((s,i)=>s+(i.cost*i.qty),0);
    const down = parseFloat(document.getElementById('purchaseDownPayment')?.value)||0;
    const remaining = Math.max(0, total - down);
    const el = document.getElementById('purchaseCreditRemaining');
    if(el) el.textContent = remaining.toFixed(2) + ' ج';
    // عرض رصيد المورد قبل وبعد
    const supplierId = parseInt(document.getElementById('purchaseSupplier')?.value)||null;
    const noteDiv = document.getElementById('supplierCreditAfterNote');
    if(noteDiv && supplierId && remaining > 0) {
      const sup = suppliers.find(s=>s.id===supplierId);
      if(sup) {
        const before = sup.balance||0;
        const after = before + remaining;
        document.getElementById('supplierCreditBefore').textContent = before.toFixed(2) + ' ج';
        document.getElementById('supplierCreditAfter').textContent = after.toFixed(2) + ' ج';
        const afterEl = document.getElementById('supplierCreditAfter');
        if(afterEl) afterEl.style.color = after > 0 ? '#f87171' : after < 0 ? '#4ade80' : '#94a3b8';
        noteDiv.style.display = 'block';
      } else { noteDiv.style.display = 'none'; }
    } else if(noteDiv) { noteDiv.style.display = 'none'; }
  }

  function addItemToPurchaseCart() {
    const name = document.getElementById('purchaseItemSearch').value.trim();
    const qty = parseInt(document.getElementById('purchaseItemQty').value)||1;
    const cost = parseFloat(document.getElementById('purchaseItemCost').value)||0;
    const price = parseFloat(document.getElementById('purchaseItemPrice').value)||0;
    const warehouse = document.getElementById('purchaseItemWarehouse').value;
    if(!name) { alert('برجاء إدخال اسم الصنف'); return; }
    if(qty <= 0) { alert('الكمية يجب أن تكون أكبر من صفر'); return; }
    if(!warehouse) { alert('برجاء تحديد المخزن لهذا الصنف'); return; }
    // البحث في المنتجات الموجودة
    const existingProduct = products.find(p => p.name.toLowerCase() === name.toLowerCase() || p.barcode === name);
    const item = {
      productId: existingProduct ? existingProduct.id : null,
      name: existingProduct ? existingProduct.name : name,
      barcode: existingProduct ? existingProduct.barcode : '',
      qty: qty,
      cost: cost,
      price: price || (existingProduct ? existingProduct.price : 0),
      warehouse: warehouse,
      isNew: !existingProduct
    };
    purchaseCart.push(item);
    document.getElementById('purchaseItemSearch').value = '';
    document.getElementById('purchaseItemQty').value = '1';
    document.getElementById('purchaseItemCost').value = '0';
    document.getElementById('purchaseItemPrice').value = '0';
    // لا نمسح المخزن - ابقيه لتسهيل إضافة أصناف للمخزن نفسه
    document.getElementById('purchaseItemResults').style.display = 'none';
    renderPurchaseCart();
  }

  function renderPurchaseCart() {
    const container = document.getElementById('purchaseCartItems');
    const totalEl = document.getElementById('purchaseTotalAmt');
    if(!container) return;
    if(purchaseCart.length === 0) {
      container.innerHTML = '<div style="color:#64748b;text-align:center;padding:1rem">لم يتم إضافة أصناف بعد</div>';
      document.getElementById('purchaseCartTotal').style.display = 'none';
      updatePurchaseCreditCalc();
      return;
    }
    const total = purchaseCart.reduce((s,i)=>s+(i.cost*i.qty),0);
    const whOpts = getAllowedWarehouses().map(w=>`<option value="${w}">${w}</option>`).join('');
    container.innerHTML = `<div style="overflow-x:auto"><table class="inv-table" style="font-size:12px">
      <thead><tr><th>الصنف</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>المخزن</th><th>الإجمالي</th><th></th></tr></thead>
      <tbody>${purchaseCart.map((item,i)=>`<tr>
        <td style="color:#fff">${item.name} ${item.isNew?'<span class="badge" style="background:rgba(167,139,250,0.2);color:#a78bfa;font-size:9px">جديد</span>':''}</td>
        <td><input type="number" value="${item.qty}" min="1" onchange="updatePurchaseCartItem(${i},'qty',this.value)" style="width:60px;padding:4px 6px;background:#0f172a;border:1px solid rgba(56,189,248,0.3);border-radius:6px;color:#fff;text-align:center"></td>
        <td><input type="number" value="${item.cost}" min="0" step="0.01" onchange="updatePurchaseCartItem(${i},'cost',this.value)" style="width:80px;padding:4px 6px;background:#0f172a;border:1px solid rgba(56,189,248,0.3);border-radius:6px;color:#fbbf24;text-align:center"></td>
        <td><input type="number" value="${item.price}" min="0" step="0.01" onchange="updatePurchaseCartItem(${i},'price',this.value)" style="width:80px;padding:4px 6px;background:#0f172a;border:1px solid rgba(74,222,128,0.3);border-radius:6px;color:#4ade80;text-align:center"></td>
        <td><select onchange="updatePurchaseCartItem(${i},'warehouse',this.value)" style="padding:4px 6px;background:#0f172a;border:1px solid rgba(167,139,250,0.4);border-radius:6px;color:#a78bfa;font-size:11px;min-width:100px"><option value="">-- مخزن --</option>${whOpts.replace(`value="${item.warehouse}"`,`value="${item.warehouse}" selected`)}</select></td>
        <td style="color:#38bdf8;font-weight:700">${(item.cost*item.qty).toFixed(2)} ج</td>
        <td><button onclick="removePurchaseCartItem(${i})" style="width:26px;height:26px;border-radius:6px;background:rgba(220,38,38,0.15);color:#f87171;border:none;cursor:pointer"><i class="ti ti-x"></i></button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
    document.getElementById('purchaseCartTotal').style.display = 'flex';
    if(totalEl) totalEl.textContent = total.toFixed(2) + ' ج';
    updatePurchaseCreditCalc();
  }

  window.updatePurchaseCartItem = function(idx, field, value) {
    if(field === 'qty') purchaseCart[idx].qty = Math.max(1, parseInt(value)||1);
    else if(field === 'cost') purchaseCart[idx].cost = Math.max(0, parseFloat(value)||0);
    else if(field === 'price') purchaseCart[idx].price = Math.max(0, parseFloat(value)||0);
    else if(field === 'warehouse') purchaseCart[idx].warehouse = value;
    if(field !== 'warehouse') renderPurchaseCart(); // avoid re-render on warehouse change (select loses focus)
  };

  window.removePurchaseCartItem = function(idx) {
    purchaseCart.splice(idx, 1);
    renderPurchaseCart();
  };

  function savePurchaseInvoice() {
    if(purchaseCart.length === 0) { alert('الفاتورة فارغة! برجاء إضافة صنف على الأقل'); return; }
    // التحقق من أن كل صنف له مخزن
    const missingWh = purchaseCart.find(item => !item.warehouse);
    if(missingWh) { alert(`الصنف "${missingWh.name}" لم يتم تحديد مخزن له!`); return; }
    const supplierId = parseInt(document.getElementById('purchaseSupplier').value)||null;
    const date = document.getElementById('purchaseDate').value;
    const notes = document.getElementById('purchaseNotes').value.trim();
    const total = purchaseCart.reduce((s,i)=>s+(i.cost*i.qty),0);
    let paid = 0, treasuryId = null, downPayment = 0, downTreasuryId = null;
    if(_purchasePayType === 'cash') {
      paid = total;
      treasuryId = parseInt(document.getElementById('purchaseTreasury').value)||null;
      if(treasuryId) {
        const treas = treasuries.find(t=>t.id===treasuryId);
        if(!treas) { alert('الخزينة غير موجودة'); return; }
        if(treas.balance < total) { if(!confirm(`رصيد الخزينة (${treas.balance.toFixed(2)} ج) أقل من الإجمالي (${total.toFixed(2)} ج). هل تريد المتابعة؟`)) return; }
      }
    } else {
      downPayment = parseFloat(document.getElementById('purchaseDownPayment').value)||0;
      downTreasuryId = parseInt(document.getElementById('purchaseCreditTreasury').value)||null;
      paid = downPayment;
      if(downPayment > total) { alert('الدفعة المقدمة أكبر من الإجمالي'); return; }
      if(downPayment > 0 && downTreasuryId) {
        const treas = treasuries.find(t=>t.id===downTreasuryId);
        if(!treas) { alert('الخزينة غير موجودة'); return; }
        if(treas.balance < downPayment) { if(!confirm(`رصيد الخزينة (${treas.balance.toFixed(2)} ج) أقل من الدفعة المقدمة (${downPayment.toFixed(2)} ج). هل تريد المتابعة؟`)) return; }
      }
    }
    // إنشاء الفاتورة
    const invoice = {
      id: nextPurchaseId++,
      supplierId,
      supplierName: supplierId ? suppliers.find(s=>s.id===supplierId)?.name || 'غير محدد' : 'بدون مورد',
      date: date || new Date().toISOString().split('T')[0],
      paymentType: _purchasePayType,
      items: [...purchaseCart],
      total,
      paid,
      notes,
      createdAt: new Date().toISOString(),
      createdBy: currentUser?.username || 'admin',
      payments: paid > 0 ? [{amount: paid, date: new Date().toISOString(), note: _purchasePayType==='cash'?'دفع كاش':'دفعة مقدمة', treasuryId: _purchasePayType==='cash'?treasuryId:downTreasuryId}] : []
    };
    purchases.push(invoice);
    // تحديث المخزون (كل صنف في مخزنه المحدد)
    purchaseCart.forEach(item => {
      if(item.productId) {
        const prod = products.find(p=>p.id===item.productId);
        if(prod) {
          prod.qty += item.qty;
          prod.cost = item.cost; // تحديث سعر الشراء
          if(item.price > 0) prod.price = item.price; // تحديث سعر البيع إذا تم تحديده
          prod.wh = item.warehouse; // تحديث المخزن بمخزن الصنف المحدد
        }
      } else {
        // منتج جديد
        const newProd = {
          id: Date.now() + Math.random(),
          name: item.name,
          barcode: item.barcode || String(Date.now()).slice(-8),
          qty: item.qty,
          cost: item.cost,
          price: item.price,
          min: 5,
          wh: item.warehouse,
          cat: 'مشتريات'
        };
        products.push(newProd);
        item.productId = newProd.id;
      }
    });
    // تحديث رصيد المورد
    if(supplierId) {
      const supplier = suppliers.find(s=>s.id===supplierId);
      if(supplier) {
        if(!supplier.transactions) supplier.transactions = [];
        supplier.totalPurchases = (supplier.totalPurchases||0) + total;
        if(_purchasePayType === 'cash') {
          supplier.balance += 0; // كاش: لا يوجد دين
          supplier.totalPaid = (supplier.totalPaid||0) + total;
          supplier.transactions.push({ type:'purchase', amount:total, note:`فاتورة شراء #PO-${String(invoice.id).padStart(4,'0')}`, date:new Date().toISOString() });
          supplier.transactions.push({ type:'payment', amount:total, note:`سداد كاش - فاتورة #PO-${String(invoice.id).padStart(4,'0')}`, date:new Date().toISOString() });
        } else {
          const creditAmt = total - paid;
          supplier.balance += creditAmt;
          if(paid > 0) supplier.totalPaid = (supplier.totalPaid||0) + paid;
          supplier.transactions.push({ type:'purchase', amount:total, note:`فاتورة شراء #PO-${String(invoice.id).padStart(4,'0')}`, date:new Date().toISOString() });
          if(paid > 0) supplier.transactions.push({ type:'payment', amount:paid, note:`دفعة مقدمة - فاتورة #PO-${String(invoice.id).padStart(4,'0')}`, date:new Date().toISOString() });
        }
      }
    }
    // خصم من الخزينة
    if(_purchasePayType === 'cash' && treasuryId && paid > 0) {
      const treas = treasuries.find(t=>t.id===treasuryId);
      if(treas) {
        treas.balance -= paid;
        vouchers.push({ id:nextVoucherId++, type:'payment', amount:paid, treasuryId, party: invoice.supplierName, note:`مشتريات كاش - فاتورة #PO-${String(invoice.id).padStart(4,'0')}`, date:new Date().toISOString() });
      }
    } else if(_purchasePayType === 'credit' && paid > 0 && downTreasuryId) {
      const treas = treasuries.find(t=>t.id===downTreasuryId);
      if(treas) {
        treas.balance -= paid;
        vouchers.push({ id:nextVoucherId++, type:'payment', amount:paid, treasuryId:downTreasuryId, party: invoice.supplierName, note:`دفعة مقدمة - فاتورة #PO-${String(invoice.id).padStart(4,'0')}`, date:new Date().toISOString() });
      }
    }
    saveAllData();
    purchaseCart = [];
    _purchasePayType = 'cash';
    document.getElementById('purchaseModal').classList.remove('open');
    const invoiceNum = String(invoice.id).padStart(4,'0');
    const remainingAmt = (invoice.total||0) - (invoice.paid||0);
    let msg = `✅ تم حفظ فاتورة الشراء #PO-${invoiceNum} بنجاح!\nالإجمالي: ${invoice.total.toFixed(2)} ج`;
    if(invoice.paymentType === 'cash') msg += `\nمدفوع كاش: ${invoice.total.toFixed(2)} ج`;
    else { msg += `\nدفعة مقدمة: ${invoice.paid.toFixed(2)} ج\nمتبقي على المورد: ${remainingAmt.toFixed(2)} ج`; }
    msg += `\n\nتم تحديث المخزون والأرصدة.`;
    alert(msg);
    refreshPurchasesTable();
  }

  function refreshPurchasesTable() {
    const search = (document.getElementById('purchaseSearch')?.value||'').toLowerCase();
    const filterType = document.getElementById('purchaseFilterType')?.value||'';
    const from = document.getElementById('purchaseFilterFrom')?.value||'';
    const to = document.getElementById('purchaseFilterTo')?.value||'';
    let filtered = [...purchases].reverse();
    if(search) filtered = filtered.filter(p=>p.supplierName?.toLowerCase().includes(search)||(p.notes||'').toLowerCase().includes(search)||String(p.id).includes(search));
    if(filterType) filtered = filtered.filter(p=>p.paymentType===filterType);
    if(from) filtered = filtered.filter(p=>p.date>=from);
    if(to) filtered = filtered.filter(p=>p.date<=to);
    const PAGE_SZ = 15;
    const totalPages = Math.ceil(filtered.length/PAGE_SZ)||1;
    if(purchasesPage>totalPages) purchasesPage=1;
    const start=(purchasesPage-1)*PAGE_SZ;
    const pageItems=filtered.slice(start,start+PAGE_SZ);
    const tbody=document.getElementById('purchasesTableBody');
    if(!tbody) return;
    tbody.innerHTML=pageItems.map(p=>{
      const remaining=(p.total||0)-(p.paid||0);
      const statusColor=p.paymentType==='cash'?'#4ade80':remaining<=0?'#4ade80':'#fbbf24';
      const statusText=p.paymentType==='cash'?'مدفوع كاش':remaining<=0?'مسدد':'آجل';
      return `<tr>
        <td style="color:#38bdf8;font-weight:700">PO-${String(p.id).padStart(4,'0')}</td>
        <td style="color:#fff;font-weight:700">${p.supplierName||'بدون مورد'}</td>
        <td style="color:#94a3b8">${p.date||'---'}</td>
        <td><span class="badge" style="background:${p.paymentType==='cash'?'rgba(74,222,128,0.15)':'rgba(245,158,11,0.15)'};color:${p.paymentType==='cash'?'#4ade80':'#fbbf24'}">${p.paymentType==='cash'?'كاش':'آجل'}</span></td>
        <td style="color:#a78bfa">${[...new Set((p.items||[]).map(i=>i.warehouse).filter(Boolean))].join(' / ')||'---'}</td>
        <td style="color:#fbbf24;font-weight:700">${(p.total||0).toFixed(2)} ج</td>
        <td style="color:#4ade80">${(p.paid||0).toFixed(2)} ج</td>
        <td style="color:${remaining>0?'#f87171':'#4ade80'};font-weight:700">${remaining.toFixed(2)} ج</td>
        <td><span class="badge" style="background:${statusColor}22;color:${statusColor}">${statusText}</span></td>
        <td><div class="action-btns">
          <button class="act-btn act-view" onclick="window.viewPurchaseInvoice(${p.id})" title="عرض"><i class="ti ti-eye"></i></button>
          ${p.paymentType==='credit'&&remaining>0?`<button class="act-btn act-add" onclick="window.openPurchasePayModal(${p.id})" title="سداد دفعة"><i class="ti ti-cash"></i></button>`:''}
          <button class="act-btn act-del" onclick="window.deletePurchaseInvoice(${p.id})" title="حذف"><i class="ti ti-trash"></i></button>
        </div></td>
      </tr>`;
    }).join('')||'<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:2rem">لا توجد فواتير شراء</td></tr>';
    const pagInfo=document.getElementById('purchasesPagInfo');
    const pagBtns=document.getElementById('purchasesPagBtns');
    if(pagInfo) pagInfo.innerHTML=`عرض ${Math.min(start+1,filtered.length)}-${Math.min(start+PAGE_SZ,filtered.length)} من ${filtered.length}`;
    if(pagBtns){pagBtns.innerHTML='';for(let i=1;i<=totalPages;i++){const btn=document.createElement('button');btn.className=`pag-btn ${i===purchasesPage?'cur':''}`;btn.innerText=i;btn.onclick=()=>{purchasesPage=i;refreshPurchasesTable();};pagBtns.appendChild(btn);}}
  }

  window.deletePurchaseInvoice = function(id) {
    if(!confirm('هل تريد حذف هذه الفاتورة؟ لن يتم التراجع عن تغييرات المخزون.')) return;
    const idx = purchases.findIndex(p=>p.id===id);

  function showSupplierBalanceCard(supplierId) {
    const card = document.getElementById('supplierBalanceCard');
    if(!card) return;
    if(!supplierId) { card.style.display = 'none'; return; }
    const s = suppliers.find(x => x.id === parseInt(supplierId));
    if(!s) { card.style.display = 'none'; return; }
    const balance = s.balance || 0;
    const balEl = document.getElementById('supplierCardBalance');
    document.getElementById('supplierCardName').textContent = s.name;
    document.getElementById('supplierCardPhone').textContent = s.phone ? '📞 ' + s.phone : (s.address || '');
    document.getElementById('supplierCardTotal').textContent = ((s.totalPurchases||0)).toFixed(2) + ' ج';
    document.getElementById('supplierCardPaid').textContent = ((s.totalPaid||0)).toFixed(2) + ' ج';
    if(balEl) {
      balEl.textContent = Math.abs(balance).toFixed(2) + ' ج';
      if(balance > 0) { balEl.style.color = '#f87171'; card.style.borderColor = 'rgba(248,113,113,0.35)'; }
      else if(balance < 0) { balEl.style.color = '#4ade80'; card.style.borderColor = 'rgba(74,222,128,0.35)'; }
      else { balEl.style.color = '#94a3b8'; card.style.borderColor = 'rgba(56,189,248,0.25)'; }
    }
    card.style.display = 'block';
  }

  function attachPurchasesEvents() {
    attachNavLogout();
    purchaseCart = [];
    _purchasePayType = 'cash';
    document.getElementById('newPurchaseBtn')?.addEventListener('click', () => {
      purchaseCart = [];
      _purchasePayType = 'cash';
      document.getElementById('purchaseModalTitle').textContent = 'فاتورة شراء جديدة';
      document.getElementById('purchaseDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('purchaseSupplier').value = '';
      document.getElementById('supplierBalanceCard').style.display = 'none';
      document.getElementById('purchaseNotes').value = '';
      document.getElementById('purchaseDownPayment') && (document.getElementById('purchaseDownPayment').value = '0');
      renderPurchaseCart();
      selectPurchasePayType('cash');
      document.getElementById('purchaseModal').classList.add('open');
    });
    // عرض رصيد المورد فور الاختيار + تحديث حساب الآجل
    document.getElementById('purchaseSupplier')?.addEventListener('change', function() {
      showSupplierBalanceCard(this.value);
      updatePurchaseCreditCalc();
    });
    document.getElementById('closePurchaseModal')?.addEventListener('click', () => {
      document.getElementById('purchaseModal').classList.remove('open');
      purchaseCart = [];
      document.getElementById('supplierBalanceCard').style.display = 'none';
    });
    document.getElementById('savePurchaseBtn')?.addEventListener('click', savePurchaseInvoice);
    // بحث المنتجات في مودال الشراء
    document.getElementById('purchaseItemSearch')?.addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      const resultsDiv = document.getElementById('purchaseItemResults');
      if(!q || q.length < 2) { resultsDiv.style.display = 'none'; return; }
      const matched = products.filter(p=>p.name.toLowerCase().includes(q)||p.barcode?.includes(q)).slice(0,8);
      if(!matched.length) { resultsDiv.style.display = 'none'; return; }
      resultsDiv.innerHTML = matched.map(p=>`<div class="search-result-item" onclick="window._selectPurchaseProduct(${JSON.stringify(p.id)})">
        <strong>${p.name}</strong> <span style="color:#94a3b8;font-size:11px">| مخزون: ${p.qty} | شراء: ${p.cost} ج | بيع: ${p.price} ج</span>
      </div>`).join('');
      resultsDiv.style.display = 'block';
    });
    window._selectPurchaseProduct = function(productId) {
      const p = products.find(x=>x.id===productId);
      if(!p) return;
      document.getElementById('purchaseItemSearch').value = p.name;
      document.getElementById('purchaseItemCost').value = p.cost;
      document.getElementById('purchaseItemPrice').value = p.price;
      document.getElementById('purchaseItemResults').style.display = 'none';
    };
    document.addEventListener('click', function(e) {
      if(!e.target.closest('#purchaseItemSearch') && !e.target.closest('#purchaseItemResults')) {
        const r = document.getElementById('purchaseItemResults');
        if(r) r.style.display = 'none';
      }
    });
    // سداد دفعة
    document.getElementById('confirmPurchasePayBtn')?.addEventListener('click', () => {
      const id = parseInt(document.getElementById('purchasePayId').value);
      const amount = parseFloat(document.getElementById('purchasePayAmt').value)||0;
      const treasuryId = parseInt(document.getElementById('purchasePayTreasury').value)||null;
      const note = document.getElementById('purchasePayNote').value.trim();
      const p = purchases.find(x=>x.id===id);
      if(!p) return;
      const remaining = (p.total||0)-(p.paid||0);
      if(amount <= 0) { alert('برجاء إدخال مبلغ صحيح'); return; }
      if(amount > remaining) { alert(`المبلغ أكبر من المتبقي (${remaining.toFixed(2)} ج)`); return; }
      p.paid = (p.paid||0) + amount;
      if(!p.payments) p.payments = [];
      p.payments.push({ amount, date: new Date().toISOString(), note: note||'سداد دفعة', treasuryId });
      // تحديث رصيد المورد
      if(p.supplierId) {
        const sup = suppliers.find(s=>s.id===p.supplierId);
        if(sup) { sup.balance -= amount; sup.totalPaid=(sup.totalPaid||0)+amount; if(!sup.transactions)sup.transactions=[]; sup.transactions.push({type:'payment',amount,note:`سداد فاتورة #PO-${String(id).padStart(4,'0')}`,date:new Date().toISOString()}); }
      }
      // خصم من الخزينة
      if(treasuryId) {
        const treas = treasuries.find(t=>t.id===treasuryId);
        if(treas) { treas.balance -= amount; vouchers.push({id:nextVoucherId++,type:'payment',amount,treasuryId,party:p.supplierName,note:`سداد فاتورة شراء #PO-${String(id).padStart(4,'0')}`,date:new Date().toISOString()}); }
      }
      saveAllData();
      document.getElementById('purchasePayModal').classList.remove('open');
      alert(`✅ تم تسجيل الدفعة (${amount.toFixed(2)} ج) بنجاح`);
      refreshPurchasesTable();
    });
    document.getElementById('exportPurchasesBtn')?.addEventListener('click', () => {
      const rows = purchases.map(p=>({'رقم الفاتورة':'PO-'+String(p.id).padStart(4,'0'),'المورد':p.supplierName||'','التاريخ':p.date||'','طريقة الدفع':p.paymentType==='cash'?'كاش':'آجل','المخزن':p.warehouse||'','الإجمالي':(p.total||0).toFixed(2),'المدفوع':(p.paid||0).toFixed(2),'المتبقي':((p.total||0)-(p.paid||0)).toFixed(2),'ملاحظات':p.notes||''}));
      const ws = XLSX.utils.json_to_sheet(rows.length?rows:[{'رقم الفاتورة':'لا يوجد'}]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'فواتير الشراء');
      XLSX.writeFile(wb, `purchases_${Date.now()}.xlsx`);
    });
    // فلاتر
    ['purchaseSearch','purchaseFilterType','purchaseFilterFrom','purchaseFilterTo'].forEach(id=>{
      document.getElementById(id)?.addEventListener('input', ()=>{purchasesPage=1;refreshPurchasesTable();});
      document.getElementById(id)?.addEventListener('change', ()=>{purchasesPage=1;refreshPurchasesTable();});
    });
    refreshPurchasesTable();
  }

function openSwitchUserModal() {
  if (!currentUser || currentUser.role !== 'admin') {
    alert('هذه الخاصية متاحة لمدير النظام فقط!');
    return;
  }
  
  // إنشاء النافذة المنبثقة إذا لم تكن موجودة
  let modalBg = document.getElementById('switchUserModalBg');
  if (!modalBg) {
    modalBg = document.createElement('div');
    modalBg.id = 'switchUserModalBg';
    modalBg.className = 'modal-bg';
    modalBg.innerHTML = `
      <div class="modal" style="max-width: 400px;">
        <div class="modal-title">
          <i class="ti ti-users"></i> التنقل بين المستخدمين
        </div>
        <div id="switchUserList" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; max-height: 300px; overflow-y: auto;">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px;">
          <button class="btn btn-outline" onclick="document.getElementById('switchUserModalBg').classList.remove('open')">إلغاء</button>
        </div>
      </div>
    `;
    document.body.appendChild(modalBg);
  }

  const listDiv = document.getElementById('switchUserList');
  listDiv.innerHTML = ''; // تفريغ القائمة

  // عرض كل المستخدمين الآخرين من مصفوفة systemUsers
  const otherUsers = systemUsers.filter(u => u.username !== currentUser.username);
  
  if (otherUsers.length === 0) {
    listDiv.innerHTML = '<div style="color: #94a3b8; font-size: 13px; text-align: center;">لا يوجد مستخدمين آخرين في النظام</div>';
  } else {
    otherUsers.forEach(user => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline';
      btn.style.width = '100%';
      btn.style.justifyContent = 'flex-start';
      btn.style.borderColor = 'rgba(56,189,248,0.3)';
      btn.innerHTML = `<i class="ti ti-user" style="margin-left: 8px;"></i> ${user.name || user.username} (${user.role === 'admin' ? 'مدير' : 'كاشير/مستخدم'})`;
      btn.onclick = () => performSwitchUser(user.username);
      listDiv.appendChild(btn);
    });
  }

  modalBg.classList.add('open');
}

// 2. دالة تنفيذ التبديل
function performSwitchUser(username) {
  const targetUser = systemUsers.find(u => u.username === username);
  if (targetUser) {
    // الاحتفاظ بحساب المدير الأصلي لتسهيل العودة
    if (currentUser.role === 'admin') {
      localStorage.setItem('crizmaOriginalAdmin', JSON.stringify(currentUser));
    }
    
    // تسجيل الدخول كالمستخدم الجديد
    currentUser = targetUser;
    localStorage.setItem('crizmaUser', JSON.stringify(currentUser));
    document.getElementById('switchUserModalBg').classList.remove('open');
    
    alert(`تم التبديل بنجاح إلى المستخدم: ${targetUser.name || targetUser.username}`);
    
    // إعادة تحميل التطبيق لتطبيق الصلاحيات والواجهة الجديدة
    location.reload(); 
  }
}

// 3. دالة للعودة لحساب المدير الأصلي
function returnToAdminAccount() {
  const originalAdminStr = localStorage.getItem('crizmaOriginalAdmin');
  
  if (originalAdminStr) {
    try {
      const originalAdmin = JSON.parse(originalAdminStr);
      
      // التحقق الأمني: هل الحساب الذي نحاول العودة إليه هو فعلاً حساب مدير؟
      if (originalAdmin && originalAdmin.role === 'admin') {
        currentUser = originalAdmin;
        localStorage.setItem('crizmaUser', JSON.stringify(currentUser));
        localStorage.removeItem('crizmaOriginalAdmin');
        
        alert('تمت العودة لحساب مدير النظام بنجاح!');
        location.reload();
      } else {
        // إذا كان هناك تلاعب بالبيانات
        throw new Error("بيانات غير صالحة");
      }
    } catch (e) {
      alert('خطأ في التحقق من الصلاحيات! سيتم تسجيل الخروج.');
      localStorage.removeItem('crizmaOriginalAdmin');
      localStorage.removeItem('crizmaUser');
      location.reload();
    }
  }
}
// 4. دالة لحقن (إضافة) الأزرار أوتوماتيكياً في الشريط العلوي (Topbar)
function injectUserSwitchButtons() {
  const userSection = document.querySelector('.topbar-user');
  if (!userSection) return;

  const originalAdminStr = localStorage.getItem('crizmaOriginalAdmin');

  // فقط إذا كان هناك بيانات مدير أصلي مخزنة، نظهر زر العودة
  if (originalAdminStr) {
    if (document.getElementById('btn-return-admin')) return; 
    
    const returnBtn = document.createElement('button');
    returnBtn.id = 'btn-return-admin';
    returnBtn.className = 'btn btn-danger';
    returnBtn.style.marginRight = '10px';
    returnBtn.style.padding = '5px 10px';
    returnBtn.innerHTML = '<i class="ti ti-arrow-back-up"></i> العودة للمدير';
    returnBtn.onclick = returnToAdminAccount;
    userSection.parentElement.insertBefore(returnBtn, userSection);
  } 
  // إذا لم يكن هناك تبديل، نظهر زر "تبديل المستخدم" للمدير فقط
  else if (currentUser && currentUser.role === 'admin') {
    if (document.getElementById('btn-switch-user')) return;

    const switchBtn = document.createElement('button');
    switchBtn.id = 'btn-switch-user';
    switchBtn.className = 'btn btn-outline';
    switchBtn.style.marginRight = '10px';
    switchBtn.style.padding = '5px 10px';
    switchBtn.innerHTML = '<i class="ti ti-users"></i> تبديل';
    switchBtn.onclick = openSwitchUserModal;
    userSection.parentElement.insertBefore(switchBtn, userSection);
  }
}

window.calcFabricOrder = function() {
  const length         = parseFloat(document.getElementById('foLength')?.value) || 0;
  const piecesPerLayer = parseFloat(document.getElementById('foPiecesPerLayer')?.value) || 0;
  const totalMeters    = parseFloat(document.getElementById('foTotalMeters')?.value) || 0;

  // استهلاك القطعة = طول الفرشة ÷ عدد القطع في الفرشة
  const consumption = (piecesPerLayer > 0) ? (length / piecesPerLayer) : 0;
  // عدد القطع = الأمتار ÷ استهلاك القطعة
  const totalPieces = (consumption > 0) ? Math.floor(totalMeters / consumption) : 0;
  // عدد الطبقات = القطع ÷ قطع الفرشة
  const layers = (piecesPerLayer > 0) ? Math.ceil(totalPieces / piecesPerLayer) : 0;

  const set = (id, v) => { const el=document.getElementById(id); if(el) el.value=v; };
  set('foConsumption', consumption.toFixed(3));
  set('foTotalPieces', totalPieces);
  set('foLayers', layers);

  const setText = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  setText('foSumLen', length + ' م');
  setText('foSumCons', consumption.toFixed(3) + ' م');
  setText('foSumPieces', totalPieces);
  setText('foSumMeters', totalMeters + ' م');
};

function refreshFabricOrdersTable() {
  const tbody = document.getElementById('fabricOrdersTableBody');
  if(!tbody) return;
  const PAGE = 10;
  const total = fabricOrders.length;
  const pages = Math.ceil(total/PAGE)||1;
  if(fabricOrdersPage > pages) fabricOrdersPage = pages;
  const start = (fabricOrdersPage-1)*PAGE;
  const slice = [...fabricOrders].reverse().slice(start, start+PAGE);

  tbody.innerHTML = slice.map(o => `<tr>
    <td style="color:#14b8a6;font-weight:700">FO-${o.id}</td>
    <td style="color:#fff;font-weight:700">${o.name}</td>
    <td style="color:#a78bfa">${o.operator||'---'}</td>
    <td style="color:#14b8a6">${o.length} م</td>
    <td style="color:#4ade80">${o.piecesPerLayer}</td>
    <td style="color:#fbbf24">${(o.consumption||0).toFixed(3)} م</td>
    <td style="color:#38bdf8;font-weight:700">${o.totalMeters} م</td>
    <td style="color:#fbbf24;font-weight:700">${o.totalPieces}</td>
    <td style="color:#a78bfa">${o.layers}</td>
    <td style="color:#94a3b8;font-size:11px">${o.date||'---'}</td>
    <td><div class="action-btns">
      <button class="act-btn" style="background:rgba(20,184,166,0.15);color:#14b8a6" onclick="foView(${o.id})" title="تفاصيل"><i class="ti ti-eye"></i></button>
      <button class="act-btn act-edit" onclick="foEdit(${o.id})" title="تعديل"><i class="ti ti-edit"></i></button>
      <button class="act-btn act-del" onclick="foDelete(${o.id})" title="حذف"><i class="ti ti-trash"></i></button>
    </div></td>
  </tr>`).join('') || '<tr><td colspan="11" style="text-align:center;color:#94a3b8;padding:2rem">لا توجد أوامر فرشة</td></tr>';

  const pagInfo = document.getElementById('fabricOrdersPagInfo');
  if(pagInfo) pagInfo.textContent = `${start+1}-${Math.min(start+PAGE,total)} من ${total}`;
  const pagBtns = document.getElementById('fabricOrdersPagBtns');
  if(pagBtns) {
    pagBtns.innerHTML = '';
    for(let p=1;p<=pages;p++){
      const b=document.createElement('button');
      b.className='pag-btn'+(p===fabricOrdersPage?' cur':'');
      b.textContent=p;
      b.onclick=()=>{fabricOrdersPage=p;refreshFabricOrdersTable();};
      pagBtns.appendChild(b);
    }
  }
}

function attachFabricOrdersEvents() {
  document.getElementById('logoutFabric')?.addEventListener('click', ()=>{
    currentUser=null; localStorage.removeItem('crizmaUser'); navigateTo('login');
  });
  document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => navigateTo(el.getAttribute('data-nav'))));

  document.getElementById('newFabricOrderBtn')?.addEventListener('click', () => {
    editFabricOrderId = null;
    document.getElementById('fabricOrderModalTitle').textContent = 'أمر فرشة جديد';
    ['foName','foOperator','foBatchNo','foNotes'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    ['foLength','foPiecesPerLayer','foConsumption','foTotalMeters','foTotalPieces','foLayers'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=0; });
    document.getElementById('foFactory').value = '';
    document.getElementById('foDate').value = new Date().toISOString().split('T')[0];
    calcFabricOrder();
    document.getElementById('fabricOrderModal').classList.add('open');
  });

  document.getElementById('closeFabricOrderModal')?.addEventListener('click', ()=>{
    document.getElementById('fabricOrderModal').classList.remove('open');
  });

  document.getElementById('saveFabricOrderBtn')?.addEventListener('click', ()=>{
    const d = getFabricOrderFormData();
    if(!d.name){ alert('أدخل اسم المنتج'); return; }
    if(!d.operator){ alert('أدخل اسم المشغّل'); return; }
    if(d.length <= 0){ alert('أدخل طول الفرشة'); return; }
    if(d.totalMeters <= 0){ alert('أدخل عدد الأمتار'); return; }

    const order = {
      id: editFabricOrderId || nextFabricOrderId++,
      ...d,
      createdAt: new Date().toISOString()
    };

    if(editFabricOrderId) {
      const idx = fabricOrders.findIndex(o=>o.id===editFabricOrderId);
      if(idx!==-1) fabricOrders[idx] = order;
    } else {
      fabricOrders.push(order);
    }

    saveFabricOrders();
    document.getElementById('fabricOrderModal').classList.remove('open');
    refreshFabricOrdersTable();
  });

  refreshFabricOrdersTable();
}

window.calcFabric = function() {
  const length       = parseFloat(document.getElementById('fabricLength')?.value)       || 0;
  const piecesPerLayer = parseFloat(document.getElementById('fabricPiecesPerLayer')?.value) || 0;
  const totalMeters  = parseFloat(document.getElementById('fabricTotalMeters')?.value)  || 0;

  // السطر الأول: استهلاك القطعة = طول الفرشة ÷ عدد القطع في الفرشة
  const consumption = (piecesPerLayer > 0) ? (length / piecesPerLayer) : 0;

  // السطر الثاني: عدد القطع = عدد الأمتار ÷ استهلاك القطعة
  const totalPieces = (consumption > 0) ? Math.floor(totalMeters / consumption) : 0;

  // عدد الطبقات = عدد القطع ÷ قطع الفرشة
  const layers = (piecesPerLayer > 0) ? Math.ceil(totalPieces / piecesPerLayer) : 0;

  // تحديث الحقول المحسوبة
  const set = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };
  set('fabricConsumption', consumption.toFixed(3));
  set('fabricTotalPieces', totalPieces);
  set('fabricLayers', layers);

  // تحديث الملخص
  const setText = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
  setText('sumFabricLen', length + ' م');
  setText('sumFabricPieces', piecesPerLayer);
  setText('sumFabricCons', consumption.toFixed(3) + ' م');
  setText('sumFabricMeters', totalMeters + ' م');

  // مزامنة الكمية مع أمر التشغيل
  if(totalPieces > 0) {
    const qtyEl = document.getElementById('prodQty');
    if(qtyEl && parseInt(qtyEl.value) === 0) qtyEl.value = totalPieces;
  }
};

// دالة طباعة باركود/QR عامة
function printBarcodeLabel({ code, title, lines, color, isQR }) {
  const win = window.open('', '_blank', 'width=440,height=600');
  if(!win) { alert('فعّل النوافذ المنبثقة في المتصفح'); return; }

  // نستخدم Google Charts API للـ QR وJsBarcode للباركود - لا يحتاج مكتبة خارجية للـ QR
  const safeCode = encodeURIComponent(code);
  const qrImgUrl = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${safeCode}&choe=UTF-8`;

  const mediaBlock = isQR
    ? `<img src="${qrImgUrl}" style="margin:10px auto;display:block;width:200px;height:200px;border:4px solid ${color}33;border-radius:8px" alt="QR Code">`
    : `<svg id="barcode" style="margin:10px auto;display:block;max-width:100%"></svg>`;

  const barcodeScript = !isQR ? `
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"><\\/script>
    <script>
      window.onload = function() {
        try { JsBarcode('#barcode', '${code.replace(/'/g,"\\'")}', { format:'CODE128', width:2, height:70, displayValue:true, fontSize:12, margin:6 }); }
        catch(e) { console.error(e); }
      };
    <\\/script>` : '';

  win.document.write(`<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="utf-8">
<title>${title}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:Arial,sans-serif; background:#f8fafc; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .label { width:400px; background:#fff; border:2px solid ${color}; border-radius:14px; padding:20px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
  .label-title { font-size:15px; font-weight:900; color:${color}; margin-bottom:10px; border-bottom:2px dashed ${color}44; padding-bottom:10px; }
  .label-lines { margin:10px 0 14px; text-align:right; background:#f8fafc; border-radius:8px; padding:8px 12px; }
  .label-lines div { font-size:11px; color:#334155; padding:4px 0; border-bottom:1px dashed #e2e8f0; }
  .label-lines div:last-child { border:none; }
  .code-text { font-family:monospace; font-size:12px; color:#64748b; margin-top:6px; letter-spacing:1px; }
  .btns { margin-top:14px; display:flex; gap:8px; justify-content:center; }
  .btn-print { background:${color}; color:white; border:none; border-radius:8px; padding:9px 22px; cursor:pointer; font-size:13px; font-weight:700; }
  .btn-close { background:#e2e8f0; color:#334155; border:none; border-radius:8px; padding:9px 16px; cursor:pointer; font-size:13px; }
  @media print { body { background:#fff; } .btns { display:none; } }
</style>
</head>
<body>
<div class="label">
  <div class="label-title">${title}</div>
  <div class="label-lines">${lines.map(l=>`<div>${l}</div>`).join('')}</div>
  ${mediaBlock}
  <div class="code-text">${code}</div>
  <div class="btns">
    <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
    <button class="btn-close" onclick="window.close()">إغلاق</button>
  </div>
</div>
${barcodeScript}
</body>
</html>`);
  win.document.close();
}

let factoryUserPage = 1;
let _factoryFilteredOrders = [];
let _editFactoryFabricId = null;

window.calcFactoryFabricOrder = function() {
  const length         = parseFloat(document.getElementById('ffLength')?.value) || 0;
  const piecesPerLayer = parseFloat(document.getElementById('ffPiecesPerLayer')?.value) || 0;
  const totalMeters    = parseFloat(document.getElementById('ffTotalMeters')?.value) || 0;
  const consumption    = (piecesPerLayer > 0) ? (length / piecesPerLayer) : 0;
  const totalPieces    = (consumption > 0) ? Math.floor(totalMeters / consumption) : 0;
  const layers         = (piecesPerLayer > 0) ? Math.ceil(totalPieces / piecesPerLayer) : 0;
  const set  = (id, v) => { const el=document.getElementById(id); if(el) el.value=v; };
  const setText = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  set('ffConsumption', consumption.toFixed(3));
  set('ffTotalPieces', totalPieces);
  set('ffLayers', layers);
  setText('ffSumLen',    length + ' م');
  setText('ffSumCons',   consumption.toFixed(3) + ' م');
  setText('ffSumPieces', totalPieces);
  setText('ffSumMeters', totalMeters + ' م');
};

function attachFactoryUserScreenEvents() {
  document.getElementById('logoutFactoryUser')?.addEventListener('click', () => {
    currentUser = null; localStorage.removeItem('crizmaUser'); navigateTo('login');
  });

  const u = systemUsers.find(x => x.username === currentUser.username);
  const allowedFactories = u?.allowedFactories || [];
  const userFactory = allowedFactories.length > 0 ? factories.find(f => allowedFactories.includes(f.id)) : null;
  if(!userFactory) return;

  function getFilteredOrders() {
    const from = document.getElementById('factoryFromDate')?.value || '';
    const to = document.getElementById('factoryToDate')?.value || '';
    const search = (document.getElementById('factoryOrderSearch')?.value || '').toLowerCase();
    return (typeof fabricOrders !== 'undefined' ? fabricOrders : []).filter(o => {
      if(o.factoryId != userFactory.id) return false;
      if(from && o.date < from) return false;
      if(to && o.date > to) return false;
      if(search && !o.name.toLowerCase().includes(search) && !(o.batchNo||'').toLowerCase().includes(search)) return false;
      return true;
    });
  }

  function refreshFactoryTable() {
    _factoryFilteredOrders = getFilteredOrders();
    const PAGE = 10;
    const total = _factoryFilteredOrders.length;
    const pages = Math.ceil(total/PAGE)||1;
    if(factoryUserPage > pages) factoryUserPage = 1;
    const start = (factoryUserPage-1)*PAGE;
    const slice = [..._factoryFilteredOrders].reverse().slice(start, start+PAGE);
    
    // ملخص
    const totalMeters = _factoryFilteredOrders.reduce((s,o)=>s+(parseFloat(o.totalMeters)||0),0);
    const totalPieces = _factoryFilteredOrders.reduce((s,o)=>s+(parseInt(o.totalPieces)||0),0);
    const totalLayers = _factoryFilteredOrders.reduce((s,o)=>s+(parseInt(o.layers)||0),0);
    const el = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
    el('facStatOrders', total);
    el('facStatMeters', totalMeters.toFixed(1)+' م');
    el('facStatPieces', totalPieces);
    el('facStatLayers', totalLayers);
    
    const tbody = document.getElementById('factoryOrdersTableBody');
    if(tbody) tbody.innerHTML = slice.map(o=>`<tr>
      <td style="color:#14b8a6;font-weight:700">FO-${o.id}</td>
      <td style="color:#fff;font-weight:700">${o.name}</td>
      <td style="color:#a78bfa">${o.operator||'---'}</td>
      <td style="color:#38bdf8">${o.batchNo||'---'}</td>
      <td style="color:#14b8a6">${o.length} م</td>
      <td style="color:#4ade80">${o.piecesPerLayer}</td>
      <td style="color:#fbbf24">${(o.consumption||0).toFixed(3)} م</td>
      <td style="color:#38bdf8;font-weight:700">${o.totalMeters} م</td>
      <td style="color:#fbbf24;font-weight:700">${o.totalPieces}</td>
      <td style="color:#a78bfa">${o.layers}</td>
      <td style="color:#94a3b8;font-size:11px">${o.date||'---'}</td>
      <td><div class="action-btns">
        <button class="act-btn act-view" onclick="foView(${o.id})" title="عرض التفاصيل"><i class="ti ti-eye"></i></button>
        <button class="act-btn act-edit" onclick="openEditFactoryFabric(${o.id})" title="تعديل"><i class="ti ti-edit"></i></button>
        <button class="act-btn act-del" onclick="deleteFactoryFabric(${o.id})" title="حذف"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`).join('') || '<tr><td colspan="12" style="text-align:center;color:#94a3b8;padding:2rem"><i class="ti ti-scissors" style="font-size:32px;display:block;margin-bottom:8px;color:#14b8a6"></i>لا توجد أوامر في هذه الفترة</td></tr>';

    const pagInfo = document.getElementById('factoryOrdersPagInfo');
    if(pagInfo) pagInfo.textContent = total ? `${start+1}-${Math.min(start+PAGE,total)} من ${total}` : '0 أمر';
    const pagBtns = document.getElementById('factoryOrdersPagBtns');
    if(pagBtns) {
      pagBtns.innerHTML = '';
      for(let p=1;p<=pages;p++){
        const b=document.createElement('button');
        b.className='pag-btn'+(p===factoryUserPage?' cur':'');
        b.textContent=p;
        b.onclick=()=>{factoryUserPage=p;refreshFactoryTable();};
        pagBtns.appendChild(b);
      }
    }
  }

  document.getElementById('factoryFilterBtn')?.addEventListener('click', () => { factoryUserPage=1; refreshFactoryTable(); });
  document.getElementById('factoryOrderSearch')?.addEventListener('input', () => { factoryUserPage=1; refreshFactoryTable(); });
  
  // ===== أمر فرشة جديد =====
  function openFactoryFabricModal(order = null) {
    _editFactoryFabricId = order ? order.id : null;
    document.getElementById('factoryFabricModalTitle').textContent = order ? 'تعديل أمر الفرشة FO-'+order.id : 'أمر فرشة جديد';
    document.getElementById('ffEditId').value = order ? order.id : '';
    document.getElementById('ffName').value        = order ? order.name : '';
    document.getElementById('ffOperator').value    = order ? (order.operator||'') : '';
    document.getElementById('ffBatchNo').value     = order ? (order.batchNo||'') : '';
    document.getElementById('ffFactoryName').value = userFactory.name;
    document.getElementById('ffFactoryId').value   = userFactory.id;
    document.getElementById('ffLength').value      = order ? order.length : 0;
    document.getElementById('ffPiecesPerLayer').value = order ? order.piecesPerLayer : 0;
    document.getElementById('ffTotalMeters').value = order ? order.totalMeters : 0;
    document.getElementById('ffDate').value        = order ? (order.date||new Date().toISOString().split('T')[0]) : new Date().toISOString().split('T')[0];
    document.getElementById('ffNotes').value       = order ? (order.notes||'') : '';
    calcFactoryFabricOrder();
    document.getElementById('factoryFabricOrderModal').classList.add('open');
  }

  document.getElementById('newFactoryFabricOrderBtn')?.addEventListener('click', () => openFactoryFabricModal());

  document.getElementById('closeFactoryFabricModal')?.addEventListener('click', () => {
    document.getElementById('factoryFabricOrderModal').classList.remove('open');
  });

  document.getElementById('saveFactoryFabricOrderBtn')?.addEventListener('click', () => {
    const name    = document.getElementById('ffName').value.trim();
    const operator = document.getElementById('ffOperator').value.trim();
    const length  = parseFloat(document.getElementById('ffLength').value)||0;
    const totalMeters = parseFloat(document.getElementById('ffTotalMeters').value)||0;
    if(!name)        { alert('أدخل اسم المنتج');    return; }
    if(!operator)    { alert('أدخل اسم المشغّل');   return; }
    if(length <= 0)  { alert('أدخل طول الفرشة');    return; }
    if(totalMeters <= 0) { alert('أدخل عدد الأمتار'); return; }

    const piecesPerLayer = parseFloat(document.getElementById('ffPiecesPerLayer').value)||0;
    const consumption    = piecesPerLayer > 0 ? length / piecesPerLayer : 0;
    const totalPieces    = consumption > 0 ? Math.floor(totalMeters / consumption) : 0;
    const layers         = piecesPerLayer > 0 ? Math.ceil(totalPieces / piecesPerLayer) : 0;

    const editId = _editFactoryFabricId;
    const order = {
      id:            editId || nextFabricOrderId++,
      name,
      operator,
      batchNo:       document.getElementById('ffBatchNo').value.trim(),
      factoryId:     userFactory.id,
      factoryName:   userFactory.name,
      length, piecesPerLayer, consumption, totalMeters, totalPieces, layers,
      date:          document.getElementById('ffDate').value,
      notes:         document.getElementById('ffNotes').value.trim(),
      createdAt:     new Date().toISOString()
    };

    if(editId) {
      const idx = fabricOrders.findIndex(o => o.id === editId);
      if(idx !== -1) fabricOrders[idx] = order;
    } else {
      fabricOrders.push(order);
    }
    saveFabricOrders();
    document.getElementById('factoryFabricOrderModal').classList.remove('open');

    // إشعار نجاح
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);direction:rtl';
    toast.innerHTML = `<i class="ti ti-check" style="font-size:18px"></i> تم حفظ أمر الفرشة FO-${order.id} بنجاح!`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);

    factoryUserPage = 1;
    refreshFactoryTable();
  });

  // باركود وQR من داخل مودال المصنع
  document.getElementById('ffBarcodeBtn')?.addEventListener('click', () => {
    const code = document.getElementById('ffBatchNo').value || ('FO-'+(document.getElementById('ffEditId').value||'NEW'));
    const name = document.getElementById('ffName').value||'منتج';
    const len  = document.getElementById('ffLength').value||'0';
    const ppl  = document.getElementById('ffPiecesPerLayer').value||'0';
    const cons = document.getElementById('ffConsumption').value||'0';
    const tm   = document.getElementById('ffTotalMeters').value||'0';
    const tp   = document.getElementById('ffTotalPieces').value||'0';
    printBarcodeLabel({ code, title:'فرشة: '+name, isQR:false, color:'#14b8a6',
      lines:['رقم الفرشة: '+code,'المنتج: '+name,'طول الفرشة: '+len+' م','قطع/فرشة: '+ppl,'استهلاك/قطعة: '+cons+' م','إجمالي الأمتار: '+tm+' م','إجمالي القطع: '+tp] });
  });

  document.getElementById('ffQRBtn')?.addEventListener('click', () => {
    const code = document.getElementById('ffBatchNo').value || ('FO-'+(document.getElementById('ffEditId').value||'NEW'));
    const name = document.getElementById('ffName').value||'منتج';
    printBarcodeLabel({ code:'MO-'+code, title:'أمر فرشة: '+name, isQR:true, color:'#38bdf8',
      lines:['المنتج: '+name,'الكمية: '+document.getElementById('ffTotalPieces').value+' قطعة','الأمتار: '+document.getElementById('ffTotalMeters').value+' م','المصنع: '+userFactory.name,'التاريخ: '+new Date().toLocaleDateString('ar-EG')] });
  });

  // تعديل وحذف من الجدول
  window.openEditFactoryFabric = function(id) {
    const o = fabricOrders.find(x => x.id === id);
    if(!o) return;
    openFactoryFabricModal(o);
  };

  window.deleteFactoryFabric = function(id) {
    if(!confirm('هل تريد حذف هذا الأمر نهائياً؟')) return;
    fabricOrders = fabricOrders.filter(o => o.id !== id);
    saveFabricOrders();
    refreshFactoryTable();
  };
  
  document.getElementById('factoryExportBtn')?.addEventListener('click', () => {
    const orders = getFilteredOrders();
    if(!orders.length) { alert('لا توجد بيانات للتصدير'); return; }
    const ws = XLSX.utils.json_to_sheet(orders.map(o=>({
      'رقم الأمر': 'FO-'+o.id,
      'المنتج': o.name,
      'المشغّل': o.operator||'',
      'رقم الفرشة': o.batchNo||'',
      'المصنع': o.factoryName||userFactory.name,
      'طول الفرشة (م)': o.length,
      'قطع/فرشة': o.piecesPerLayer,
      'استهلاك/قطعة (م)': (o.consumption||0).toFixed(3),
      'إجمالي الأمتار': o.totalMeters,
      'إجمالي القطع': o.totalPieces,
      'الطبقات': o.layers,
      'التاريخ': o.date||'',
      'ملاحظات': o.notes||''
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'أوامر الفرشة');
    const from = document.getElementById('factoryFromDate')?.value || '';
    const to = document.getElementById('factoryToDate')?.value || '';
    XLSX.writeFile(wb, `FabricOrders_${userFactory.name}_${from}_${to}.xlsx`);
  });

  // تحميل أولي
  refreshFactoryTable();
}

function openQRScannerModal() {
  const modal = document.getElementById('qrScannerModalBg');
  if (!modal) { createQRScannerModal(); }
  document.getElementById('qrScannerModalBg').style.display = 'flex';
  document.getElementById('qrResultBox').style.display = 'none';

  // تشغيل الماسح
  setTimeout(() => startQRScanner(), 300);
}

function closeQRScanner() {
  document.getElementById('qrScannerModalBg').style.display = 'none';
  stopQRScanner();
}

function startQRScanner() {
  const readerEl = document.getElementById('qrReaderArea');
  if (!readerEl) return;
  readerEl.innerHTML = '';

  if (typeof Html5Qrcode === 'undefined') {
    readerEl.innerHTML = `<div style="color:#f87171;text-align:center;padding:2rem;font-size:13px"><i class="ti ti-alert-circle" style="font-size:30px;display:block;margin-bottom:8px"></i>مكتبة الماسح غير محملة.<br>تأكد من الاتصال بالإنترنت.</div>`;
    return;
  }

  try {
    qrHtml5Scanner = new Html5Qrcode('qrReaderArea');
    const config = { fps: 10, qrbox: { width: 200, height: 200 }, aspectRatio: 1.0 };

    qrHtml5Scanner.start(
      { facingMode: 'environment' },
      config,
      (decodedText) => {
        // تم المسح بنجاح
        processQRCode(decodedText);
        stopQRScanner();
      },
      (errorMsg) => { /* تجاهل أخطاء المسح الفردية */ }
    ).catch(err => {
      readerEl.innerHTML = `
        <div style="color:#f87171;text-align:center;padding:2rem;font-size:13px">
          <i class="ti ti-camera-off" style="font-size:30px;display:block;margin-bottom:8px;color:#f87171"></i>
          لا يمكن الوصول للكاميرا.<br>
          <span style="color:#64748b;font-size:11px">تحقق من إذن الكاميرا في المتصفح</span>
          <br><br>
          <span style="color:#94a3b8;font-size:11px">يمكنك إدخال الكود يدوياً أدناه</span>
        </div>`;
    });
  } catch(e) {
    console.error('QR Scanner error:', e);
  }
}

function stopQRScanner() {
  if (qrHtml5Scanner) {
    qrHtml5Scanner.stop().catch(() => {});
    qrHtml5Scanner = null;
  }
}

// المعالج الرئيسي لتحليل محتوى الـ QR وتوجيه المستخدم
function processQRCode(text) {
  if (!text || !text.trim()) return;
  text = text.trim();

  const resultBox = document.getElementById('qrResultBox');
  const resultText = document.getElementById('qrResultText');
  const resultAction = document.getElementById('qrResultAction');

  if (resultBox) {
    resultBox.style.display = 'block';
    resultText.textContent = text;
  }

  let matched = false;

  // 1. منتج: PROD-{id} أو كود المنتج مباشرة
  const prodMatch = text.match(/^PROD-(\d+)$/i) || text.match(/^PRODUCT-(\d+)$/i);
  if (prodMatch) {
    const prodId = parseInt(prodMatch[1]);
    const prod = products.find(p => p.id === prodId);
    if (prod) {
      matched = true;
      showQRResult('product', prod, resultAction, () => {
        closeQRScanner();
        navigateTo('inventory');
        setTimeout(() => {
          // فتح تفاصيل المنتج أو تصفيته
          const searchEl = document.getElementById('invSearch');
          if (searchEl) { searchEl.value = prod.name; searchEl.dispatchEvent(new Event('input')); }
        }, 500);
      });
    }
  }

  // 2. عميل: CUST-{id}
  if (!matched) {
    const custMatch = text.match(/^CUST-(\d+)$/i) || text.match(/^CUSTOMER-(\d+)$/i);
    if (custMatch) {
      const custId = parseInt(custMatch[1]);
      const cust = customers.find(c => c.id === custId);
      if (cust) {
        matched = true;
        showQRResult('customer', cust, resultAction, () => {
          closeQRScanner();
          navigateTo('customers');
          setTimeout(() => {
            if (typeof window.showCustomerStatement === 'function') window.showCustomerStatement(custId);
          }, 700);
        });
      }
    }
  }

  // 3. أمر تشغيل: PO-{id}
  if (!matched) {
    const poMatch = text.match(/^PO-(\d+)$/i) || text.match(/^PROD-ORDER-(\d+)$/i);
    if (poMatch) {
      const poId = parseInt(poMatch[1]);
      const po = productionOrders.find(o => o.id === poId);
      if (po) {
        matched = true;
        showQRResult('production', po, resultAction, () => {
          closeQRScanner();
          navigateTo('production');
        });
      }
    }
  }

  // 4. فاتورة: INV-{id}
  if (!matched) {
    const invMatch = text.match(/^INV-(\d+)$/i) || text.match(/^INVOICE-(\d+)$/i);
    if (invMatch) {
      const invId = parseInt(invMatch[1]);
      const inv = invoices.find(i => i.id === invId);
      if (inv) {
        matched = true;
        showQRResult('invoice', inv, resultAction, () => {
          closeQRScanner();
          navigateTo('invoices');
          setTimeout(() => {
            if (typeof openInvoiceDetails === 'function') openInvoiceDetails(invId);
          }, 500);
        });
      }
    }
  }

  // 5. بحث بكود الباركود في المنتجات (رقم مباشر أو كود)
  if (!matched) {
    const prod = products.find(p => p.barcode === text || String(p.id) === text || p.code === text);
    if (prod) {
      matched = true;
      showQRResult('product', prod, resultAction, () => {
        closeQRScanner();
        navigateTo('inventory');
        setTimeout(() => {
          const searchEl = document.getElementById('invSearch');
          if (searchEl) { searchEl.value = prod.name; searchEl.dispatchEvent(new Event('input')); }
        }, 500);
      });
    }
  }

  // 6. بحث باسم العميل أو رقمه
  if (!matched) {
    const cust = customers.find(c => c.phone === text || String(c.id) === text);
    if (cust) {
      matched = true;
      showQRResult('customer', cust, resultAction, () => {
        closeQRScanner();
        navigateTo('customers');
        setTimeout(() => {
          if (typeof window.showCustomerStatement === 'function') window.showCustomerStatement(cust.id);
        }, 700);
      });
    }
  }

  // 7. لم يُعرف الكود
  if (!matched && resultAction) {
    resultAction.innerHTML = `
      <div style="background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);border-radius:10px;padding:10px;text-align:center;">
        <i class="ti ti-alert-circle" style="color:#f87171;font-size:20px;display:block;margin-bottom:4px"></i>
        <div style="color:#f87171;font-size:12px;font-weight:700">لم يُعرف هذا الكود</div>
        <div style="color:#64748b;font-size:11px;margin-top:4px">تأكد أن الكود بصيغة: PROD-1 أو CUST-1 أو PO-1 أو INV-1</div>
        <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button onclick="qrSearchInSales('${text.replace(/'/g,"\\'")}'); closeQRScanner();" style="padding:6px 12px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);border:none;border-radius:8px;color:white;cursor:pointer;font-size:11px;">
            <i class="ti ti-receipt"></i> بحث في المبيعات
          </button>
          <button onclick="qrSearchInInventory('${text.replace(/'/g,"\\'")}'); closeQRScanner();" style="padding:6px 12px;background:rgba(56,189,248,0.2);border:1px solid rgba(56,189,248,0.4);border-radius:8px;color:#38bdf8;cursor:pointer;font-size:11px;">
            <i class="ti ti-box"></i> بحث في المخزون
          </button>
        </div>
      </div>`;
  }
}

function showQRResult(type, item, container, onNavigate) {

  const configs = {
    product: {

                  <span style="color:#fbbf24;font-size:11px"><i class="ti ti-currency-pound"></i> السعر: ${item.price} ج</span>

    customer: {

                  <span style="color:#94a3b8;font-size:11px"><i class="ti ti-phone"></i> ${item.phone||'---'}</span>

                </div>`
    },
    production: {
      icon: 'ti-settings', color: '#a78bfa', bg: 'rgba(124,58,237,0.15)',
      label: 'أمر تشغيل', btnText: 'فتح أوامر التشغيل', btnIcon: 'ti-settings',
      details: `<div style="font-size:13px;color:#ffffff;font-weight:700">PO-${item.id}: ${item.name}</div>
                <div style="display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;">
                  <span style="color:#94a3b8;font-size:11px"><i class="ti ti-package"></i> الكمية: ${item.qty}</span>
                  <span style="color:${item.status==='completed'?'#4ade80':'#fbbf24'};font-size:11px"><i class="ti ti-circle-check"></i> ${item.status==='completed'?'منتهي':'قيد التشغيل'}</span>
                </div>`
    },
    invoice: {
      icon: 'ti-receipt', color: '#fbbf24', bg: 'rgba(217,119,6,0.15)',
      label: 'فاتورة', btnText: 'عرض الفاتورة', btnIcon: 'ti-receipt',
      details: `<div style="font-size:13px;color:#ffffff;font-weight:700">فاتورة #${item.id}</div>
                <div style="display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;">
                  <span style="color:#94a3b8;font-size:11px"><i class="ti ti-user"></i> ${item.customerName||'نقدي'}</span>
                  <span style="color:#fbbf24;font-size:11px"><i class="ti ti-currency-pound"></i> ${item.total} ج</span>
                </div>`
    }
  };

  const cfg = configs[type];
  if (!cfg) return;

  // صوت نجاح
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.setValueAtTime(1000, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}

  container.innerHTML = `
    <div style="background:${cfg.bg};border:1px solid ${cfg.color}33;border-radius:12px;padding:12px;">

      ${cfg.details}
      <button onclick="(${onNavigate.toString()})()" style="width:100%;margin-top:10px;padding:10px;background:linear-gradient(135deg,${cfg.color},${cfg.color}cc);border:none;border-radius:10px;color:white;cursor:pointer;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;">
        <i class="ti ${cfg.btnIcon}"></i> ${cfg.btnText}
      </button>
    </div>`;
}

// دالة لتوليد QR لأي كيان (يمكن استخدامها من أي مكان)
window.generateEntityQR = function(type, id, name) {
  const prefix = { product: 'PROD', customer: 'CUST', production: 'PO', invoice: 'INV' };
  const code = `${prefix[type] || type}-${id}`;

  const container = document.createElement('div');
  container.style.cssText = 'display:none';
  document.body.appendChild(container);

  try {
    new QRCode(container, {
      text: code,
      width: 200, height: 200,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    setTimeout(() => {
      const canvas = container.querySelector('canvas');
      if (canvas) {
        const link = document.createElement('a');
        link.href = canvas.toDataURL();
        link.download = `QR_${code}_${name || ''}.png`;
        link.click();
      }
      document.body.removeChild(container);
    }, 200);
  } catch(e) {
    document.body.removeChild(container);
    alert(`كود الـ QR للـ ${name || id}: ${code}`);
  }
};
