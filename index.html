    // ---- تقرير المخزون ----
    function renderInventoryReport() {
      const allWh = [...new Set([...warehouses, ...products.map(p=>p.wh).filter(Boolean)])];
      let tItems=0,tQty=0,tCost=0,tSale=0;
      const whRows = allWh.map(w=>{
        const wp = products.filter(p=>p.wh===w);
        const qty=wp.reduce((s,p)=>s+p.qty,0);
        const cost=wp.reduce((s,p)=>s+(p.cost*p.qty),0);
        const sale=wp.reduce((s,p)=>s+(p.price*p.qty),0);
        tItems+=wp.length; tQty+=qty; tCost+=cost; tSale+=sale;
        return `<tr>
          <td style="color:#a78bfa;font-weight:700">${w}</td>
          <td style="color:#fff">${wp.length}</td>
          <td style="color:#38bdf8">${qty.toLocaleString()}</td>
          <td style="color:#fbbf24">${cost.toFixed(2)} ج</td>
          <td style="color:#4ade80">${sale.toFixed(2)} ج</td>
          <td style="color:#a78bfa">${(sale-cost).toFixed(2)} ج</td>
        </tr>`;
      });
      const lowStock = products.filter(p=>p.qty<=p.min && p.qty>0);
      const zeroStock = products.filter(p=>p.qty<=0);
      document.getElementById('repContent').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem">
          <div class="stat-card"><div style="color:#a78bfa;font-size:20px;margin-bottom:4px"><i class="ti ti-building-warehouse"></i></div><div class="stat-value">${allWh.length}</div><div class="stat-label">عدد المخازن</div></div>
          <div class="stat-card"><div style="color:#38bdf8;font-size:20px;margin-bottom:4px"><i class="ti ti-box"></i></div><div class="stat-value">${tQty.toLocaleString()}</div><div class="stat-label">إجمالي الوحدات</div></div>
          <div class="stat-card"><div style="color:#fbbf24;font-size:20px;margin-bottom:4px"><i class="ti ti-currency-dollar"></i></div><div class="stat-value">${tCost.toFixed(0)} ج</div><div class="stat-label">قيمة التكلفة</div></div>
          <div class="stat-card"><div style="color:#f87171;font-size:20px;margin-bottom:4px"><i class="ti ti-alert-triangle"></i></div><div class="stat-value">${lowStock.length+zeroStock.length}</div><div class="stat-label">منتجات تحتاج تجديد</div></div>
        </div>
        <div class="cart-panel" style="margin-bottom:1rem">
          <div class="panel-title"><i class="ti ti-building-warehouse"></i> ملخص المخازن</div>
          <div style="overflow-x:auto"><table class="inv-table" style="font-size:12px">
            <thead><tr><th>المخزن</th><th>الأصناف</th><th>الوحدات</th><th>قيمة التكلفة</th><th>قيمة البيع</th><th>هامش الربح</th></tr></thead>
            <tbody>${whRows.join('')}
              <tr style="border-top:2px solid rgba(56,189,248,0.4);font-weight:800">
                <td style="color:#fff">الإجمالي</td>
                <td style="color:#fff">${tItems}</td>
                <td style="color:#38bdf8">${tQty.toLocaleString()}</td>
                <td style="color:#fbbf24">${tCost.toFixed(2)} ج</td>
                <td style="color:#4ade80">${tSale.toFixed(2)} ج</td>
                <td style="color:#a78bfa">${(tSale-tCost).toFixed(2)} ج</td>
              </tr>
            </tbody>
          </table></div>
        </div>
        ${lowStock.length||zeroStock.length?`<div class="cart-panel">
          <div class="panel-title"><i class="ti ti-alert-triangle" style="color:#f87171"></i> منتجات تحتاج تجديد (${lowStock.length+zeroStock.length})</div>
          <div style="overflow-x:auto"><table class="inv-table" style="font-size:12px">
            <thead><tr><th>المنتج</th><th>المخزن</th><th>الكمية</th><th>الحد الأدنى</th><th>الحالة</th></tr></thead>
            <tbody>
              ${[...zeroStock.map(p=>({...p,status:'zero'})),...lowStock.map(p=>({...p,status:'low'}))].map(p=>`<tr>
                <td style="color:#fff;font-weight:700">${p.name}</td>
                <td style="color:#a78bfa">${p.wh||'---'}</td>
                <td style="color:${p.qty<=0?'#f87171':'#fbbf24'};font-weight:700">${p.qty}</td>
                <td style="color:#94a3b8">${p.min}</td>
                <td>${p.qty<=0?'<span class="badge badge-zero">نفد</span>':'<span class="badge badge-low">منخفض</span>'}</td>
              </tr>`).join('')}
            </tbody>
          </table></div>
        </div>`:''}
      `;
    }

    // ---- تقرير العملاء ----
    function renderCustomersReport() {
      const debtors = customers.filter(c=>c.balance>0).sort((a,b)=>b.balance-a.balance);
      const creditors = customers.filter(c=>c.balance<0).sort((a,b)=>a.balance-b.balance);
      const totalDebt = debtors.reduce((s,c)=>s+c.balance,0);
      const totalCredit = creditors.reduce((s,c)=>s+Math.abs(c.balance),0);

      document.getElementById('repContent').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem">
          <div class="stat-card" style="border-color:rgba(248,113,113,0.4)">
            <div style="color:#f87171;font-size:20px;margin-bottom:4px"><i class="ti ti-users"></i></div>
            <div class="stat-value" style="color:#f87171">${totalDebt.toFixed(2)} ج</div>
            <div class="stat-label">ديون على العملاء (${debtors.length})</div>
          </div>
          <div class="stat-card" style="border-color:rgba(74,222,128,0.4)">
            <div style="color:#4ade80;font-size:20px;margin-bottom:4px"><i class="ti ti-user-check"></i></div>
            <div class="stat-value" style="color:#4ade80">${totalCredit.toFixed(2)} ج</div>
            <div class="stat-label">أرصدة دائنة للعملاء (${creditors.length})</div>
          </div>
          <div class="stat-card">

            <div class="stat-value">${customers.length}</div>
            <div class="stat-label">إجمالي العملاء</div>
          </div>
        </div>
        <div class="mid-row">
          <div class="cart-panel">
            <div class="panel-title"><i class="ti ti-alert-circle" style="color:#f87171"></i> عملاء بديون (${debtors.length})</div>
            ${debtors.length?`<div style="overflow-x:auto"><table class="inv-table" style="font-size:12px">
              <thead><tr><th>العميل</th><th>الهاتف</th><th>الرصيد المديون</th></tr></thead>
              <tbody>${debtors.map(c=>`<tr>
                <td style="color:#fff;font-weight:700">${c.name}</td>
                <td style="color:#94a3b8">${c.phone||'---'}</td>
                <td style="color:#f87171;font-weight:800">${c.balance.toFixed(2)} ج</td>
              </tr>`).join('')}
              <tr style="border-top:2px solid rgba(248,113,113,0.3);font-weight:800"><td colspan="2" style="color:#fff">الإجمالي</td><td style="color:#f87171">${totalDebt.toFixed(2)} ج</td></tr>
              </tbody></table></div>` : '<div style="color:#94a3b8;text-align:center;padding:1.5rem">لا يوجد ديون</div>'}
          </div>
          <div class="cart-panel">
            <div class="panel-title"><i class="ti ti-check-circle" style="color:#4ade80"></i> عملاء بأرصدة دائنة (${creditors.length})</div>
            ${creditors.length?`<div style="overflow-x:auto"><table class="inv-table" style="font-size:12px">
              <thead><tr><th>العميل</th><th>الهاتف</th><th>الرصيد الدائن</th></tr></thead>
              <tbody>${creditors.map(c=>`<tr>
                <td style="color:#fff;font-weight:700">${c.name}</td>
                <td style="color:#94a3b8">${c.phone||'---'}</td>
                <td style="color:#4ade80;font-weight:800">${Math.abs(c.balance).toFixed(2)} ج</td>
              </tr>`).join('')}
              <tr style="border-top:2px solid rgba(74,222,128,0.3);font-weight:800"><td colspan="2" style="color:#fff">الإجمالي</td><td style="color:#4ade80">${totalCredit.toFixed(2)} ج</td></tr>
              </tbody></table></div>` : '<div style="color:#94a3b8;text-align:center;padding:1.5rem">لا يوجد أرصدة دائنة</div>'}
          </div>
        </div>
      `;
    }

    // ---- تبديل التبويبات ----
    window.switchRepTab = function(tabId) {
      activeRepTab = tabId;
      document.querySelectorAll('.rep-tab-btn').forEach(btn=>{
        const isActive = btn.id === 'tab-'+tabId;
        btn.style.background = isActive ? 'rgba(56,189,248,0.15)' : 'rgba(255,255,255,0.06)';
        btn.style.borderColor = isActive ? '#38bdf8' : 'rgba(255,255,255,0.1)';
        btn.style.color = isActive ? '#38bdf8' : '#94a3b8';
      });
      const list = getFilteredInvoices();
      renderSummaryCards(list);
      if(tabId==='sales-rep')         renderSalesReport(list);
      else if(tabId==='payments-rep') renderPaymentsReport();
      else if(tabId==='disbursements-rep') renderDisbursementsReport();
      else if(tabId==='inventory-rep')renderInventoryReport();
      else if(tabId==='customers-rep')renderCustomersReport();
    };

    // ---- فلتر السريع يضبط التواريخ ----
    document.getElementById('reportPeriod')?.addEventListener('change', () => {
      const period = document.getElementById('reportPeriod')?.value;
      const now = new Date();
      const toStr = now.toLocaleDateString('en-CA');
      if(period==='today')  { document.getElementById('repDateFrom').value=toStr; document.getElementById('repDateTo').value=toStr; }
      else if(period==='week')  { const w=new Date(now); w.setDate(w.getDate()-6); document.getElementById('repDateFrom').value=w.toLocaleDateString('en-CA'); document.getElementById('repDateTo').value=toStr; }
      else if(period==='month') { const m=new Date(now.getFullYear(),now.getMonth(),1); document.getElementById('repDateFrom').value=m.toLocaleDateString('en-CA'); document.getElementById('repDateTo').value=toStr; }
      else if(period==='year')  { document.getElementById('repDateFrom').value=now.getFullYear()+'-01-01'; document.getElementById('repDateTo').value=now.getFullYear()+'-12-31'; }
      else if(period==='all')   { document.getElementById('repDateFrom').value=''; document.getElementById('repDateTo').value=''; }
    });

    document.getElementById('applyRepFilter')?.addEventListener('click', () => window.switchRepTab(activeRepTab));

    // ---- تصدير Excel ----
    document.getElementById('exportRepExcel')?.addEventListener('click', () => {
      const list = getFilteredInvoices();
      const wb = XLSX.utils.book_new();
      // ورقة المبيعات
      const salesRows = list.map(inv=>({'#':inv.id,'العميل':inv.customerName,'البائع':inv.seller||'','كاش':inv.paymentMethod==='cash'?inv.total:0,'آجل':inv.paymentMethod==='credit'?inv.total:0,'الإجمالي':inv.total,'الأرباح':inv.totalProfit||0,'نوع الدفع':inv.paymentMethod==='cash'?'كاش':'آجل','التاريخ':new Date(inv.date).toLocaleDateString('ar-EG')}));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(salesRows.length?salesRows:[{'#':'لا يوجد'}]), 'المبيعات');
      // ورقة سندات القبض
      const recRows = vouchers.filter(v=>v.type==='receipt').map(v=>({'رقم السند':'SND-'+String(v.id).padStart(4,'0'),'الجهة':v.party||'','الخزينة':treasuries.find(t=>t.id===v.treasuryId)?.name||'','المبلغ':v.amount,'البيان':v.note||'','التاريخ':new Date(v.date).toLocaleDateString('ar-EG')}));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(recRows.length?recRows:[{'السند':'لا يوجد'}]), 'سندات القبض');
      // ورقة سندات الصرف
      const payRows = vouchers.filter(v=>v.type==='payment').map(v=>({'رقم السند':'SND-'+String(v.id).padStart(4,'0'),'الجهة':v.party||'','الخزينة':treasuries.find(t=>t.id===v.treasuryId)?.name||'','المبلغ':v.amount,'البيان':v.note||'','التاريخ':new Date(v.date).toLocaleDateString('ar-EG')}));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(payRows.length?payRows:[{'السند':'لا يوجد'}]), 'سندات الصرف');
      // ورقة المخزون
      const invRows = products.map(p=>({'المنتج':p.name,'المخزن':p.wh||'','الكمية':p.qty,'التكلفة':p.cost,'سعر البيع':p.price,'قيمة المخزون (تكلفة)':p.cost*p.qty}));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(invRows.length?invRows:[{'المنتج':'لا يوجد'}]), 'المخزون');
      XLSX.writeFile(wb, `تقارير_شاملة_${new Date().toLocaleDateString('en-CA')}.xlsx`);
    });

    // ---- طباعة ----
    document.getElementById('printRepBtn')?.addEventListener('click', () => {
      const content = document.getElementById('repContent')?.innerHTML || '';
      const summary = document.getElementById('repSummaryCards')?.innerHTML || '';
      const w = window.open('','_blank');

        <style>
          body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;background:#fff;color:#1e293b;padding:1.5rem;font-size:12px}

          .stat-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px;text-align:center}
          @media print{body{padding:8px}}

          <div style="font-size:22px;font-weight:900;color:#0ea5e9">JEANS STOP — التقارير الشاملة</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px">تاريخ التقرير: ${new Date().toLocaleDateString('ar-EG')}</div>
        </div>
        ${summary}${content}
        <script>window.onload=()=>{window.print();setTimeout(()=>window.close(),500)}<\/script>
      </body></html>`);
      w.document.close();
    });

    // ---- تشغيل أول تبويب ----
    window.switchRepTab('sales-rep');

  let editTreasuryIdx = null;
  function attachTreasuryEvents() {
    attachNavLogout();
    document.getElementById('newTreasuryBtn')?.addEventListener('click', () => {
      editTreasuryIdx = null;
      document.getElementById('treasuryModalTitle').textContent = 'إضافة خزينة جديدة';
      document.getElementById('treasuryName').value = '';
      document.getElementById('treasuryBalance').value = '0';
      document.getElementById('treasuryDesc').value = '';
      document.getElementById('treasuryModal').classList.add('open');
    });
    document.getElementById('closeTreasuryModal')?.addEventListener('click', () => document.getElementById('treasuryModal').classList.remove('open'));
    document.getElementById('saveTreasuryBtn')?.addEventListener('click', () => {
      const name = document.getElementById('treasuryName').value.trim();
      if(!name) { alert('برجاء إدخال اسم الخزينة'); return; }
      const balance = parseFloat(document.getElementById('treasuryBalance').value)||0;
      const description = document.getElementById('treasuryDesc').value.trim();
      if(editTreasuryIdx !== null) {
        treasuries[editTreasuryIdx] = { ...treasuries[editTreasuryIdx], name, balance, description };
      } else {
        treasuries.push({ id: Date.now(), name, balance, description });
      }
      saveAllData();
      document.getElementById('treasuryModal').classList.remove('open');
      document.getElementById('treasuriesList').innerHTML = renderTreasuriesCards();
    });
    window.editTreasury = (idx) => {
      editTreasuryIdx = idx;
      const t = treasuries[idx];
      document.getElementById('treasuryModalTitle').textContent = 'تعديل الخزينة';
      document.getElementById('treasuryName').value = t.name;
      document.getElementById('treasuryBalance').value = t.balance;
      document.getElementById('treasuryDesc').value = t.description||'';
      // تحديث label ليدل على أن الرصيد قابل للتعديل
      const balLabel = document.querySelector('#treasuryModal label[for="treasuryBalance"], #treasuryModal .field label');
      if(balLabel && balLabel.nextElementSibling && balLabel.nextElementSibling.id === 'treasuryBalance') balLabel.textContent = 'الرصيد الحالي (ج)';
      document.getElementById('treasuryModal').classList.add('open');
    };
    window.deleteTreasury = (idx) => {
      const t = treasuries[idx];
      const hasVouchers = vouchers.some(v=>v.treasuryId===t.id);
      if(hasVouchers) { alert('لا يمكن حذف خزينة لها سندات مرتبطة بها'); return; }
      if(confirm(`هل تريد حذف الخزينة "${t.name}"؟`)) {
        treasuries.splice(idx,1);
        saveAllData();
        document.getElementById('treasuriesList').innerHTML = renderTreasuriesCards();
      }
    };
  }

  function refreshVouchersTable(filter = {}) {
    let list = [...vouchers];
    if(filter.type) list = list.filter(v=>v.type===filter.type);
    if(filter.from) list = list.filter(v=>new Date(v.date)>=new Date(filter.from));
    if(filter.to) { const td=new Date(filter.to); td.setDate(td.getDate()+1); list=list.filter(v=>new Date(v.date)<td); }
    list = list.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const tbody = document.getElementById('vouchersTableBody');
    if(!tbody) return;
    tbody.innerHTML = list.map(v=>{
      const treas = treasuries.find(t=>t.id===v.treasuryId);
      return `<tr>
        <td style="color:#38bdf8">SND-${String(v.id).padStart(4,'0')}</td>
        <td>${v.type==='receipt'?'<span class="badge badge-ok"><i class="ti ti-arrow-up-circle"></i> قبض</span>':'<span class="badge badge-zero"><i class="ti ti-arrow-down-circle"></i> صرف</span>'}</td>
        <td style="color:${v.type==='receipt'?'#4ade80':'#f87171'};font-weight:700">${v.amount.toFixed(2)} ج</td>
        <td style="color:#a78bfa">${treas?.name||'---'}</td>
        <td style="color:#ffffff">${v.party||'---'}</td>
        <td style="color:#94a3b8">${v.note||'---'}</td>
        <td style="color:#94a3b8">${new Date(v.date).toLocaleDateString('ar-EG',{timeZone:'Africa/Cairo'})}</td>
        <td><div class="action-btns">
          <button class="act-btn act-print" onclick="window.printVoucher(${v.id})" title="طباعة"><i class="ti ti-printer"></i></button>
          <button class="act-btn act-del" onclick="window.deleteVoucher(${v.id})" title="حذف"><i class="ti ti-trash"></i></button>
        </div></td>
      </table>`;
    }).join('') || '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:1.5rem">لا توجد سندات</td></tr>';
  }

  function attachVouchersEvents() {
    attachNavLogout();
    let currentVoucherType = 'receipt';
    const openVoucherModal = (type) => {
      currentVoucherType = type;
      document.getElementById('voucherType').value = type;
      document.getElementById('voucherModalTitle').textContent = type==='receipt' ? 'سند قبض جديد' : 'سند صرف جديد';
      document.getElementById('voucherAmount').value = '0';
      document.getElementById('voucherPartyType').value = 'manual';
      document.getElementById('voucherPartySelect').style.display = 'none';
      document.getElementById('voucherParty').style.display = '';
      document.getElementById('voucherParty').value = '';
      document.getElementById('voucherNote').value = '';
      document.getElementById('voucherDate').value = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD format
      document.getElementById('voucherModal').classList.add('open');
    };
    // منطق تبديل نوع الجهة في السند
    function showCustomerBalanceInModal() {
      const type = document.getElementById('voucherPartyType')?.value;
      const infoDiv = document.getElementById('customerBalanceInfo');
      const balVal = document.getElementById('customerBalanceVal');
      if(!infoDiv || !balVal) return;
      if(type === 'customer') {
        const selName = document.getElementById('voucherPartySelect')?.value;
        const c = customers.find(x => x.name === selName);
        if(c) {
          infoDiv.style.display = '';
          if(c.balance > 0) { balVal.textContent = 'عليه ' + c.balance.toFixed(2) + ' ج'; balVal.style.color = '#f87171'; }
          else if(c.balance < 0) { balVal.textContent = 'له ' + Math.abs(c.balance).toFixed(2) + ' ج'; balVal.style.color = '#4ade80'; }
          else { balVal.textContent = 'صفر'; balVal.style.color = '#94a3b8'; }
        } else infoDiv.style.display = 'none';
      } else infoDiv.style.display = 'none';
    }
    function updatePartyOptions() {
      const type = document.getElementById('voucherPartyType')?.value;
      const sel = document.getElementById('voucherPartySelect');
      const inp = document.getElementById('voucherParty');
      if(!sel || !inp) return;
      if(type === 'manual') {
        sel.style.display = 'none'; inp.style.display = '';
        document.getElementById('customerBalanceInfo').style.display = 'none';
      } else {
        sel.style.display = ''; inp.style.display = 'none';
        let options = [];
        if(type === 'customer') options = customers.map(c=>`<option value="${c.name}">${c.name} - ${c.phone||''} ${c.balance > 0 ? '(عليه '+c.balance.toFixed(2)+' ج)' : c.balance < 0 ? '(له '+Math.abs(c.balance).toFixed(2)+' ج)' : ''}</option>`);
        else if(type === 'supplier') options = suppliers.map(s=>`<option value="${s.name}">${s.name} - ${s.phone||''}</option>`);
        else if(type === 'factory') options = factories.map(f=>`<option value="${f.name}">${f.name} (متبقي: ${f.balance.toFixed(2)} ج)</option>`);
        else if(type === 'laundry') options = laundries.map(l=>`<option value="${l.name}">${l.name} (متبقي: ${l.balance.toFixed(2)} ج)</option>`);
        sel.innerHTML = options.length ? options.join('') : '<option value="">لا يوجد بيانات</option>';
        showCustomerBalanceInModal();
      }
    }
    document.getElementById('voucherPartyType')?.addEventListener('change', updatePartyOptions);
    document.getElementById('voucherPartySelect')?.addEventListener('change', showCustomerBalanceInModal);

    function getPartyValue() {
      const type = document.getElementById('voucherPartyType')?.value;
      if(type === 'manual') return document.getElementById('voucherParty')?.value.trim() || '';
      return document.getElementById('voucherPartySelect')?.value || '';
    }

    document.getElementById('newReceiptBtn')?.addEventListener('click', () => openVoucherModal('receipt'));
    document.getElementById('newPaymentBtn')?.addEventListener('click', () => openVoucherModal('payment'));
    document.getElementById('closeVoucherModal')?.addEventListener('click', () => document.getElementById('voucherModal').classList.remove('open'));
    document.getElementById('saveVoucherBtn')?.addEventListener('click', () => {
      const amount = parseFloat(document.getElementById('voucherAmount').value)||0;
      if(amount <= 0) { alert('برجاء إدخال مبلغ صحيح'); return; }
      const treasuryId = parseInt(document.getElementById('voucherTreasury').value);
      const type = document.getElementById('voucherType').value;
      const party = getPartyValue();
      const note = document.getElementById('voucherNote').value.trim();
      const todayLocal = new Date(); const date = document.getElementById('voucherDate').value || `${todayLocal.getFullYear()}-${String(todayLocal.getMonth()+1).padStart(2,'0')}-${String(todayLocal.getDate()).padStart(2,'0')}`;
      const treasury = treasuries.find(t=>t.id===treasuryId);
      if(!treasury) { alert('برجاء اختيار خزينة'); return; }
      if(type==='payment' && treasury.balance < amount) {
        if(!confirm(`رصيد الخزينة (${treasury.balance.toFixed(2)} ج) أقل من المبلغ. هل تريد المتابعة؟`)) return;
      }

      const voucher = { id: nextVoucherId++, type, amount, treasuryId, party, note, date: dateISO, createdBy: currentUser?.username || '' };

      if(type==='receipt') {
        treasury.balance += amount;

          if(customer) customer.balance -= amount;
        }
      }
      else treasury.balance -= amount;
      saveAllData();
      document.getElementById('voucherModal').classList.remove('open');
      refreshVouchersTable();
      window.printVoucher(voucher.id);

        type: document.getElementById('voucherTypeFilter').value,
        from: document.getElementById('voucherDateFrom').value,

  function refreshSuppliersTable() {
    const search = document.getElementById('supplierSearch')?.value.toLowerCase() || '';
    let filtered = suppliers.filter(s => s.name.toLowerCase().includes(search) || (s.phone||'').includes(search));
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
    if(suppliersPage > totalPages) suppliersPage = 1;
    const start = (suppliersPage-1)*PAGE_SIZE;
    const pageItems = filtered.slice(start, start+PAGE_SIZE);
    const tbody = document.getElementById('suppliersTableBody');
    if(tbody) tbody.innerHTML = pageItems.map((s,idx) => {
      const globalIdx = suppliers.findIndex(x=>x.id===s.id);
      const balColor = s.balance > 0 ? '#f87171' : s.balance < 0 ? '#4ade80' : '#94a3b8';
      const balText = s.balance > 0 ? `عليه ${s.balance.toFixed(2)} ج` : s.balance < 0 ? `له ${Math.abs(s.balance).toFixed(2)} ج` : 'متوازن';
      return `<tr>
        <td style="color:#94a3b8">${start+idx+1}</td>
        <td style="color:#ffffff;font-weight:700">${s.name}</td>
        <td style="color:#38bdf8">${s.phone||'---'}</td>
        <td style="color:#94a3b8">${s.address||'---'}</td>
        <td style="color:#fbbf24">${(s.totalPurchases||0).toFixed(2)} ج</td>
        <td style="color:#4ade80">${(s.totalPaid||0).toFixed(2)} ج</td>
        <td style="color:${balColor};font-weight:700">${balText}</td>
        <td><div class="action-btns">
          <button class="act-btn act-view" onclick="window.viewSupplierTx(${globalIdx})" title="المعاملات"><i class="ti ti-history"></i></button>
          <button class="act-btn act-edit" onclick="window.editSupplier(${globalIdx})" title="تعديل"><i class="ti ti-edit"></i></button>
          <button class="act-btn act-del" onclick="window.deleteSupplier(${globalIdx})" title="حذف"><i class="ti ti-trash"></i></button>
        </div></td>
      </tr>`;
    }).join('') || '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:2rem">لا يوجد موردون</td></tr>';
    if(document.getElementById('suppliersPagInfo')) document.getElementById('suppliersPagInfo').innerHTML = `عرض ${Math.min(start+1,filtered.length)}-${Math.min(start+PAGE_SIZE,filtered.length)} من ${filtered.length}`;
    const pagDiv = document.getElementById('suppliersPagBtns');
    if(pagDiv) { pagDiv.innerHTML=''; for(let i=1;i<=totalPages;i++){ const btn=document.createElement('button'); btn.className=`pag-btn ${i===suppliersPage?'cur':''}`; btn.innerText=i; btn.onclick=()=>{suppliersPage=i;refreshSuppliersTable();}; pagDiv.appendChild(btn); } }
  }

  let currentSupplierIdx = null;

  function attachSuppliersEvents() {
    attachNavLogout();
    document.getElementById('newSupplierBtn')?.addEventListener('click', () => {
      editSupplierId = null;
      document.getElementById('supplierModalTitle').textContent = 'إضافة مورد جديد';
      document.getElementById('supplierName').value = '';
      document.getElementById('supplierPhone').value = '';
      document.getElementById('supplierAddress').value = '';
      document.getElementById('supplierEmail').value = '';
      document.getElementById('supplierProducts').value = '';
      document.getElementById('supplierNotes').value = '';
      document.getElementById('supplierBalanceField').style.display = 'block';
      document.getElementById('supplierBalance').value = '0';
      document.getElementById('supplierModal').classList.add('open');
    });
    document.getElementById('closeSupplierModal')?.addEventListener('click', () => document.getElementById('supplierModal').classList.remove('open'));
    document.getElementById('saveSupplierBtn')?.addEventListener('click', () => {
      const name = document.getElementById('supplierName').value.trim();
      if(!name) { alert('برجاء إدخال اسم المورد'); return; }
      const phone = document.getElementById('supplierPhone').value.trim();
      const address = document.getElementById('supplierAddress').value.trim();
      const email = document.getElementById('supplierEmail').value.trim();
      const products_spec = document.getElementById('supplierProducts').value.trim();
      const notes = document.getElementById('supplierNotes').value.trim();
      if(editSupplierId !== null) {
        const idx = suppliers.findIndex(s=>s.id===editSupplierId);
        if(idx !== -1) suppliers[idx] = { ...suppliers[idx], name, phone, address, email, products: products_spec, notes };
      } else {
        const balance = parseFloat(document.getElementById('supplierBalance').value)||0;
        suppliers.push({ id: nextSupplierId++, name, phone, address, email, products: products_spec, notes, balance, totalPurchases: balance > 0 ? balance : 0, totalPaid: balance < 0 ? Math.abs(balance) : 0, transactions: balance !== 0 ? [{ type: balance>0?'purchase':'payment', amount: Math.abs(balance), note: 'رصيد افتتاحي', date: new Date().toISOString() }] : [] });
      }
      saveAllData();
      document.getElementById('supplierModal').classList.remove('open');
      refreshSuppliersTable();
    });
    document.getElementById('supplierSearch')?.addEventListener('input', () => { suppliersPage=1; refreshSuppliersTable(); });
    document.getElementById('exportSuppliersBtn')?.addEventListener('click', () => {
      const rows = suppliers.map(s=>({ 'المورد':s.name, 'الهاتف':s.phone||'', 'العنوان':s.address||'', 'البريد':s.email||'', 'المنتجات':s.products||'', 'إجمالي المشتريات':(s.totalPurchases||0).toFixed(2), 'المدفوع':(s.totalPaid||0).toFixed(2), 'الرصيد':s.balance.toFixed(2), 'ملاحظات':s.notes||'' }));
      const ws = XLSX.utils.json_to_sheet(rows.length?rows:[{'المورد':'لا يوجد'}]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'الموردين');
      XLSX.writeFile(wb, `suppliers_${Date.now()}.xlsx`);
    });
    window.editSupplier = (idx) => {
      const s = suppliers[idx];
      editSupplierId = s.id;
      document.getElementById('supplierModalTitle').textContent = 'تعديل بيانات المورد';
      document.getElementById('supplierName').value = s.name;
      document.getElementById('supplierPhone').value = s.phone||'';
      document.getElementById('supplierAddress').value = s.address||'';
      document.getElementById('supplierEmail').value = s.email||'';
      document.getElementById('supplierProducts').value = s.products||'';
      document.getElementById('supplierNotes').value = s.notes||'';
      document.getElementById('supplierBalanceField').style.display = 'none';
      document.getElementById('supplierModal').classList.add('open');
    };
    window.deleteSupplier = (idx) => {
      if(confirm(`هل تريد حذف المورد "${suppliers[idx].name}" نهائياً؟`)) {
        suppliers.splice(idx,1);
        saveAllData();
        refreshSuppliersTable();
      }
    };
    window.viewSupplierTx = (idx) => {
      currentSupplierIdx = idx;
      renderSupplierTx();
      document.getElementById('supplierTxModal').classList.add('open');
    };
    document.getElementById('addTxBtn')?.addEventListener('click', () => {
      if(currentSupplierIdx === null) return;
      const s = suppliers[currentSupplierIdx];
      const type = document.getElementById('txType').value;
      const amount = parseFloat(document.getElementById('txAmount').value)||0;
      const note = document.getElementById('txNote').value.trim();
      if(amount <= 0) { alert('برجاء إدخال مبلغ صحيح'); return; }
      if(!s.transactions) s.transactions = [];
      s.transactions.push({ type, amount, note, date: new Date().toISOString() });
      if(type === 'purchase') { s.balance += amount; s.totalPurchases = (s.totalPurchases||0) + amount; }
      else if(type === 'payment') { s.balance -= amount; s.totalPaid = (s.totalPaid||0) + amount; }
      else if(type === 'return') { s.balance -= amount; s.totalPurchases = Math.max(0,(s.totalPurchases||0) - amount); }
      saveAllData();
      document.getElementById('txAmount').value = '';
      document.getElementById('txNote').value = '';
      renderSupplierTx();
      refreshSuppliersTable();
    });
    refreshSuppliersTable();
  }

  function renderSupplierTx() {
    if(currentSupplierIdx === null) return;
    const s = suppliers[currentSupplierIdx];
    document.getElementById('supplierTxTitle').textContent = `سجل معاملات: ${s.name}`;
    const txs = s.transactions || [];
    const tbody = document.getElementById('supplierTxBody');
    if(tbody) {
      tbody.innerHTML = [...txs].reverse().map(tx => {
        const typeMap = { purchase: ['مشتريات','#f87171'], payment: ['دفع','#4ade80'], return: ['مرتجع','#fbbf24'] };
        const [lbl, clr] = typeMap[tx.type] || ['---','#94a3b8'];
        return `<tr>
          <td><span class="badge" style="background:${clr}22;color:${clr}">${lbl}</span></td>
          <td style="color:${clr};font-weight:700">${tx.amount.toFixed(2)} ج</td>
          <td style="color:#94a3b8">${tx.note||'---'}</td>
          <td style="color:#94a3b8">${new Date(tx.date).toLocaleDateString('ar-EG')}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="4" style="text-align:center;color:#94a3b8">لا توجد معاملات</td></tr>';
    }
    const balEl = document.getElementById('supplierTxBalance');
    if(balEl) {
      const b = s.balance;
      balEl.style.color = b > 0 ? '#f87171' : b < 0 ? '#4ade80' : '#94a3b8';
      balEl.textContent = b > 0 ? `علينا ${b.toFixed(2)} ج` : b < 0 ? `لنا ${Math.abs(b).toFixed(2)} ج` : 'متوازن';
    }
  }

  window.loadWhProducts = function(type) {
    const whSel = document.getElementById(type==='raw'?'prodRawWh':'prodAccWh');

    itemSel.innerHTML = `<option value="">-- اختر منتج --</option>` + whProducts.map(p=>`<option value="${p.id}" data-cost="${p.cost}" data-name="${p.name}" data-qty="${p.qty}">${p.name} (${p.qty} متاح - تكلفة: ${p.cost} ج)</option>`).join('');

  window.addProdItem = function(type) {
    const itemSel = document.getElementById(type==='raw'?'prodRawItem':'prodAccItem');
    const opt = itemSel?.options[itemSel.selectedIndex];
    if(!opt||!opt.value) return;
    const id = parseInt(opt.value);
    const list = type==='raw' ? prodRawItems : prodAccItems;
    if(list.find(x=>x.id===id)) { itemSel.value=''; return; } // مضاف بالفعل
    list.push({ id, name: opt.dataset.name, cost: parseFloat(opt.dataset.cost)||0, qty: 1, available: parseInt(opt.dataset.qty)||0 });
    itemSel.value='';
    renderProdItemsList(type);
    calcProdCost();
  };

  function renderProdItemsList(type) {
    const list = type==='raw' ? prodRawItems : prodAccItems;
    const container = document.getElementById(type==='raw'?'prodRawItems':'prodAccItems');
    if(!container) return;
    if(list.length===0){ container.innerHTML='<div style="color:#64748b;font-size:11px;padding:6px">لم تختر أي منتج بعد</div>'; return; }
    container.innerHTML = list.map((item,i)=>`

  window.updateProdItemQty = function(type,i,val) {

  window.updateProdItemCost = function(type,i,val) {

  window.calcProdCost = function() {
    const qty = parseFloat(document.getElementById('prodQty')?.value)||1;
    const rawCostPerUnit = prodRawItems.reduce((s,x)=>s+(x.cost*x.qty),0);
    const accCostPerUnit = prodAccItems.reduce((s,x)=>s+(x.cost*x.qty),0);
    const otherCost = parseFloat(document.getElementById('prodOtherCost')?.value)||0;
    const laundryPrice = parseFloat(document.getElementById('prodLaundryPrice')?.value)||0;
    const factoryPrice = parseFloat(document.getElementById('prodFactoryPrice')?.value)||0;
    const materialsCost = rawCostPerUnit + accCostPerUnit + otherCost;
    const servicesCost = laundryPrice + factoryPrice;
    const costPerUnit = materialsCost + servicesCost;
    const costTotal = costPerUnit * qty;
    // تحديث الإجماليات الجزئية
    if(document.getElementById('prodRawTotal')) document.getElementById('prodRawTotal').textContent = rawCostPerUnit.toFixed(2)+' ج';
    if(document.getElementById('prodAccTotal')) document.getElementById('prodAccTotal').textContent = accCostPerUnit.toFixed(2)+' ج';
    if(document.getElementById('prodLaundryTotal')) document.getElementById('prodLaundryTotal').value = (laundryPrice*qty).toFixed(2);
    if(document.getElementById('prodFactoryTotal')) document.getElementById('prodFactoryTotal').value = (factoryPrice*qty).toFixed(2);
    if(document.getElementById('costMaterials')) document.getElementById('costMaterials').textContent = materialsCost.toFixed(2)+' ج';
    if(document.getElementById('costServices')) document.getElementById('costServices').textContent = servicesCost.toFixed(2)+' ج';
    if(document.getElementById('costPerUnit')) document.getElementById('costPerUnit').textContent = costPerUnit.toFixed(2)+' ج';
    if(document.getElementById('costTotal')) document.getElementById('costTotal').textContent = costTotal.toFixed(2)+' ج';
    // سعر البيع المقترح
    const profitPct = parseFloat(document.getElementById('prodProfitPct')?.value)||0;
    const profitFixed = parseFloat(document.getElementById('prodProfitFixed')?.value)||0;
    const suggestedPrice = costPerUnit*(1+profitPct/100)+profitFixed;
    if(document.getElementById('prodSalePrice')) document.getElementById('prodSalePrice').value = suggestedPrice.toFixed(2);
    // تحديث بطاقة الملخص
    if(document.getElementById('costPerUnitSummary')) document.getElementById('costPerUnitSummary').textContent = costPerUnit.toFixed(2)+' ج';
    if(document.getElementById('costTotalSummary')) document.getElementById('costTotalSummary').textContent = costTotal.toFixed(2)+' ج';
    if(document.getElementById('salePriceSummary')) document.getElementById('salePriceSummary').textContent = suggestedPrice.toFixed(2)+' ج';
    calcProdProfit();
  };

  window.calcProdProfit = function() {
    const qty = parseFloat(document.getElementById('prodQty')?.value)||1;
    const costTxt = document.getElementById('costPerUnit')?.textContent||'0';
    const costPerUnit = parseFloat(costTxt)||0;
    const salePrice = parseFloat(document.getElementById('prodSalePrice')?.value)||0;
    const profit = salePrice - costPerUnit;
    const profitTotal = profit * qty;
    const totalRevenue = salePrice * qty;
    const profitPctActual = costPerUnit > 0 ? (profit / costPerUnit * 100) : 0;
    if(document.getElementById('profitPerUnit')) { document.getElementById('profitPerUnit').textContent=profit.toFixed(2)+' ج'; document.getElementById('profitPerUnit').style.color=profit>=0?'#a78bfa':'#f87171'; }
    if(document.getElementById('profitPctLabel')) document.getElementById('profitPctLabel').textContent = profitPctActual.toFixed(1)+'% من التكلفة';
    if(document.getElementById('salePriceSummary')) document.getElementById('salePriceSummary').textContent = salePrice.toFixed(2)+' ج';
    if(document.getElementById('profitTotal')) { document.getElementById('profitTotal').textContent=totalRevenue.toFixed(2)+' ج'; document.getElementById('profitTotal').style.color=profit>=0?'#4ade80':'#f87171'; }
  };

  function refreshProductionTable() {
    const tbody = document.getElementById('productionTableBody');
    if(!tbody) return;
    const PAGE = 8;
    const total = productionOrders.length;
    const pages = Math.ceil(total/PAGE)||1;
    if(prodOrdersPage > pages) prodOrdersPage = pages;
    const start = (prodOrdersPage-1)*PAGE;
    const slice = [...productionOrders].reverse().slice(start, start+PAGE);
    const statusMap = { pending:['قيد الانتظار','#fbbf24'], inprogress:['قيد التشغيل','#38bdf8'], completed:['منتهي','#4ade80'], cancelled:['ملغي','#f87171'] };
    tbody.innerHTML = slice.map((o,i)=>{
      const [statusLbl, statusClr] = statusMap[o.status]||['---','#94a3b8'];
      const payLaundry = o.laundryPayment==='cash'?'كاش':'آجل';
      const payFactory = o.factoryPayment==='cash'?'كاش':'آجل';
      const profit = ((o.salePrice||0) - (o.costPerUnit||0));
      return `<tr>
        <td style="color:#a78bfa;font-weight:700">PO-${o.id}</td>
        <td style="color:#fff;font-weight:700">${o.name}</td>
        <td style="color:#fff">${o.qty.toLocaleString()}</td>
        <td style="color:#94a3b8;font-size:11px">${o.rawWh||'---'}</td>
        <td style="color:#94a3b8;font-size:11px">${o.accWh||'---'}</td>
        <td style="color:#94a3b8;font-size:11px">${o.finWh||'---'}</td>
        <td style="font-size:11px;color:#38bdf8">${o.laundryName||'---'}<br><span style="color:#94a3b8">${o.laundryPrice>0?o.laundryPrice+' ج ('+payLaundry+')':''}</span></td>
        <td style="font-size:11px;color:#a78bfa">${o.factoryName||'---'}<br><span style="color:#94a3b8">${o.factoryPrice>0?o.factoryPrice+' ج ('+payFactory+')':''}</span></td>
        <td style="color:#f87171;font-weight:700">${(o.costPerUnit||0).toFixed(2)} ج</td>
        <td style="color:#4ade80;font-weight:700">${(o.salePrice||0).toFixed(2)} ج</td>
        <td style="color:${profit>=0?'#4ade80':'#f87171'};font-weight:700">${profit.toFixed(2)} ج</td>
        <td><span class="badge" style="background:${statusClr}22;color:${statusClr}">${statusLbl}</span></td>
        <td><div class="action-btns">
          <button class="act-btn act-view" onclick="viewProdOrder(${o.id})"><i class="ti ti-eye"></i></button>
          <button class="act-btn act-edit" onclick="editProdOrder(${o.id})"><i class="ti ti-edit"></i></button>
          <button class="act-btn act-del" onclick="deleteProdOrder(${o.id})"><i class="ti ti-trash"></i></button>
        </div></td>
      </tr>`;
    }).join('') || '<tr><td colspan="13" style="text-align:center;color:#94a3b8;padding:2rem">لا توجد أوامر تشغيل</td></tr>';
    const pagInfo = document.getElementById('productionPagInfo');
    if(pagInfo) pagInfo.textContent = `${start+1}-${Math.min(start+PAGE,total)} من ${total}`;
    const pagBtns = document.getElementById('productionPagBtns');
    if(pagBtns) { pagBtns.innerHTML = ''; for(let p=1;p<=pages;p++){ const b=document.createElement('button'); b.className='pag-btn'+(p===prodOrdersPage?' cur':''); b.textContent=p; b.onclick=()=>{prodOrdersPage=p;refreshProductionTable();}; pagBtns.appendChild(b); } }
  }

  window.viewProdOrder = function(id) {
    const o = productionOrders.find(x=>x.id===id); if(!o) return;

    if(fabricWrapEdit) fabricWrapEdit.style.display = hasFabricPermEdit ? 'block' : 'none';

document.getElementById('saveProductionBtn')?.addEventListener('click', ()=>{
      const name = document.getElementById('prodName').value.trim();
      const qty = parseInt(document.getElementById('prodQty').value)||0;
      if(!name||qty<=0){ alert('برجاء إدخال اسم المنتج والكمية'); return; }
      const otherCost = parseFloat(document.getElementById('prodOtherCost').value)||0;
      const rawCostPerUnit = prodRawItems.reduce((s,x)=>s+(x.cost*x.qty),0);
      const accCostPerUnit = prodAccItems.reduce((s,x)=>s+(x.cost*x.qty),0);
      const laundryId = document.getElementById('prodLaundry').value;
      const laundry = laundries.find(l=>l.id==laundryId);
      const laundryPrice = parseFloat(document.getElementById('prodLaundryPrice').value)||0;
      const laundryPayment = document.getElementById('prodLaundryPayment').value;
      const factoryId = document.getElementById('prodFactory').value;
      const factory = factories.find(f=>f.id==factoryId);
      const factoryPrice = parseFloat(document.getElementById('prodFactoryPrice').value)||0;
      const factoryPayment = document.getElementById('prodFactoryPayment').value;
      const costPerUnit = rawCostPerUnit+accCostPerUnit+otherCost+laundryPrice+factoryPrice;
      const totalCost = costPerUnit*qty;
      const salePrice = parseFloat(document.getElementById('prodSalePrice').value)||0;
      const profitPct = parseFloat(document.getElementById('prodProfitPct').value)||0;
      const profitFixed = parseFloat(document.getElementById('prodProfitFixed').value)||0;
      
      // ===== حساب factoryTotal و laundryTotal =====
      const factoryTotal = factoryPrice * qty;
      const laundryTotal = laundryPrice * qty;
      // ===========================================
      
      const newOrder = {
        id: editProductionId || nextProductionId++,
        name, qty,
        rawWh: document.getElementById('prodRawWh').value,
        accWh: document.getElementById('prodAccWh').value,
        finWh: document.getElementById('prodFinWh').value,
        rawItems: JSON.parse(JSON.stringify(prodRawItems)),
        accItems: JSON.parse(JSON.stringify(prodAccItems)),
        rawCost: rawCostPerUnit, accCost: accCostPerUnit, otherCost,
        laundryId, laundryName: laundry?.name||'', laundryPrice, laundryPayment,
        factoryId, factoryName: factory?.name||'', factoryPrice, factoryPayment,
        costPerUnit, totalCost, salePrice, profitPct, profitFixed,
        status: document.getElementById('prodStatus').value,
        date: document.getElementById('prodDate').value,
        notes: document.getElementById('prodNotes').value.trim(),
        createdAt: new Date().toISOString(),
        ...(window._fabricDataCapture ? window._fabricDataCapture() || {} : {}),
        // ===== إضافة الحقول الجديدة =====
        factoryTotal: factoryTotal,
        laundryTotal: laundryTotal,
        factoryPaid: 0,
        laundryPaid: 0
        // ===============================
      };
      
      // ======= منطق نقل المنتج النهائي للمخزون =======
      const prevOrder = editProductionId ? productionOrders.find(o=>o.id===editProductionId) : null;
      const wasCompleted = prevOrder?.status === 'completed';
      const isNowCompleted = newOrder.status === 'completed';

      if(editProductionId) {
        const idx = productionOrders.findIndex(o=>o.id===editProductionId);
        if(idx!==-1) productionOrders[idx] = newOrder;
        // إذا كان منتهياً من قبل → اسحب المنتج القديم من المخزون أولاً
        if(wasCompleted && prevOrder.finWh && prevOrder.name) {
          const oldProd = products.find(p => p.name === prevOrder.name && p.wh === prevOrder.finWh);
          if(oldProd) { oldProd.qty = Math.max(0, oldProd.qty - prevOrder.qty); }
        }
      } else {
        productionOrders.push(newOrder);
      }

      // إذا الحالة الجديدة "منتهي" → أضف المنتج للمخزون
      if(isNowCompleted && newOrder.finWh && newOrder.name) {
        const existingProduct = products.find(p => p.name === newOrder.name && p.wh === newOrder.finWh);
        if(existingProduct) {
          existingProduct.qty += newOrder.qty;
          existingProduct.cost = newOrder.costPerUnit || existingProduct.cost;
          existingProduct.price = newOrder.salePrice || existingProduct.price;
        } else {
          products.push({
            id: Date.now(),
            code: 'PO-' + newOrder.id,
            name: newOrder.name,
            wh: newOrder.finWh,
            qty: newOrder.qty,
            min: 10,
            cost: newOrder.costPerUnit || 0,
            price: newOrder.salePrice || 0
          });
        }
        alert(`✅ تم حفظ أمر التشغيل وإضافة ${newOrder.qty} قطعة "${newOrder.name}" إلى مخزن "${newOrder.finWh}"`);
      }
      
      saveAllData();
      
      // ===== استدعاء دالة تسجيل الدين وتحديث الأرصدة =====
      updateProductionOrderDebt(newOrder, true);
      saveAllData(); // حفظ مرة ثانية لتحديث الديون
      // ================================================
      
      document.getElementById('productionModal').classList.remove('open');
      refreshProductionTable();
});

  function calcDebtSummary() {
    // ديون الموردين من سجل الموردين
    const supplierDebts = suppliers.filter(s=>s.balance>0).map(s=>({
      id:'sup_'+s.id, type:'supplier', name:s.name, phone:s.phone||'---',
      totalAmount:s.totalPurchases||0, paid:s.totalPaid||0, remaining:s.balance,
      status: s.balance>0?'pending':'settled'
    }));
    // ديون المصانع من رصيد المصنع الفعلي (يشمل الرصيد الافتتاحي + أوامر التشغيل)
    const factoryDebts = {};
    factories.forEach(f => {
      if((f.balance||0) > 0) {
        factoryDebts[f.id] = { id:'fac_'+f.id, type:'factory', name:f.name, phone:'---',
          totalAmount:f.totalPurchases||0, paid:f.totalPaid||0, remaining:f.balance, status:'pending', orders:[] };
      }
    });
    // ديون المغاسل من رصيد المغسلة الفعلي (يشمل الرصيد الافتتاحي + أوامر التشغيل)
    const laundryDebts = {};
    laundries.forEach(l => {
      if((l.balance||0) > 0) {
        laundryDebts[l.id] = { id:'lnd_'+l.id, type:'laundry', name:l.name, phone:'---',
          totalAmount:l.totalPurchases||0, paid:l.totalPaid||0, remaining:l.balance, status:'pending', orders:[] };
      }
    });
    // إضافة ديون يدوية من debtEntries
    const manualDebts = debtEntries.map(d=>({
      id:'man_'+d.id, type:d.debtType, name:d.partyName, phone:d.phone||'---',
      totalAmount:d.totalAmount, paid:d.paid, remaining:d.totalAmount-d.paid,
      status: (d.totalAmount-d.paid)<=0?'settled':'pending', note:d.note, date:d.date, entryId:d.id
    }));
    return [
      ...supplierDebts,
      ...Object.values(factoryDebts),
      ...Object.values(laundryDebts),
      ...manualDebts
    ];
  }

  function refreshDebtTable() {
    const allDebts = calcDebtSummary();
    const typeFilter = document.getElementById('debtTypeFilter')?.value || 'all';
    const statusFilter = document.getElementById('debtStatusFilter')?.value || 'all';
    const search = (document.getElementById('debtSearchInp')?.value || '').toLowerCase();
    let filtered = allDebts.filter(d => {
      if(typeFilter !== 'all' && d.type !== typeFilter) return false;
      if(statusFilter !== 'all' && d.status !== statusFilter) return false;
      if(search && !d.name.toLowerCase().includes(search)) return false;
      return true;
    });
    const typeLabel = { supplier:'مورد', factory:'مصنع', laundry:'مغسلة', manual:'متنوع' };
    const typeColor = { supplier:'#38bdf8', factory:'#a78bfa', laundry:'#4ade80', manual:'#fbbf24' };
    const typeIcon = { supplier:'ti-truck', factory:'ti-tool', laundry:'ti-droplet', manual:'ti-edit' };
    const tbody = document.getElementById('debtTableBody');
    if(tbody) tbody.innerHTML = filtered.length ? filtered.map((d,i)=>{
      const remaining = d.remaining;
      const pct = d.totalAmount > 0 ? Math.min(100, (d.paid/d.totalAmount*100)) : 0;
      const isManual = d.type === 'manual' && d.entryId;
      return `<tr>
        <td style="color:#94a3b8">${i+1}</td>
        <td><span class="badge" style="background:rgba(56,189,248,0.15);color:${typeColor[d.type]||'#94a3b8'}"><i class="ti ${typeIcon[d.type]||'ti-circle'}"></i> ${typeLabel[d.type]||d.type}</span></td>
        <td style="color:#ffffff;font-weight:700">${d.name}</td>
        <td style="color:#94a3b8">${d.phone}</td>
        <td style="color:#fbbf24;font-weight:700">${d.totalAmount.toFixed(2)} ج</td>
        <td style="color:#4ade80">${d.paid.toFixed(2)} ج
          <div style="background:#1e293b;border-radius:99px;height:4px;margin-top:4px"><div style="height:4px;border-radius:99px;background:#4ade80;width:${pct.toFixed(0)}%"></div></div>
        </td>
        <td style="color:${remaining>0?'#f87171':'#4ade80'};font-weight:800">${remaining.toFixed(2)} ج</td>
        <td>${remaining<=0?'<span class="badge badge-ok">مسدَّد</span>':'<span class="badge badge-zero">متبقي</span>'}</td>
        <td><div class="action-btns">
          ${isManual ? `<button class="act-btn act-add" onclick="window.openPayDebt('${d.entryId}','${d.name.replace(/'/g,"\\'")}',${remaining})" title="تسجيل دفعة"><i class="ti ti-cash"></i></button>` : (d.type==='supplier'?`<button class="act-btn act-add" onclick="navigateTo('suppliers')" title="ادفع من صفحة الموردين"><i class="ti ti-cash"></i></button>`:`<button class="act-btn act-add" onclick="navigateTo('production')" title="أوامر التشغيل"><i class="ti ti-settings"></i></button>`)}
          ${isManual ? `<button class="act-btn act-del" onclick="window.deleteManualDebt(${d.entryId})" title="حذف"><i class="ti ti-trash"></i></button>` : ''}
          <button class="act-btn act-view" onclick="window.showDebtStatement('${d.id}','${d.type}')" title="كشف حساب"><i class="ti ti-file-text"></i></button>
        </div></td>
      </tr>`;
    }).join('') : '<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:2rem"><i class="ti ti-check-circle" style="font-size:32px;display:block;margin-bottom:8px;color:#4ade80"></i>لا توجد ديون مطابقة للفلتر</td></tr>';
    // حساب الأصول للمركز المالي
    const totalTreasury = treasuries.reduce((s,t)=>s+t.balance,0);
    const totalInventoryCost = products.reduce((s,p)=>s+(p.cost*p.qty),0);
    const totalCustomerDebt = customers.filter(c=>c.balance>0).reduce((s,c)=>s+c.balance,0);
    const totalAssets = totalTreasury + totalInventoryCost + totalCustomerDebt;
    const grandTotal = calcDebtSummary().filter(d=>d.remaining>0).reduce((s,d)=>s+d.remaining,0);
    const net = totalAssets - grandTotal;
    const assetsEl = document.getElementById('debtFinAssets');
    const netEl = document.getElementById('debtFinNet');
    if(assetsEl) assetsEl.textContent = totalAssets.toFixed(2)+' ج';
    if(netEl) { netEl.textContent = net.toFixed(2)+' ج'; netEl.style.color = net >= 0 ? '#4ade80' : '#f87171'; }
  }

    let entity = null, transactions = [], name = '', phone = '', colorAccent = '#38bdf8', icon = 'ti-file-text';

    if(debtType === 'supplier') {
      const sid = debtId.replace('sup_','');
      entity = suppliers.find(s => s.id == sid);
      if(entity) { name = entity.name; phone = entity.phone||'---'; transactions = entity.transactions||[]; colorAccent = '#38bdf8'; icon = 'ti-truck'; }
    } else if(debtType === 'factory') {
      const fid = debtId.replace('fac_','');
      entity = factories.find(f => f.id == fid);
      if(entity) { name = entity.name; phone = '---'; transactions = entity.transactions||[]; colorAccent = '#a78bfa'; icon = 'ti-tool'; }
    } else if(debtType === 'laundry') {
      const lid = debtId.replace('lnd_','');
      entity = laundries.find(l => l.id == lid);
      if(entity) { name = entity.name; phone = '---'; transactions = entity.transactions||[]; colorAccent = '#4ade80'; icon = 'ti-droplet'; }
    } else if(debtType === 'manual' || debtType === 'supplier' || debtType === 'factory' || debtType === 'laundry') {
      // manual entry
      const eid = debtId.replace('man_','');
      const entry = debtEntries.find(d => d.id == eid);
      if(entry) {
        name = entry.partyName; phone = entry.phone||'---';
        transactions = [{ type:'purchase', amount:entry.totalAmount, note: entry.note||'دين مضاف يدوياً', date: entry.date }];
        if(entry.paid > 0) transactions.push({ type:'payment', amount:entry.paid, note:'مدفوع', date: entry.date });
        colorAccent = '#fbbf24'; icon = 'ti-edit';
      }
    }

    if(!entity && debtType !== 'manual') {
      // fallback: try manual
      const eid = debtId.replace('man_','');
      const entry = debtEntries.find(d => d.id == eid);
      if(entry) {
        name = entry.partyName; phone = entry.phone||'---';
        transactions = [{ type:'purchase', amount:entry.totalAmount, note: entry.note||'دين مضاف يدوياً', date: entry.date }];
        if(entry.paid > 0) transactions.push({ type:'payment', amount:entry.paid, note:'مدفوع', date: entry.date });
        colorAccent = '#fbbf24'; icon = 'ti-edit';
      }
    }

    const totalDebit = transactions.filter(t=>t.type==='purchase'||t.type==='debt'||t.isOpening).reduce((s,t)=>s+t.amount,0);
    const totalCredit = transactions.filter(t=>t.type==='payment').reduce((s,t)=>s+t.amount,0);
    const balance = totalDebit - totalCredit;

    // Build running balance
    const sorted = [...transactions].sort((a,b)=>new Date(a.date)-new Date(b.date));
    let running = 0;
    const rows = sorted.map((t,i) => {
      const isDebt = t.type==='purchase'||t.type==='debt'||t.isOpening;
      if(isDebt) running += t.amount; else running -= t.amount;
      return `<tr>
        <td style="color:#94a3b8;font-size:11px">${new Date(t.date).toLocaleDateString('ar-EG',{timeZone:'Africa/Cairo'})}</td>
        <td><span class="badge ${isDebt?'badge-zero':'badge-ok'}">${t.isOpening?'رصيد افتتاحي':isDebt?'مديونية':'سداد'}</span></td>
        <td style="color:${isDebt?'#f87171':'#94a3b8'};font-weight:700">${isDebt?t.amount.toFixed(2):'---'} ${isDebt?'ج':''}</td>
        <td style="color:${!isDebt?'#4ade80':'#94a3b8'};font-weight:700">${!isDebt?t.amount.toFixed(2):'---'} ${!isDebt?'ج':''}</td>
        <td style="color:${running>0?'#f87171':'#4ade80'};font-weight:800">${running.toFixed(2)} ج</td>
        <td style="color:#94a3b8;font-size:11px">${t.note||'---'}</td>
      </tr>`;
    }).join('');

    const html = `
      <div style="direction:rtl">
        <div style="background:#0f172a;border-radius:12px;padding:1rem;margin-bottom:1rem">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <div style="width:40px;height:40px;border-radius:10px;background:rgba(56,189,248,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;color:${colorAccent}"><i class="ti ${icon}"></i></div>
            <div><div style="color:#ffffff;font-size:16px;font-weight:800">${name}</div><div style="color:#94a3b8;font-size:12px">${phone}</div></div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
            <div style="background:#1e293b;border-radius:10px;padding:10px;text-align:center">
              <div style="color:#94a3b8;font-size:10px;margin-bottom:4px">إجمالي المديونية</div>
              <div style="color:#f87171;font-size:18px;font-weight:800">${totalDebit.toFixed(2)} ج</div>
            </div>
            <div style="background:#1e293b;border-radius:10px;padding:10px;text-align:center">
              <div style="color:#94a3b8;font-size:10px;margin-bottom:4px">إجمالي المسدد</div>
              <div style="color:#4ade80;font-size:18px;font-weight:800">${totalCredit.toFixed(2)} ج</div>
            </div>
            <div style="background:#1e293b;border-radius:10px;padding:10px;text-align:center;border:2px solid ${balance>0?'rgba(248,113,113,0.4)':'rgba(74,222,128,0.4)'}">
              <div style="color:#94a3b8;font-size:10px;margin-bottom:4px">الرصيد المتبقي</div>
              <div style="color:${balance>0?'#f87171':'#4ade80'};font-size:20px;font-weight:900">${balance.toFixed(2)} ج</div>
            </div>
          </div>
        </div>

        <div class="cart-panel">
          <div class="panel-title"><i class="ti ti-history"></i> تفاصيل الحركات</div>
          ${sorted.length === 0 ? '<div style="text-align:center;color:#94a3b8;padding:2rem">لا توجد حركات مسجلة</div>' : `
          <div style="overflow-x:auto">
            <table class="inv-table" style="width:100%">
              <thead><tr>
                <th>التاريخ</th><th>النوع</th><th style="color:#f87171">مديونية</th><th style="color:#4ade80">سداد</th><th>الرصيد</th><th>البيان</th>
              </tr></thead>
              <tbody>${rows}</tbody>
              <tfoot>
                <tr style="border-top:2px solid rgba(56,189,248,0.3)">
                  <td colspan="2" style="color:#94a3b8;font-weight:700">الإجمالي</td>
                  <td style="color:#f87171;font-weight:800">${totalDebit.toFixed(2)} ج</td>
                  <td style="color:#4ade80;font-weight:800">${totalCredit.toFixed(2)} ج</td>
                  <td style="color:${balance>0?'#f87171':'#4ade80'};font-weight:900;font-size:15px">${balance.toFixed(2)} ج</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>`}
        </div>
      </div>`;

    window._currentStatementName = name;
    window._currentStatementHTML = html;
    document.getElementById('debtStatementContent').innerHTML = html;
    document.getElementById('debtStatementModal').classList.add('open');
  };

    attachNavLogout();

    document.getElementById('debtSearchInp')?.addEventListener('input', refreshDebtTable);

    // إضافة دين يدوي
    document.getElementById('addManualDebtBtn')?.addEventListener('click', () => {
      document.getElementById('manualDebtModalTitle').textContent = 'إضافة دين يدوي';
      document.getElementById('mdDebtType').value = 'supplier';
      document.getElementById('mdPartyName').value = '';
      document.getElementById('mdPhone').value = '';
      document.getElementById('mdTotal').value = '0';
      document.getElementById('mdPaid').value = '0';
      document.getElementById('mdNote').value = '';
      document.getElementById('mdDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('manualDebtModal').classList.add('open');
    });
    document.getElementById('closeManualDebtModal')?.addEventListener('click', () => document.getElementById('manualDebtModal').classList.remove('open'));
    document.getElementById('saveManualDebtBtn')?.addEventListener('click', () => {
      const name = document.getElementById('mdPartyName').value.trim();
      if(!name) { alert('برجاء إدخال اسم الجهة'); return; }
      const total = parseFloat(document.getElementById('mdTotal').value)||0;
      const paid = parseFloat(document.getElementById('mdPaid').value)||0;
      debtEntries.push({
        id: nextDebtId++,
        debtType: document.getElementById('mdDebtType').value,
        partyName: name,
        phone: document.getElementById('mdPhone').value.trim(),
        totalAmount: total,
        paid: Math.min(paid, total),
        note: document.getElementById('mdNote').value.trim(),
        date: document.getElementById('mdDate').value,
      });
      saveAllData();
      document.getElementById('manualDebtModal').classList.remove('open');
      refreshDebtTable();
    });

    // دفع
    document.getElementById('closePayDebtModal')?.addEventListener('click', () => document.getElementById('payDebtModal').classList.remove('open'));
    document.getElementById('confirmPayDebtBtn')?.addEventListener('click', () => {
      const id = parseInt(document.getElementById('payDebtEntryId').value);
      const amount = parseFloat(document.getElementById('payDebtAmount').value)||0;
      const entry = debtEntries.find(e=>e.id===id);
      if(!entry) return;
      const maxPay = entry.totalAmount - entry.paid;
      if(amount <= 0 || amount > maxPay) { alert(`أدخل مبلغاً صحيحاً (الحد الأقصى: ${maxPay.toFixed(2)} ج)`); return; }
      entry.paid += amount;
      saveAllData();
      document.getElementById('payDebtModal').classList.remove('open');
      refreshDebtTable();
    });

    window.openPayDebt = (entryId, name, remaining) => {
      document.getElementById('payDebtEntryId').value = entryId;
      document.getElementById('payDebtName').textContent = name;
      document.getElementById('payDebtRemaining').textContent = parseFloat(remaining).toFixed(2)+' ج';

  function getKpiActuals(target) {
    const start = new Date(target.startDate);
    const end = new Date(target.endDate);
    end.setHours(23,59,59,999);
    // فلترة الفواتير حسب البائع المرتبط بالهدف والفترة الزمنية
    const periodInvoices = invoices.filter(inv => {
      const d = new Date(inv.date);
      const inPeriod = d >= start && d <= end;
      // مطابقة اسم البائع: seller field أو fullName أو username
      const sellerUser = systemUsers.find(u => u.fullName === target.user || u.username === target.user);
      const sellerUsername = sellerUser ? sellerUser.username : target.user;
      const sellerMatch = inv.seller === sellerUsername || inv.seller === target.user;
      return inPeriod && sellerMatch;
    });
    const actualRevenue = periodInvoices.reduce((s,inv) => s + inv.total, 0);
    const actualQty = periodInvoices.reduce((s,inv) => s + inv.items.reduce((q,item) => q + item.qty, 0), 0);
    return { actualRevenue, actualQty, invoiceCount: periodInvoices.length };
  }

  function attachKpiEvents() {
    document.getElementById('logoutKpi')?.addEventListener('click', () => { currentUser=null; localStorage.removeItem('crizmaUser'); navigateTo('login'); });
    document.querySelectorAll('[data-nav]').forEach(el => { el.addEventListener('click', () => navigateTo(el.getAttribute('data-nav'))); });
    
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('kpiStartDate').value = today;
    const nextMonth = new Date(Date.now()+30*86400000).toISOString().split('T')[0];
    document.getElementById('kpiEndDate').value = nextMonth;

    document.getElementById('newKpiBtn')?.addEventListener('click', () => {
      editKpiId = null;
      document.getElementById('kpiModalTitle').textContent = 'هدف جديد';
      populateKpiUserDropdown('');
      document.getElementById('kpiPeriod').value = 'شهري';
      document.getElementById('kpiTargetQty').value = '100';
      document.getElementById('kpiTargetRevenue').value = '10000';
      document.getElementById('kpiStartDate').value = today;
      document.getElementById('kpiEndDate').value = nextMonth;
      document.getElementById('kpiModal').classList.add('open');
    });
    
    document.getElementById('closeKpiModal')?.addEventListener('click', () => document.getElementById('kpiModal').classList.remove('open'));
    
    document.getElementById('saveKpiBtn')?.addEventListener('click', () => {
      const user = document.getElementById('kpiUser').value.trim();
      if(!user) { alert('أدخل اسم المستخدم'); return; }
      const targetQty = parseInt(document.getElementById('kpiTargetQty').value)||0;
      const targetRevenue = parseFloat(document.getElementById('kpiTargetRevenue').value)||0;
      const startDate = document.getElementById('kpiStartDate').value;
      const endDate = document.getElementById('kpiEndDate').value;
      if(!startDate || !endDate) { alert('أدخل الفترة الزمنية'); return; }
      if(editKpiId) {
        const idx = kpiTargets.findIndex(t => t.id === editKpiId);
        if(idx !== -1) kpiTargets[idx] = { ...kpiTargets[idx], user, period: document.getElementById('kpiPeriod').value, targetQty, targetRevenue, startDate, endDate };
      } else {
        kpiTargets.push({ id: nextKpiId++, user, period: document.getElementById('kpiPeriod').value, targetQty, targetRevenue, startDate, endDate });
      }
      saveAllData();
      document.getElementById('kpiModal').classList.remove('open');
      renderKpiCards();
    });
    
    renderKpiCards();
  }
  
  window.editKpiTarget = function(id) {
    const t = kpiTargets.find(x => x.id === id);
    if(!t) return;
    editKpiId = id;
    document.getElementById('kpiModalTitle').textContent = 'تعديل الهدف';
    populateKpiUserDropdown(t.user);
    document.getElementById('kpiPeriod').value = t.period;
    document.getElementById('kpiTargetQty').value = t.targetQty;
    document.getElementById('kpiTargetRevenue').value = t.targetRevenue;
    document.getElementById('kpiStartDate').value = t.startDate;
    document.getElementById('kpiEndDate').value = t.endDate;
    document.getElementById('kpiModal').classList.add('open');
  };
  
  window.deleteKpiTarget = function(id) {
    if(confirm('هل تريد حذف هذا الهدف؟')) {
      kpiTargets = kpiTargets.filter(t => t.id !== id);
      saveAllData();
      renderKpiCards();
    }
  };

  function renderWarehousePermGrid(containerId, allowedWhs, readonly = false) {
    const container = document.getElementById(containerId);
    if(!container) return;
    container.innerHTML = warehouses.map(wh => `
      <label style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;cursor:${readonly ? 'default' : 'pointer'};transition:background 0.2s" ${!readonly ? `onmouseover="this.style.background='rgba(56,189,248,0.08)'" onmouseout="this.style.background='rgba(255,255,255,0.04)'"` : ''}>
        <input type="checkbox" name="wh_perm" value="${wh}" ${allowedWhs && allowedWhs.includes(wh) ? 'checked' : ''} ${readonly ? 'disabled' : ''} style="accent-color:#38bdf8;width:14px;height:14px">
        <span style="color:#cbd5e1;font-size:12px"><i class="ti ti-building-warehouse" style="color:#38bdf8;font-size:14px"></i> ${wh}</span>
      </label>
    `).join('');
  }

  function getWarehousesFromForm(containerId) {
    const container = document.getElementById(containerId);
    if(!container) return [];
    return Array.from(container.querySelectorAll('input[name="wh_perm"]:checked')).map(cb => cb.value);
  }

  async function initApp() {
    // السحابة هي المصدر الوحيد للحقيقة - دايماً خد منها
    try {
      if(window.firebaseLoad) {
        const cloudData = await window.firebaseLoad();
        if(cloudData) {
          // السحابة دايماً تغلب - هي النسخة الموحدة لكل الأجهزة
          applyDataObj(cloudData);
          localStorage.setItem('crizmaData', JSON.stringify(cloudData));
          if(window.firebaseLoadProducts) {
            const cloudProducts = await window.firebaseLoadProducts();
            if(cloudProducts && cloudProducts.length > 0) products = cloudProducts;
          }
        }
        // لو مفيش بيانات في السحابة، استخدم الـ local (أول مرة)
      }
    } catch(e) { console.error('Init load error:', e); }

    // بعد ما حمّلنا البيانات، شوف هل فيه مستخدم مسجّل
    const stored = localStorage.getItem('crizmaUser');
    if(stored) {
      try {
        currentUser = JSON.parse(stored);
        if(currentUser) {
          navigateTo('dashboard');
          setTimeout(() => loadFromFirebase(), 2000);
        } else {
          navigateTo('login');
        }
      } catch(e) { navigateTo('login'); }
    } else {
      navigateTo('login');
    }
  }

    if(document.getElementById('appRoot').innerHTML === '') { initApp(); }
